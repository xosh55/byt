      <svg width={size} height={size} viewBox="0 0 120 120">
        <defs>

            <stop offset="0%" stopColor={C.mint} />

        </defs>

          {name:"Tele2 Streaming Flex",op:"tele2",price:199,campaign:99,channels:7,streaming:["Disney+","Välj 2 till (HBO Max, SkyShowtime, TV4 Play)"],note:"Byt streaming varje månad. Ingen TV-box."},
          {name:"Tele2 TV Bas",op:"tele2",price:299,campaign:199,channels:30,streaming:["Tele2 Play"],note:"TV Hub ingår. 12 mån bindning."},
          {name:"Tele2 TV & Streaming Sport",op:"tele2",price:1099,campaign:699,channels:32,streaming:["Disney+","Viaplay Total","TV4 Play Sport"],note:"All sport inkl. PL, F1, Allsvenskan. 12 mån bindning."},
          {name:"Telenor TV Bas",op:"telenor",price:299,campaign:99,channels:21,streaming:["Telenor Stream"],note:"TV-hubb ingår. 6 mån kampanj."},
          {name:"Telenor TV Premium",op:"telenor",price:899,campaign:499,channels:59,streaming:["Viaplay Total","HBO Max eller SkyShowtime"],note:"All sport + serier. 12 mån bindning."},
          {name:"Telia TV Mini",op:"telia",price:249,campaign:149,channels:20,streaming:["Telia Play"],note:"Grundpaket. 6 mån kampanj."},
          {name:"Telia Stora Sport",op:"telia",price:549,campaign:349,channels:45,streaming:["Viaplay Total","Amazon Prime"],note:"All stor sport. 6 mån kampanj."},
          {name:"Allente Stream Flex 4",op:"allente",price:449,campaign:255,channels:19,streaming:["Välj 4: Viaplay, HBO Max, Prime, Apple TV, TV4 Play, SkyShowtime"],note:"Max flexibilitet. Byt varje månad."},
          {name:"Allente Stream Basic",op:"allente",price:249,campaign:129,channels:19,streaming:[],note:"Bara kanaler. 3 mån kampanj."},
          {name:"Boxer TV Bas",op:"boxer",price:299,campaign:99,channels:19,streaming:[],note:"Marknät. TV Hub mini ingår."},
          {name:"Sappa Play Fem",op:"sappa",price:209,campaign:99,channels:15,streaming:[],note:"IPTV/kabel. 3 mån kampanj."},
        ].map((tv,i)=>(<div key={i} style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"18px 20px",display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,fontWeight:700,color:opColor(tv.op)}}>{opName(tv.op)}</span><span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:16,background:"rgba(255,107,0,0.08)",color:"#FF6B00"}}>{tv.channels} kanaler</span></div>
          <div style={{fontSize:14,fontWeight:800,color:C.text}}>{tv.name}</div>
          <div style={{display:"flex",alignItems:"baseline",gap:6}}><span style={{fontSize:24,fontWeight:800,color:tv.campaign?C.mint:C.text,fontFamily:"'DM Mono',monospace"}}>{tv.campaign||tv.price}</span><span style={{fontSize:11,color:C.subtle}}>kr/mån</span>{tv.campaign&&<span style={{fontSize:10,color:C.subtle,textDecoration:"line-through"}}>{tv.price} kr</span>}</div>
          {tv.streaming.length>0&&<div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{tv.streaming.map((s,j)=>(<span key={j} style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:10,background:"rgba(0,180,216,0.06)",color:C.cyan}}>{s}</span>))}</div>}
          <div style={{fontSize:10,color:C.subtle}}>{tv.note}</div>
          <a href={getUrl(tv.op)} target="_blank" rel="noopener noreferrer sponsored" style={{display:"block",marginTop:4,padding:"9px",borderRadius:10,textAlign:"center",background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:11,fontWeight:800,textDecoration:"none"}}>Välj hos {opName(tv.op)} →</a>
        </div>))}
      </div>
    </div>}
    </div>}
  </div>);
}
