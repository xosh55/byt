<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jämför streamingtjänster 2026 | Byyt.se</title>
<meta name="description" content="Netflix, HBO Max, Disney+, Viaplay — vilken streamingtjänst är bäst och billigast? Komplett jämförelse.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://byyt.se/streaming.html">
<meta property="og:title" content="Jämför streamingtjänster 2026 | Byyt.se">
<meta property="og:description" content="Vilken streamingtjänst är bäst och billigast? Komplett jämförelse.">
<meta property="og:url" content="https://byyt.se/streaming.html">
<meta property="og:type" content="website">
<meta property="og:locale" content="sv_SE">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2306D6A0'/><stop offset='50%25' stop-color='%2300B4D8'/><stop offset='100%25' stop-color='%238B5CF6'/></linearGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/><g stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'><path d='M8 11L19 11'/><polyline points='16,8 19,11 16,14'/><path d='M24 21L13 21'/><polyline points='16,18 13,21 16,24'/></g></svg>">
<link rel="stylesheet" href="shared.css">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
</head>
<body>
<a href="#main" class="skip-link">Hoppa till innehåll</a>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const CAT_TABS = [
  { id: 'mobil', label: '📱 Mobil', href: 'mobil.html' },
  { id: 'bredband', label: '🌐 Bredband', href: 'bredband.html' },
  { id: 'tv', label: '📺 TV', href: 'tv.html' },
  { id: 'streaming', label: '🎬 Streaming', href: 'streaming.html', active: true },
  { id: 'telefoner', label: '📞 Telefoner', href: 'telefoner.html' },
];
const FILTERS = [
  { id: 'all', label: 'Alla' },
  { id: 'film', label: '🎬 Film & Serier' },
  { id: 'sport', label: '⚽ Sport' },
];

const STREAM_COLORS = {
  netflix: '#E50914', hbomax: '#B835FC', disneyplus: '#0063E5', viaplayfilm: '#FF5A00', viaplaytotal: '#FF5A00',
  prime: '#00A8E1', skyshowtime: '#6B3FA0', tv4play: '#FF2D55', tv4sport: '#FF2D55', tv4hockey: '#FF2D55',
  appletv: '#333', discoveryplus: '#003B6F', svtplay: '#1B8B2D',
};

function StreamCard({ service, index }) {
  const [ex, setEx] = useState(index === 0);
  const color = STREAM_COLORS[service.id] || '#94A3B8';
  const cheapest = service.tiers[0];
  const url = (typeof URLS !== 'undefined' && URLS[service.id]) || '#';

  return (
    <div className={`result-card ${ex ? 'expanded' : ''}`} onClick={() => setEx(!ex)} role="button" tabIndex={0}
      aria-expanded={ex} onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setEx(!ex); }}}
      style={{ animation: `cardIn 0.15s ease-out ${index * 0.03}s both` }}>
      <div style={{ display: 'flex', alignItems: 'center' }}>
        <div className="op-logo" style={{ width: 40, height: 40, background: color + '20', color, fontSize: 14, fontWeight: 800 }}>{service.name.charAt(0)}</div>
        <div style={{ flex: 1, marginLeft: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color }}>{service.name}</span>
            {service.sport && <span className="badge badge-5g">Sport</span>}
            {cheapest.p === 0 && <span className="badge badge-tip">Gratis</span>}
          </div>
          <div style={{ fontSize: 12, color: 'var(--sub)' }}>{service.focus}</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'flex-end', gap: 3 }}>
            <span style={{ fontSize: 22, fontWeight: 800, fontFamily: "'DM Mono', monospace", color: cheapest.p === 0 ? 'var(--mint)' : 'var(--text)' }}>
              {cheapest.p === 0 ? 'Gratis' : cheapest.p}
            </span>
            {cheapest.p > 0 && <span style={{ fontSize: 10, color: 'var(--muted)' }}>kr</span>}
          </div>
          {service.tiers.length > 1 && <div style={{ fontSize: 10, color: 'var(--muted)' }}>från</div>}
        </div>
      </div>
      {!ex && <div style={{ textAlign: 'center', marginTop: 6, paddingTop: 4, borderTop: '1px solid var(--border)' }}><span style={{ fontSize: 10, fontWeight: 600, color: 'var(--cyan)', opacity: 0.6 }}>Visa detaljer</span></div>}
      {ex && (
        <div className="details" onClick={e => e.stopPropagation()} style={{ animation: 'fadeInFast 0.15s' }}>
          <div style={{ marginBottom: 10 }}>
            {service.tiers.map((t, i) => (
              <div key={i} style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                padding: '8px 0', borderBottom: i < service.tiers.length - 1 ? '1px solid var(--border)' : 'none'
              }}>
                <span style={{ fontSize: 13, color: 'var(--text)', fontWeight: 600 }}>{t.n}</span>
                <span style={{ fontSize: 15, fontWeight: 800, fontFamily: "'DM Mono', monospace", color: t.p === 0 ? 'var(--mint)' : 'var(--text)' }}>
                  {t.p === 0 ? 'Gratis' : t.p + ' kr/mån'}
                </span>
              </div>
            ))}
          </div>
          {service.sport && service.sports && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--sub)', marginBottom: 4 }}>Sporter</div>
              <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                {service.sports.map((s, i) => <span key={i} className="perk">{s}</span>)}
              </div>
            </div>
          )}
          <a href={url} target="_blank" rel="noopener noreferrer sponsored" className="cta cta-operator cta-full"
            style={{ background: `linear-gradient(135deg, ${color}, ${color}cc)` }} onClick={e => e.stopPropagation()}>
            Gå till {service.name} →
          </a>
          <div className="disclosure">Vi får provision — ditt pris påverkas inte</div>
        </div>
      )}
    </div>
  );
}

function StreamingPage() {
  const [filter, setFilter] = useState('all');

  const results = useMemo(() => {
    let f = [...STREAMING];
    if (filter === 'film') f = f.filter(s => !s.sport);
    if (filter === 'sport') f = f.filter(s => s.sport);
    f.sort((a, b) => a.tiers[0].p - b.tiers[0].p);
    return f;
  }, [filter]);

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', color: 'var(--text)' }}>
      <NavBar />
      <div className="cat-tabs">{CAT_TABS.map(t => <a key={t.id} href={t.href} className={`cat-tab ${t.active ? 'active' : ''}`}>{t.label}</a>)}</div>
      <main id="main" className="container">
        <section className="section fade-in">
          <h1 style={{ fontSize: 22, marginBottom: 4 }}>Jämför streaming</h1>
          <p style={{ fontSize: 13, color: 'var(--sub)', marginBottom: 16 }}>Film, serier och sport — alla tjänster på ett ställe</p>

          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 16 }}>
            {FILTERS.map(f => <button key={f.id} onClick={() => setFilter(f.id)} className={`chip ${filter === f.id ? 'active' : ''}`} aria-pressed={filter === f.id}>{f.label}</button>)}
          </div>

          <div style={{ fontSize: 12, color: 'var(--sub)', margin: '0 0 12px' }}><strong style={{ color: 'var(--text)' }}>{results.length} tjänster</strong></div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {results.map((s, i) => <StreamCard key={s.id} service={s} index={i} />)}
          </div>

          <div className="trust-bar" style={{ marginTop: 24 }}>
            <div className="trust-item"><span aria-hidden="true">🔒</span> Oberoende</div>
            <div className="trust-item"><span aria-hidden="true">🔄</span> Dagliga priser</div>
            <div className="trust-item"><span aria-hidden="true">💰</span> Alltid gratis</div>
          </div>
        </section>
      </main>
      <Footer />
      <BottomTabs active="compare" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StreamingPage />);
</script>
</body>
</html>
