<div id="root"></div>
<script type="text/babel" src="shared.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const { C } = window.BYYT;
const { Page } = window.Byyt;

function IntegritetPage() {
  const [oi, setOi] = React.useState(null);
  const sections = [
    { t: "Ansvarig",  c: "Byyt.se — kontakt@byyt.se" },
    { t: "Uppgifter", c: "IP (anon.), webbläsartyp, sidor." },
    { t: "Cookies",   c: "Nödvändiga + GA4." },
    { t: "Affiliate", c: "Provision vid teckning. Priset påverkas inte." },
    { t: "GDPR",      c: "Tillgång, rättelse, radering. kontakt@byyt.se" },
  ];
  return (
    <Page active="integritet">
      <div style={{ maxWidth: 680, margin: "0 auto", padding: "48px 20px" }}>
        <h1 style={{
          fontSize: "clamp(24px,4vw,36px)", fontWeight: 800,
          background: `linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
        }}>Integritetspolicy</h1>
        <p style={{ color: C.subtle, fontSize: 12, marginBottom: 28 }}>Mars 2026</p>
        {sections.map((x, i) => {
          const o = oi === i;
          return (
            <div key={i} style={{
              background: o ? C.surface : C.dark, borderRadius: 10,
              border: `1px solid ${o ? "rgba(0,180,216,.12)" : "rgba(255,255,255,.04)"}`,
              overflow: "hidden", marginBottom: 2
            }}>
              <button onClick={() => setOi(o ? null : i)} style={{
                width: "100%", display: "flex", justifyContent: "space-between",
                padding: "12px 18px", background: "none", border: "none",
                color: C.text, fontSize: 14, fontWeight: 600,
                fontFamily: "inherit", cursor: "pointer", textAlign: "left"
              }}>
                {x.t}
                <span style={{ color: C.cyan, transform: o ? "rotate(45deg)" : "none", transition: "transform .15s" }}>+</span>
              </button>
              {o && <div style={{ padding: "0 18px 14px", color: C.muted, fontSize: 13 }}>{x.c}</div>}
            </div>
          );
        })}
      </div>
    </Page>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<IntegritetPage/>);
</script>
