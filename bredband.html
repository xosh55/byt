<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jämför bredband 2026 — Fiber, 5G & Mobilt | Byyt.se</title>
<meta name="description" content="Jämför alla Sveriges bredband: fiber, 5G hem och mobilt bredband. Filtrera på hastighet och hitta billigast." />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://byyt.se/bredband.html" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://byyt.se/bredband.html" />
<meta property="og:title" content="Jämför bredband 2026 — Fiber, 5G & Mobilt | Byyt.se" />
<meta property="og:description" content="Jämför alla Sveriges bredband: fiber, 5G hem och mobilt bredband. Filtrera på hastighet och hitta billigast." />
<meta property="og:site_name" content="Byyt.se" />
<meta property="og:locale" content="sv_SE" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2306D6A0'/><stop offset='50%25' stop-color='%2300B4D8'/><stop offset='100%25' stop-color='%238B5CF6'/></linearGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/><g stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'><path d='M8 11L19 11'/><polyline points='16,8 19,11 16,14'/><path d='M24 21L13 21'/><polyline points='16,18 13,21 16,24'/></g></svg>" />
<link rel="stylesheet" href="shared.css">
<script src="data.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1R75D4WR44"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-1R75D4WR44');</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const { C, OPERATORS, opColor, opName, PLANS, BROADBAND, BB_OPERATORS, TV_OPERATORS, TV_PLANS, BUNDLE_DISCOUNTS } = window.BYYT;
const { Page, ModePills } = window.Byyt;
const { useState, useMemo } = React;

// ═══ BROADBAND VIEW ═══
function BroadbandView(){
  const[step,setStep]=useState(-1);const[typ,setTyp]=useState(null);const[speed,setSpeed]=useState(null);
  const results=useMemo(()=>{if(step<2)return[];let r=[...BROADBAND];if(typ)r=r.filter(b=>b.type===typ);if(speed)r=r.filter(b=>b.speedDown>=speed);r.sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price));return r;},[step,typ,speed]);
  const popular=BROADBAND.sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price)).slice(0,4);
  const Choice=({label,sub,onClick})=>(<button onClick={onClick} style={{flex:"1 1 140px",padding:"16px 12px",borderRadius:14,border:`1px solid rgba(255,255,255,0.06)`,background:"rgba(255,255,255,0.02)",color:C.muted,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"center",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.cyan;e.currentTarget.style.color=C.text;}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.06)";e.currentTarget.style.color=C.muted;}}>{label}{sub&&<div style={{fontSize:11,fontWeight:400,color:C.subtle,marginTop:4}}>{sub}</div>}</button>);
  return(<div>
    <section style={{textAlign:"center",padding:"36px 20px 20px"}}><h2 style={{fontSize:"clamp(24px,4vw,40px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:6,color:C.text}}>Jämför <span style={{background:`linear-gradient(135deg,${C.mint},${C.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>bredband</span></h2><p style={{fontSize:14,color:C.subtle}}>Fiber, 5G Hem och mobilt bredband.</p></section>
    {step===-1&&<div style={{maxWidth:640,margin:"0 auto"}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10,textAlign:"center"}}>Populärast just nu</div>
      <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:20}}>{popular.map(bb=>{const oc=(BB_OPERATORS.find(o=>o.id===bb.operator)||{}).color||C.muted;const on=(BB_OPERATORS.find(o=>o.id===bb.operator)||{}).name||bb.operator;const hc=bb.campaignPrice;return(<div key={bb.id} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flex:1}}><div style={{width:7,height:7,borderRadius:"50%",background:oc}}/><span style={{fontSize:13,fontWeight:700,color:oc}}>{on}</span><span style={{fontSize:11,color:C.muted}}>{bb.speedDown>=1000?"1 Gbit":bb.speedDown+" Mbit"} · {bb.type==="fiber"?"Fiber":bb.type==="5g"?"5G":"Mobilt"}</span></div>
        <span style={{fontSize:20,fontWeight:800,fontFamily:"'DM Mono',monospace",color:hc?C.mint:C.text}}>{hc||bb.price}</span><span style={{fontSize:10,color:C.subtle,marginLeft:4}}>kr/mån</span>
        {hc&&<span style={{fontSize:10,color:C.subtle,textDecoration:"line-through",marginLeft:6}}>{bb.price}</span>}
      </div>);})}</div>
      <button onClick={()=>setStep(0)} style={{display:"block",width:"100%",maxWidth:400,margin:"0 auto",padding:"16px 24px",borderRadius:14,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit",border:"none"}}>Jämför alla bredband →</button>
      <div style={{textAlign:"center",marginTop:8,fontSize:11,color:C.subtle}}>{BROADBAND.length} bredband från {BB_OPERATORS.length} leverantörer</div>
    </div>}
    {step===0&&<div style={{maxWidth:600,margin:"0 auto",textAlign:"center",animation:"fadeIn .2s"}}>
      <div style={{fontSize:11,fontWeight:600,color:C.cyan,textTransform:"uppercase",marginBottom:8}}>Steg 1 av 2</div>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:6}}>Vilken typ av bredband?</div>
      <div style={{fontSize:13,color:C.subtle,marginBottom:24}}>Välj den typ du har tillgång till</div>
      <div style={{display:"flex",gap:10,maxWidth:480,margin:"0 auto"}}>
        <Choice label="Fiber" sub="Snabbast och stabilast" onClick={()=>{setTyp("fiber");setStep(1);}}/>
        <Choice label="5G Hem" sub="Ingen installation" onClick={()=>{setTyp("5g");setStep(1);}}/>
        <Choice label="Mobilt" sub="Flexibelt" onClick={()=>{setTyp("mobilt");setStep(1);}}/>
      </div>
    </div>}
    {step===1&&<div style={{maxWidth:600,margin:"0 auto",textAlign:"center",animation:"fadeIn .2s"}}>
      <button onClick={()=>setStep(0)} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:C.cyan,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",padding:0,marginBottom:16}}>← Tillbaka</button>
      <div style={{fontSize:11,fontWeight:600,color:C.cyan,textTransform:"uppercase",marginBottom:8}}>Steg 2 av 2</div>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:6}}>Vilken hastighet?</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,maxWidth:400,margin:"0 auto"}}>
        <Choice label="100 Mbit" sub="Surfar & streamar" onClick={()=>{setSpeed(100);setStep(2);}}/>
        <Choice label="250 Mbit" sub="Familj & gaming" onClick={()=>{setSpeed(250);setStep(2);}}/>
        <Choice label="500 Mbit" sub="Hemmakontor" onClick={()=>{setSpeed(500);setStep(2);}}/>
        <Choice label="1 Gbit" sub="Maximum" onClick={()=>{setSpeed(1000);setStep(2);}}/>
      </div>
    </div>}
    {step===2&&<div style={{maxWidth:640,margin:"0 auto",animation:"fadeIn .2s"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>{setStep(1);}} style={{background:"none",border:"none",color:C.cyan,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",padding:0}}>← Ändra</button>
        <div style={{fontSize:12,color:C.subtle}}>{results.length} bredband · {typ==="fiber"?"Fiber":typ==="5g"?"5G":"Mobilt"} · {speed>=1000?"1 Gbit":speed+" Mbit"}+</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>{results.map((bb,i)=>{const oc=(BB_OPERATORS.find(o=>o.id===bb.operator)||{}).color||C.muted;const on=(BB_OPERATORS.find(o=>o.id===bb.operator)||{}).name||bb.operator;const hc=bb.campaignPrice;const disc=BUNDLE_DISCOUNTS[bb.operator]||0;return(<div key={bb.id} style={{display:"flex",alignItems:"center",padding:"12px 16px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",animation:`cardIn .15s ease-out ${i*.02}s both`}}>
        <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><div style={{width:8,height:8,borderRadius:"50%",background:oc}}/><span style={{fontSize:14,fontWeight:700,color:oc}}>{on}</span></div>
          <div style={{fontSize:12,color:C.muted,paddingLeft:14}}>{bb.speedDown>=1000?"1 Gbit":bb.speedDown+" Mbit"}/s · {bb.name.replace(on+" ","")}</div>
          {disc>0&&<div style={{fontSize:10,color:"#a78bfa",paddingLeft:14,marginTop:2}}>−{disc} kr/mån med mobilabb</div>}
          {bb.perks[0]&&<div style={{fontSize:10,color:C.subtle,paddingLeft:14}}>{bb.perks[0]}</div>}
        </div>
        <div style={{textAlign:"right",marginRight:12}}><span style={{fontSize:24,fontWeight:800,fontFamily:"'DM Mono',monospace",color:hc?C.mint:C.text}}>{hc||bb.price}</span><span style={{fontSize:10,color:C.subtle,marginLeft:4}}>kr/mån</span>{hc&&<div style={{fontSize:10,color:C.subtle,textDecoration:"line-through"}}>{bb.price} kr</div>}</div>
        <a href={bb.affiliateUrl} target="_blank" rel="noopener noreferrer sponsored" style={{padding:"8px 14px",borderRadius:8,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:11,fontWeight:800,textDecoration:"none",flexShrink:0}}>Välj →</a>
      </div>);})}
      </div>
    </div>}
  </div>);
}

function BredbandPage() {
  return (
    <Page active="jamfor">
      <div style={{paddingTop:28}}>
        <ModePills active="bredband"/>
      </div>
      <BroadbandView/>
    </Page>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BredbandPage/>);
</script>
</body>
</html>
