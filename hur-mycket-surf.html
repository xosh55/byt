        <h1><span className="text-gradient">Hur mycket surf behöver jag?</span></h1>
        <p>Många betalar för mer data än de faktiskt använder. Och tvärtom — en del drabbas av extra kostnader för att de hade för lite. Här hjälper vi dig välja rätt.</p>

        <a href="../mobil.html" className="article-cta">
          <div className="article-cta-title">📱 Vet du redan? Jämför direkt</div>
          <div className="article-cta-sub">Välj surfnivå och se bästa abonnemangen</div>
        </a>

        <h2>Snabbguide — välj din profil</h2>

        <div className="guide-card" style={{ borderLeft: '3px solid var(--mint)' }}>
          <div className="guide-title"><span style={{ fontSize: 20 }}>📱</span> Lite (1-5 GB)</div>
          <div className="guide-desc">
            Du använder mest WiFi hemma och på jobbet. Mobilen: mail, kartor, nyheter, lite sociala medier. Du streamar sällan video utan WiFi. <strong>Vanligast bland: seniorer, lågförbrukare.</strong>
          </div>
          <a href="../mobil.html?surf=lite" style={{ display: 'inline-block', marginTop: 8, fontSize: 13, fontWeight: 700, color: 'var(--cyan)' }}>Jämför 1-5 GB →</a>
        </div>

        <div className="guide-card" style={{ borderLeft: '3px solid var(--cyan)' }}>
          <div className="guide-title"><span style={{ fontSize: 20 }}>📲</span> Lagom (5-15 GB)</div>
          <div className="guide-desc">
            Du scrollar sociala medier, lyssnar på Spotify, navigerar med GPS och kollar mail. Du streamar ibland video men inte dagligen utan WiFi. <strong>De flesta hamnar här.</strong>
          </div>
          <a href="../mobil.html?surf=lagom" style={{ display: 'inline-block', marginTop: 8, fontSize: 13, fontWeight: 700, color: 'var(--cyan)' }}>Jämför 5-15 GB →</a>
        </div>

        <div className="guide-card" style={{ borderLeft: '3px solid var(--violet)' }}>
          <div className="guide-title"><span style={{ fontSize: 20 }}>🎬</span> Mycket (15-50 GB)</div>
          <div className="guide-desc">
            Du streamar video på pendeln, delar hotspot ibland, använder tunga appar och är inte alltid på WiFi. Du laddar ner podcasts och musik on the go. <strong>Vanligast bland: pendlare, studenter.</strong>
          </div>
          <a href="../mobil.html?surf=mycket" style={{ display: 'inline-block', marginTop: 8, fontSize: 13, fontWeight: 700, color: 'var(--cyan)' }}>Jämför 15-50 GB →</a>
        </div>

        <div className="guide-card" style={{ borderLeft: '3px solid #F59E0B' }}>
          <div className="guide-title"><span style={{ fontSize: 20 }}>⚡</span> Obegränsad</div>
          <div className="guide-desc">
            Du använder mobilen som enda internetkälla, jobbar ofta på språng, streamar dagligen utan WiFi, eller vill helt enkelt aldrig tänka på dataförbrukning. <strong>Vanligt bland: frilansare, remote workers.</strong>
          </div>
          <a href="../mobil.html?surf=obegransad" style={{ display: 'inline-block', marginTop: 8, fontSize: 13, fontWeight: 700, color: 'var(--cyan)' }}>Jämför obegränsad →</a>
        </div>

        <h2>Vad drar mest data?</h2>
        <table className="article-table">
          <thead><tr><th>Aktivitet</th><th>Per timme</th><th>10 min/dag = per mån</th></tr></thead>
          <tbody>
            <tr><td>Netflix (standard)</td><td>~1 GB</td><td>~5 GB</td></tr>
            <tr><td>YouTube (720p)</td><td>~0.7 GB</td><td>~3.5 GB</td></tr>
            <tr><td>TikTok / Instagram Reels</td><td>~0.8 GB</td><td>~4 GB</td></tr>
            <tr><td>Spotify (hög kvalitet)</td><td>~0.15 GB</td><td>~0.75 GB</td></tr>
            <tr><td>Sociala medier (blandat)</td><td>~0.3 GB</td><td>~1.5 GB</td></tr>
            <tr><td>Mail + nyheter</td><td>~0.05 GB</td><td>~0.25 GB</td></tr>
            <tr><td>Videosamtal (Zoom/Teams)</td><td>~1.5 GB</td><td>~7.5 GB</td></tr>
          </tbody>
        </table>
        <p>Det som drar mest: <strong>video</strong>. Om du tittar på Netflix 30 min/dag utan WiFi behöver du ~15 GB bara för det. Med WiFi hemma? Noll.</p>

        <h2>Steg 1: Kolla din nuvarande förbrukning</h2>
        <p>Logga in på din operatörs app eller "Mina sidor". Kolla genomsnittet de senaste 3 månaderna. Det är din baslinje. Välj ett abonnemang med <strong>lite mer</strong> än ditt genomsnitt — inte dubbelt så mycket.</p>

        <h2>Steg 2: WiFi = gratis data</h2>
        <p>Allt du gör på WiFi kostar noll mobildata. De flesta har WiFi hemma, på jobbet och ofta på caféer. Det betyder att din mobildata bara används: på pendeln, utomhus, i affären. Räkna med det.</p>

        <h2>Steg 3: Spara surf som backup</h2>
        <p>Vissa operatörer (Vimla, Hallon, Fello) sparar outnyttjad surf till nästa månad. Det ger dig en buffert utan att betala för en dyrare plan. Perfekt om din förbrukning varierar.</p>

        <h2>Tumregel</h2>
        <p><strong>WiFi hemma + WiFi jobb → 5-10 GB räcker för de allra flesta.</strong> Betalar du för 50 GB och använder 8? Du slänger pengar. Nedgradera och spara 100-200 kr/mån.</p>

        <h2>Vanliga frågor</h2>
        <div className="faq-item">
          <div className="faq-q">Hur mycket surf behöver jag per månad?</div>
          <div className="faq-a">De flesta klarar 5-15 GB. Under 5 GB för mail och enkel surfning. 15-50 GB om du streamar video utan WiFi. Obegränsad om mobilen är din enda internetkälla.</div>
        </div>
        <div className="faq-item">
          <div className="faq-q">Hur mycket data drar streaming?</div>
          <div className="faq-a">Netflix standard: ~1 GB/timme. Spotify: ~0.15 GB/timme. TikTok/Instagram: ~0.8 GB/timme. Videosamtal: ~1.5 GB/timme.</div>
        </div>
        <div className="faq-item">
          <div className="faq-q">Kan jag se hur mycket surf jag använder?</div>
          <div className="faq-a">Ja. Logga in på din operatörs app eller Mina sidor. Kolla genomsnittet de senaste 3 månaderna.</div>
        </div>

        <a href="../mobil.html" className="article-cta" style={{ marginTop: 32 }}>

      </article></main>
      <Footer />
      <BottomTabs active="" />
    </div>
  );
