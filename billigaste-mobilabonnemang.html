        <p>Nästan alla budgetoperatörer lockar med låga kampanjpriser: Hallon har <strong>9 kr/mån</strong>, Vimla har <strong>20 kr/mån</strong>. Men kampanjen varar bara 3-4 månader. Efter det betalar du ordinarie pris.</p>

        <p>Behöver du mer data men vill fortfarande ha lägst pris? Hallon 10 GB (19 kr kampanj → 149 kr) landar på <strong>1 268 kr/år</strong>. Vimla 10 GB (20 kr → 170 kr) kostar <strong>1 590 kr/år</strong>. Comviq 10 GB (179 kr, ingen kampanj) kostar <strong>2 148 kr/år</strong>.</p>
        <p>Mönstret är tydligt: <strong>Hallon är billigast på årsbasis</strong> tack vare 4 månaders kampanj istället för 3.</p>

        <h2>Fällan: "Bara" 50 kr mer per månad</h2>
        <p>Det är lätt att tänka "50 kr mer per månad är ingenting". Men 50 kr × 12 = 600 kr per år. För en familj med 4 abonnemang = 2 400 kr. Det är en helgresa. Räkna alltid på årsbasis.</p>
