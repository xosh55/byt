<div id="root"></div>
<script type="text/babel" src="shared.js" data-presets="react"></script>
<script type="text/babel" data-presets="react">
const { C } = window.BYYT;
const { Page } = window.Byyt;

function OmPage() {
  const cards = [
    { t: "Vad vi gör", x: "Jämför mobil, bredband, TV, streaming och telefoner. Unik familjekalkylator." },
    { t: "Byggt för alla", x: "Pris, surf, operatör, 5G. Sveriges mest kompletta jämförelseverktyg." },
    { t: "Kontakt", x: "kontakt@byyt.se" },
  ];
  return (
    <Page active="om">
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "48px 20px" }}>
        <h1 style={{
          fontSize: "clamp(28px,5vw,44px)", fontWeight: 800, letterSpacing: "-0.03em", marginBottom: 10,
          background: `linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
        }}>Om Byyt</h1>
        <p style={{ fontSize: 16, color: C.muted, marginBottom: 32 }}>
          Oberoende jämförelsetjänst. Gratis, transparent, på din sida.
        </p>
        {cards.map((i, idx) => (
          <div key={idx} style={{
            background: C.dark, border: `1px solid ${C.surface}`, borderRadius: 16,
            padding: "20px 24px", borderLeft: `3px solid ${C.mint}`, marginBottom: 12
          }}>
            <h2 style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 6 }}>{i.t}</h2>
            <p style={{ fontSize: 13, color: C.muted, lineHeight: 1.7 }}>{i.x}</p>
          </div>
        ))}
      </div>
    </Page>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OmPage/>);
</script>
