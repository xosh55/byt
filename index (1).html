function PageJamfor() {
  const [category, setCategory]           = useState("privat");
  const [priceMax, setPriceMax]           = useState(PRICE_MAX_DEFAULT);
  const [dataMin, setDataMin]             = useState(0);
  const [fiveGOnly, setFiveGOnly]         = useState(false);
  const [selectedOperators, setSelectedOperators] = useState([]);
  const [sortBy, setSortBy]               = useState("price_asc");
  const [familyConfig, setFamilyConfig]   = useState({ adults:2, children:1 });
  const [searchQuery, setSearchQuery]     = useState("");
  const [filtersOpen, setFiltersOpen]     = useState(true);

  const isFamily    = category === "familj";
  const sliderMax   = isFamily ? PRICE_MAX_FAMILY : PRICE_MAX_DEFAULT;
  const noMaxPrice  = priceMax >= sliderMax;
  const noMinSurf   = dataMin >= SURF_MAX;

  useEffect(() => {
    setPriceMax(isFamily ? PRICE_MAX_FAMILY : PRICE_MAX_DEFAULT);
  }, [category]);

  const toggleOperator = id =>
    setSelectedOperators(prev => prev.includes(id) ? prev.filter(o => o !== id) : [...prev, id]);

  const filteredPlans = useMemo(() => {
    let result = PLANS.filter(p => p.categories.includes(category));

    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      result = result.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.operator.toLowerCase().includes(q) ||
        p.network.toLowerCase().includes(q)
      );
    }

    // Price filter: skip when at max
    if (!noMaxPrice) {
      result = result.filter(p => {
        let price = p.price;
        if (isFamily && p.perExtra) {
          const extra = familyConfig.adults - 1 + familyConfig.children;
          price = p.price + extra * p.perExtra;
        }
        return price <= priceMax;
      });
    }

    // Surf filter: skip when at max (SURF_MAX)
    if (!noMinSurf) {
      result = result.filter(p => p.data >= dataMin);
    }

    if (fiveGOnly) result = result.filter(p => p.fiveG);
    if (selectedOperators.length > 0) result = result.filter(p => selectedOperators.includes(p.operator));

    result.sort((a, b) => {
      const getP = p => {
        if (isFamily && p.perExtra) {
          const extra = familyConfig.adults - 1 + familyConfig.children;
          return p.price + extra * p.perExtra;
        }
        return p.price;
      };
      switch (sortBy) {
        case "price_asc":  return getP(a) - getP(b);
        case "price_desc": return getP(b) - getP(a);
        case "data_desc":  return b.data - a.data;
        case "value":      return getP(a)/Math.max(a.data,1) - getP(b)/Math.max(b.data,1);
        default:           return 0;
      }
    });

    return result;
  }, [category, priceMax, dataMin, fiveGOnly, selectedOperators, sortBy, familyConfig, isFamily, searchQuery, noMaxPrice, noMinSurf]);

  const priceDisplayLabel = noMaxPrice ? "Alla priser" : `${priceMax} kr`;
  const surfDisplayLabel  = noMinSurf  ? "Obegränsad"  : `min ${dataMin} GB`;

  const hasActiveFilter = fiveGOnly || selectedOperators.length > 0 || dataMin > 0 || !noMaxPrice;

  return (
    <div>
      {/* Hero */}
      <section style={{ textAlign:"center", padding:"48px 20px 32px", animation:"fadeIn 0.6s ease-out" }}>
        <h1 style={{
          fontSize:"clamp(28px,5vw,52px)", fontWeight:800, lineHeight:1.1,
          letterSpacing:"-0.03em", marginBottom:12, color:C.text,
        }}>
          Sveriges{" "}
          <span style={{
            background:`linear-gradient(135deg, ${C.mint}, ${C.cyan}, ${C.violet})`,
            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
          }}>
            smartaste
          </span>
          {" "}mobilsajt.
        </h1>
        <p style={{ fontSize:16, color:C.subtle, maxWidth:520, margin:"0 auto" }}>
          Jämför alla Sveriges operatörer på ett ställe.
        </p>
      </section>

              <span style={{ color:C.surface2, fontSize:14 }}>Facebook — kommer snart</span>
            </div>
          </div>
        </div>

        {/* Affiliate disclosure */}
        <div style={{
          padding:"16px 20px",
          background:"rgba(255,255,255,0.02)", border:`1px solid rgba(255,255,255,0.05)`,
          borderRadius:12, marginBottom:20,
        }}>
          <p style={{ fontSize:12, color:C.subtle, lineHeight:1.65 }}>
            <strong style={{ color:C.muted }}>Byyt finns där för dig</strong> — vi hjälper dig hitta det billigaste mobilabonnemanget. Vi jämför alla operatörer neutralt och objektivt, utan att ta betalt av dig.
          </p>
        </div>

        {/* Bottom bar */}
        <div style={{ display:"flex", flexWrap:"wrap", justifyContent:"space-between", gap:12 }}>
          <p style={{ fontSize:12, color:C.surface2 }}>
            © 2026 Byyt.se — Sveriges mobiljämförelse
          </p>
          <p style={{ fontSize:12, color:C.surface2 }}>
            Priser uppdaterade: mars 2026
          </p>
        </div>
      </div>
    </footer>
  );
}

// ──────────────────────────────────────────────
// MAIN APP
// ──────────────────────────────────────────────
function ByytApp() {
  const [page, setPage]       = useState("jamfor");
  const [mobileMenu, setMobileMenu] = useState(false);

  const NAV_ITEMS = [
    { id:"jamfor",           label:"Jämför" },
    { id:"om-oss",           label:"Om oss" },
    { id:"integritetspolicy",label:"Integritetspolicy" },
    { id:"kontakt",          label:"Kontakt" },
  ];

  const navigateTo = (p) => { setPage(p); setMobileMenu(false); window.scrollTo({ top:0, behavior:"smooth" }); };

  return (
    <div style={{
      minHeight:"100vh", background:C.ink, color:C.text,
      fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",
      position:"relative", overflowX:"hidden",
    }}>
      <style>{`
        @keyframes cardIn {
          from { opacity:0; transform:translateY(20px); }
          to   { opacity:1; transform:translateY(0); }
        }
        @keyframes fadeIn {
          from { opacity:0; }
          to   { opacity:1; }
        }
        @keyframes heroGlow {
          0%,100% { opacity:0.35; transform:scale(1); }
          50%      { opacity:0.55; transform:scale(1.05); }
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(139,92,246,0.3); border-radius:3px; }
        input[type=range] { -webkit-appearance:none; appearance:none; background:transparent; }
        body { background:${C.ink}; }
      `}</style>

      {/* Background glows */}
      <div style={{
        position:"fixed", top:"-20%", right:"-10%", width:600, height:600,
        borderRadius:"50%", background:"radial-gradient(circle, rgba(6,214,160,0.07) 0%, transparent 70%)",
        animation:"heroGlow 10s ease-in-out infinite", pointerEvents:"none", zIndex:0,
      }}/>
      <div style={{
        position:"fixed", bottom:"-10%", left:"-10%", width:500, height:500,
        borderRadius:"50%", background:"radial-gradient(circle, rgba(139,92,246,0.07) 0%, transparent 70%)",
        animation:"heroGlow 12s ease-in-out infinite 3s", pointerEvents:"none", zIndex:0,
      }}/>

      {/* ══ HEADER ══ */}
      <header style={{
        padding:"0 24px",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        borderBottom:`1px solid rgba(255,255,255,0.05)`,
        backdropFilter:"blur(20px)",
        position:"sticky", top:0, zIndex:100,
        background:"rgba(8,14,26,0.88)",
        height:64,
      }}>
        <ByytLogo size={34} onClick={() => navigateTo("jamfor")}/>

        {/* Desktop nav */}
        <nav style={{ display:"flex", gap:4 }}>
          {NAV_ITEMS.map(item => {
            const active = page === item.id;
            return (
              <button key={item.id} onClick={() => navigateTo(item.id)} style={{
                padding:"8px 16px", borderRadius:10, border:"none",
                background: active ? "rgba(0,180,216,0.12)" : "transparent",
                color: active ? C.cyan : C.muted,
                fontSize:14, fontWeight: active ? 700 : 500,
                cursor:"pointer", fontFamily:"inherit", transition:"all 0.2s",
                borderBottom: active ? `2px solid ${C.cyan}` : "2px solid transparent",
              }}
                onMouseEnter={e => { if(!active) e.currentTarget.style.color = C.text; }}
                onMouseLeave={e => { if(!active) e.currentTarget.style.color = C.muted; }}
              >
                {item.label}
              </button>
            );
          })}
        </nav>

        {/* Mobile menu button */}
        <button
          onClick={() => setMobileMenu(!mobileMenu)}
          style={{
            display:"none", background:"none", border:`1px solid ${C.surface}`,
            borderRadius:10, padding:"8px 10px", color:C.muted, cursor:"pointer",
            fontFamily:"inherit",
          }}
          className="mobile-menu-btn"
        >
          ☰
        </button>
      </header>

      {/* Mobile dropdown */}
      {mobileMenu && (
        <div style={{
          position:"fixed", top:64, left:0, right:0, zIndex:99,
          background:C.dark, borderBottom:`1px solid ${C.surface}`,
          padding:16, display:"flex", flexDirection:"column", gap:4,
          animation:"fadeIn 0.2s ease-out",
        }}>
          {NAV_ITEMS.map(item => (
            <button key={item.id} onClick={() => navigateTo(item.id)} style={{
              padding:"14px 20px", borderRadius:12, border:"none",
              background: page === item.id ? "rgba(0,180,216,0.1)" : "transparent",
              color: page === item.id ? C.cyan : C.muted,
              fontSize:15, fontWeight:600, cursor:"pointer", fontFamily:"inherit",
              textAlign:"left", transition:"all 0.15s",
            }}>
              {item.label}
            </button>
          ))}
        </div>
      )}

      {/* Main content */}
      <main style={{ maxWidth:1200, margin:"0 auto", padding:"0 20px", position:"relative", zIndex:1 }}>
        {page === "jamfor"            && <PageJamfor/>}
        {page === "om-oss"            && <PageOmOss/>}
        {page === "integritetspolicy" && <PageIntegritetspolicy/>}
        {page === "kontakt"           && <PageKontakt/>}
      </main>

      <Footer setPage={navigateTo}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ByytApp));
</script>
</body>
</html>
