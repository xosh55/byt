<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jämför TV-paket 2026 — Bästa erbjudandena | Byyt.se</title>
<meta name="description" content="Jämför TV-paket med sport, film och serier. Se vilken operatör som ger mest för pengarna.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://byyt.se/tv.html">
<meta property="og:title" content="Jämför TV-paket 2026 | Byyt.se">
<meta property="og:description" content="Jämför TV-paket med sport, film och serier från alla operatörer.">
<meta property="og:url" content="https://byyt.se/tv.html">
<meta property="og:type" content="website">
<meta property="og:locale" content="sv_SE">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2306D6A0'/><stop offset='50%25' stop-color='%2300B4D8'/><stop offset='100%25' stop-color='%238B5CF6'/></linearGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/><g stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'><path d='M8 11L19 11'/><polyline points='16,8 19,11 16,14'/><path d='M24 21L13 21'/><polyline points='16,18 13,21 16,24'/></g></svg>">
<link rel="stylesheet" href="shared.css">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
</head>
<body>
<a href="#main" class="skip-link">Hoppa till innehåll</a>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const CAT_TABS = [
  { id: 'mobil', label: '📱 Mobil', href: 'mobil.html' },
  { id: 'bredband', label: '🌐 Bredband', href: 'bredband.html' },
  { id: 'tv', label: '📺 TV', href: 'tv.html', active: true },
  { id: 'streaming', label: '🎬 Streaming', href: 'streaming.html' },
  { id: 'telefoner', label: '📞 Telefoner', href: 'telefoner.html' },
];
const SIZES = [
  { id: 'all', label: 'Alla' },
  { id: 'bas', label: 'Bas' },
  { id: 'mellan', label: 'Mellan' },
  { id: 'stor', label: 'Stor' },
  { id: 'sport', label: '⚽ Sport' },
];

function TVCard({ plan, index }) {
  const [ex, setEx] = useState(index === 0);
  const op = TV_OPERATORS.find(o => o.id === plan.operator);
  const color = op ? op.color : '#94A3B8';
  const name = op ? op.name : plan.operator;
  const hasCampaign = plan.campaignPrice !== null;
  const price = hasCampaign ? plan.campaignPrice : plan.price;

  return (
    <div className={`result-card ${ex ? 'expanded' : ''}`} onClick={() => setEx(!ex)} role="button" tabIndex={0}
      aria-expanded={ex} onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setEx(!ex); }}}
      style={{ animation: `cardIn 0.15s ease-out ${index * 0.03}s both` }}>
      <div style={{ display: 'flex', alignItems: 'center' }}>
        <div className="op-logo" style={{ width: 40, height: 40, background: color + '20', color, fontSize: 16 }}>{name.charAt(0)}</div>
        <div style={{ flex: 1, marginLeft: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color }}>{name}</span>
            {plan.size === 'sport' && <span className="badge badge-5g">Sport</span>}
            {hasCampaign && <span className="badge badge-campaign">Kampanj</span>}
          </div>
          <div style={{ fontSize: 12, color: 'var(--sub)' }}>{plan.name.replace(name + ' ', '')} · {plan.channels} kanaler</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'flex-end', gap: 3 }}>
            <span style={{ fontSize: 22, fontWeight: 800, fontFamily: "'DM Mono', monospace", color: hasCampaign ? 'var(--mint)' : 'var(--text)' }}>{price}</span>
            <span style={{ fontSize: 10, color: 'var(--muted)' }}>kr</span>
          </div>
          {hasCampaign && <div style={{ fontSize: 10, color: 'var(--muted)', textDecoration: 'line-through' }}>{plan.price} kr</div>}
        </div>
      </div>
      {!ex && <div style={{ textAlign: 'center', marginTop: 6, paddingTop: 4, borderTop: '1px solid var(--border)' }}><span style={{ fontSize: 10, fontWeight: 600, color: 'var(--cyan)', opacity: 0.6 }}>Visa detaljer</span></div>}
      {ex && (
        <div className="details" onClick={e => e.stopPropagation()} style={{ animation: 'fadeInFast 0.15s' }}>
          {plan.perks.length > 0 && <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 10 }}>{plan.perks.map((p, i) => <span key={i} className="perk">{p}</span>)}</div>}
          {plan.streaming.length > 0 && (
            <div style={{ fontSize: 12, color: 'var(--sub)', marginBottom: 8 }}>
              Streaming inkl: <strong style={{ color: 'var(--text)' }}>{plan.streaming.join(', ')}</strong>
            </div>
          )}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px 16px', fontSize: 12, color: 'var(--sub)', marginBottom: 10, padding: '10px 0', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)' }}>
            <span>Kanaler: <strong style={{ color: 'var(--text)' }}>{plan.channels}</strong></span>
            <span>Typ: <strong style={{ color: 'var(--text)' }}>{plan.type === 'fiber' ? 'Fiber-TV' : 'Streaming'}</strong></span>
            <span>Play: <strong style={{ color: 'var(--text)' }}>{plan.playService}</strong></span>
            {hasCampaign && <span>Kampanj: <strong style={{ color: 'var(--mint)' }}>{plan.campaignMonths} mån</strong></span>}
          </div>
          <a href={plan.affiliateUrl} target="_blank" rel="noopener noreferrer sponsored" className="cta cta-operator cta-full"
            style={{ background: `linear-gradient(135deg, ${color}, ${color}cc)` }} onClick={e => e.stopPropagation()}>
            Gå till {name} →
          </a>
          <div className="disclosure">Vi får provision — ditt pris påverkas inte</div>
        </div>
      )}
    </div>
  );
}

function TVPage() {
  const [size, setSize] = useState('all');
  const [sort, setSort] = useState('cheapest');

  const results = useMemo(() => {
    let f = [...TV_PLANS];
    if (size !== 'all') f = f.filter(p => p.size === size);
    const getP = p => p.campaignPrice || p.price;
    if (sort === 'cheapest') f.sort((a, b) => getP(a) - getP(b));
    else if (sort === 'channels') f.sort((a, b) => b.channels - a.channels || getP(a) - getP(b));
    return f;
  }, [size, sort]);

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', color: 'var(--text)' }}>
      <NavBar />
      <div className="cat-tabs">{CAT_TABS.map(t => <a key={t.id} href={t.href} className={`cat-tab ${t.active ? 'active' : ''}`}>{t.label}</a>)}</div>
      <main id="main" className="container">
        <section className="section fade-in">
          <h1 style={{ fontSize: 22, marginBottom: 4 }}>Jämför TV-paket</h1>
          <p style={{ fontSize: 13, color: 'var(--sub)', marginBottom: 16 }}>Sport, film och serier — se vilken operatör som ger mest</p>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--sub)', marginBottom: 6 }}>Storlek</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {SIZES.map(s => <button key={s.id} onClick={() => setSize(s.id)} className={`chip ${size === s.id ? 'active' : ''}`} aria-pressed={size === s.id}>{s.label}</button>)}
            </div>
          </div>

          <div className="sort-bar">
            <button onClick={() => setSort('cheapest')} className={`chip ${sort === 'cheapest' ? 'active' : ''}`} aria-pressed={sort === 'cheapest'}>Billigast</button>
            <button onClick={() => setSort('channels')} className={`chip ${sort === 'channels' ? 'active' : ''}`} aria-pressed={sort === 'channels'}>Flest kanaler</button>
          </div>

          <div style={{ fontSize: 12, color: 'var(--sub)', margin: '10px 0 12px' }}><strong style={{ color: 'var(--text)' }}>{results.length} TV-paket</strong></div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {results.length === 0 && <div style={{ textAlign: 'center', padding: 40, color: 'var(--sub)' }}><div style={{ fontSize: 32, marginBottom: 10 }}>🔍</div><div style={{ fontSize: 15, fontWeight: 700 }}>Inga resultat</div></div>}
            {results.map((p, i) => <TVCard key={p.id} plan={p} index={i} />)}
          </div>

          <div className="trust-bar" style={{ marginTop: 24 }}>
            <div className="trust-item"><span aria-hidden="true">🔒</span> Oberoende</div>
            <div className="trust-item"><span aria-hidden="true">🔄</span> Dagliga priser</div>
            <div className="trust-item"><span aria-hidden="true">💰</span> Alltid gratis</div>
          </div>
        </section>
      </main>
      <Footer />
      <BottomTabs active="compare" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TVPage />);
</script>
</body>
</html>
