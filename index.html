// ── OPERATOR BADGE ──
function OperatorBadge({ operatorId }) {
  const op = OPERATORS.find((o) => o.id === operatorId);
  if (!op) return null;
  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 6,
        fontSize: 13,
        fontWeight: 600,
        color: op.color,
      }}
    >
      <span
        style={{
          width: 8,
          height: 8,
          borderRadius: "50%",
          background: op.color,
          boxShadow: `0 0 8px ${op.color}66`,
        }}
      />
      {op.name}
    </span>
  );
}

// ── PLAN CARD ──
function PlanCard({ plan, familyConfig, isFamily, index }) {
  const [hovered, setHovered] = useState(false);
  const op = OPERATORS.find((o) => o.id === plan.operator);
  const dataLabel = plan.data >= 9999 ? "Obegränsad" : `${plan.data} GB`;

  let totalPrice = plan.price;
  let familyBreakdown = null;
  if (isFamily && plan.perExtra) {
    const extraPersons = familyConfig.adults - 1 + familyConfig.children;
    totalPrice = plan.price + extraPersons * plan.perExtra;
    familyBreakdown = {
      base: plan.price,
      extra: extraPersons,
      perExtra: plan.perExtra,
      total: totalPrice,
    };
  }

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: hovered
          ? "linear-gradient(145deg, rgba(139,92,246,0.08), rgba(6,182,212,0.05))"
          : "rgba(255,255,255,0.02)",
        border: hovered
          ? "1px solid rgba(139,92,246,0.3)"
          : "1px solid rgba(255,255,255,0.06)",
        borderRadius: 20,
        padding: 24,
        display: "flex",

// ── RANGE SLIDER ──
function RangeSlider({ label, min, max, value, onChange, unit, step = 1 }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div style={{ flex: 1, minWidth: 180 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.06em" }}>
          {label}
        </span>
        <span style={{ fontSize: 14, fontWeight: 700, color: "#06b6d4" }}>
          {value >= 9999 ? "∞" : value} {unit}
        </span>
      </div>
      <div style={{ position: "relative", height: 20, display: "flex", alignItems: "center" }}>
        <div
          style={{
            position: "absolute",
            left: 0,
            right: 0,
            height: 4,
            borderRadius: 2,
            background: "rgba(255,255,255,0.06)",
          }}
        />
        <div
          style={{
            position: "absolute",
            left: 0,
            width: `${pct}%`,
            height: 4,
            borderRadius: 2,
            background: "linear-gradient(90deg, #06b6d4, #8b5cf6)",
          }}
        />
        <input
          type="range"
          min={min}
          max={max}
          step={step}
          value={value}
          onChange={(e) => onChange(Number(e.target.value))}
          style={{
            position: "absolute",
            left: 0,
            right: 0,
            width: "100%",
            height: 20,
            opacity: 0,
            cursor: "pointer",
            zIndex: 2,
          }}
        />
        <div
          style={{
            position: "absolute",
            left: `${pct}%`,
            transform: "translateX(-50%)",
            width: 18,
            height: 18,
            borderRadius: "50%",
            background: "#fff",
            boxShadow: "0 0 10px rgba(6,182,212,0.4), 0 2px 8px rgba(0,0,0,0.3)",
            pointerEvents: "none",
          }}
        />
      </div>
    </div>
  );
}

// ── FAMILY CALCULATOR ──
function FamilyCalculator({ config, onChange }) {
  const Counter = ({ label, emoji, value, onDec, onInc, minVal = 0 }) => (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 16,
        background: "rgba(255,255,255,0.03)",

      }}
    >
      <span style={{ fontSize: 24 }}>{emoji}</span>
      <span style={{ fontSize: 14, fontWeight: 600, color: "#e2e8f0", flex: 1 }}>{label}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <button
          onClick={onDec}
          disabled={value <= minVal}
          style={{
            width: 32,
            height: 32,
            borderRadius: 10,
            border: "1px solid rgba(255,255,255,0.1)",
            background: value <= minVal ? "transparent" : "rgba(255,255,255,0.05)",

            fontWeight: 700,
            cursor: value <= minVal ? "not-allowed" : "pointer",
            display: "flex",
            alignItems: "center",

            transition: "all 0.2s",
          }}
        >
          −
        </button>
        <span
          style={{
            fontSize: 22,
            fontWeight: 800,
            color: "#06b6d4",
            width: 30,
            textAlign: "center",
          }}
        >
          {value}
        </span>
        <button
          onClick={onInc}
          style={{
            width: 32,
            height: 32,
            borderRadius: 10,
            border: "1px solid rgba(139,92,246,0.3)",
            background: "rgba(139,92,246,0.1)",
            color: "#a78bfa",
            fontSize: 18,
            fontWeight: 700,
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            transition: "all 0.2s",
          }}
        >
          +
        </button>
      </div>
    </div>
  );

  return (
    <div
      style={{
        background: "linear-gradient(145deg, rgba(139,92,246,0.06), rgba(6,182,212,0.04))",
        border: "1px solid rgba(139,92,246,0.15)",
        borderRadius: 20,
        padding: 24,
      }}
    >
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
        <span style={{ fontSize: 20 }}>👨‍👩‍👧‍👦</span>
        <span style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0" }}>
          Familjekalkylator
        </span>
        <span style={{ fontSize: 12, color: "#64748b", marginLeft: "auto" }}>
          Totalt {config.adults + config.children} personer
        </span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        <Counter
          label="Vuxna"
          emoji="👤"
          value={config.adults}
          minVal={1}
          onDec={() => onChange({ ...config, adults: Math.max(1, config.adults - 1) })}
          onInc={() => onChange({ ...config, adults: Math.min(6, config.adults + 1) })}
        />
        <Counter
          label="Barn"
          emoji="👶"
          value={config.children}
          minVal={0}
          onDec={() => onChange({ ...config, children: Math.max(0, config.children - 1) })}
          onInc={() => onChange({ ...config, children: Math.min(6, config.children + 1) })}
        />
      </div>
    </div>
  );
}

// ── MAIN APP ──
function ByytApp() {
  const [category, setCategory] = useState("privat");
  const [priceMax, setPriceMax] = useState(800);
  const [dataMin, setDataMin] = useState(0);
  const [fiveGOnly, setFiveGOnly] = useState(false);
  const [selectedOperators, setSelectedOperators] = useState([]);
  const [sortBy, setSortBy] = useState("price_asc");
  const [familyConfig, setFamilyConfig] = useState({ adults: 2, children: 1 });
  const [searchQuery, setSearchQuery] = useState("");
  const [filtersOpen, setFiltersOpen] = useState(true);

  const isFamily = category === "familj";

  const toggleOperator = (id) => {
    setSelectedOperators((prev) =>
      prev.includes(id) ? prev.filter((o) => o !== id) : [...prev, id]
    );
  };

  const filteredPlans = useMemo(() => {
    let result = PLANS.filter((p) => p.categories.includes(category));

    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      result = result.filter(
        (p) =>
          p.name.toLowerCase().includes(q) ||
          p.operator.toLowerCase().includes(q) ||
          p.network.toLowerCase().includes(q)
      );
    }

    result = result.filter((p) => {
      let price = p.price;
      if (isFamily && p.perExtra) {
        const extra = familyConfig.adults - 1 + familyConfig.children;
        price = p.price + extra * p.perExtra;
      }
      return price <= priceMax;
    });

    result = result.filter((p) => p.data >= dataMin);

    if (fiveGOnly) result = result.filter((p) => p.fiveG);
    if (selectedOperators.length > 0)
      result = result.filter((p) => selectedOperators.includes(p.operator));

    result.sort((a, b) => {
      const getPrice = (p) => {
        if (isFamily && p.perExtra) {
          const extra = familyConfig.adults - 1 + familyConfig.children;
          return p.price + extra * p.perExtra;
        }
        return p.price;
      };
      switch (sortBy) {
        case "price_asc": return getPrice(a) - getPrice(b);
        case "price_desc": return getPrice(b) - getPrice(a);
        case "data_desc": return b.data - a.data;
        case "value": return getPrice(a) / Math.max(a.data, 1) - getPrice(b) / Math.max(b.data, 1);
        default: return 0;
      }
    });

    return result;
  }, [category, priceMax, dataMin, fiveGOnly, selectedOperators, sortBy, familyConfig, isFamily, searchQuery]);

  return (
    <div
      style={{

                      position: "absolute",
                      top: 3,
                      left: fiveGOnly ? 25 : 3,
                      transition: "left 0.3s cubic-bezier(0.4, 0, 0.2, 1)",
                      boxShadow: "0 1px 4px rgba(0,0,0,0.3)",
                    }}
                  />
                </button>
                <span style={{ fontSize: 13, fontWeight: 600, color: fiveGOnly ? "#06b6d4" : "#64748b" }}>
                  Bara 5G
                </span>
              </div>

              {/* Operators */}
              <div>
                <div
                  style={{
                    fontSize: 12,
                    fontWeight: 600,
                    color: "#64748b",
                    textTransform: "uppercase",
                    letterSpacing: "0.06em",
                    marginBottom: 10,
                  }}
                >
                  Operatörer
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {OPERATORS.map((op) => {
                    const active = selectedOperators.includes(op.id);
                    return (
                      <button
                        key={op.id}
                        onClick={() => toggleOperator(op.id)}
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: 6,
                          padding: "6px 14px",
                          borderRadius: 10,
                          border: active
                            ? `1px solid ${op.color}88`
                            : "1px solid rgba(255,255,255,0.06)",
                          background: active ? `${op.color}15` : "transparent",
                          color: active ? op.color : "#64748b",
                          fontSize: 12,
                          fontWeight: 600,
                          cursor: "pointer",
                          fontFamily: "inherit",
                          transition: "all 0.2s",
                        }}
                      >
                        <span
                          style={{
                            width: 8,
                            height: 8,
                            borderRadius: "50%",
                            background: active ? op.color : "rgba(255,255,255,0.15)",
                            transition: "background 0.2s",
                          }}
                        />
                        {op.name}
                      </button>
                    );
                  })}
                  {selectedOperators.length > 0 && (
                    <button
                      onClick={() => setSelectedOperators([])}
                      style={{
                        padding: "6px 14px",
                        borderRadius: 10,
                        border: "1px solid rgba(239,68,68,0.3)",
                        background: "rgba(239,68,68,0.08)",
                        color: "#f87171",
                        fontSize: 12,
                        fontWeight: 600,
                        cursor: "pointer",
                        fontFamily: "inherit",
                      }}
                    >
                      Rensa
                    </button>
                  )}
                </div>
              </div>

              {/* Sort */}
              <div>
                <div
                  style={{
                    fontSize: 12,
                    fontWeight: 600,
                    color: "#64748b",
                    textTransform: "uppercase",
                    letterSpacing: "0.06em",
                    marginBottom: 10,
                  }}
                >
                  Sortera efter
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {SORT_OPTIONS.map((opt) => (
                    <button
                      key={opt.id}
                      onClick={() => setSortBy(opt.id)}
                      style={{
                        padding: "6px 16px",
                        borderRadius: 10,
                        border:
                          sortBy === opt.id
                            ? "1px solid rgba(6,182,212,0.4)"
                            : "1px solid rgba(255,255,255,0.06)",
                        background:
                          sortBy === opt.id
                            ? "rgba(6,182,212,0.1)"
                            : "transparent",
                        color: sortBy === opt.id ? "#06b6d4" : "#64748b",
                        fontSize: 12,
                        fontWeight: 600,
                        cursor: "pointer",
                        fontFamily: "inherit",
                        transition: "all 0.2s",
                      }}
                    >
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>

        {/* ══ RESULTS HEADER ══ */}
        <div
          style={{
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
            marginBottom: 20,
          }}
        >
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span
              style={{
                fontSize: 28,
                fontWeight: 800,
                background: "linear-gradient(135deg, #06b6d4, #8b5cf6)",
                WebkitBackgroundClip: "text",
                WebkitTextFillColor: "transparent",
              }}
            >
              {filteredPlans.length}
            </span>
            <span style={{ fontSize: 14, color: "#64748b", fontWeight: 500 }}>
              abonnemang hittade
            </span>
          </div>
        </div>

        {/* ══ PLAN CARDS GRID ══ */}
        {filteredPlans.length === 0 ? (
          <div
            style={{
              textAlign: "center",
              padding: "60px 20px",
              animation: "fadeIn 0.4s ease-out",
            }}
          >
            <div style={{ fontSize: 48, marginBottom: 16 }}>🔍</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#e2e8f0", marginBottom: 8 }}>
              Inga abonnemang matchar dina filter
            </div>
            <div style={{ fontSize: 14, color: "#64748b" }}>
              Prova att justera pris, surf eller operatörer
            </div>
          </div>
        ) : (
          <div
            style={{
              display: "grid",
              gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))",
              gap: 16,
              marginBottom: 48,
            }}
          >
            {filteredPlans.map((plan, i) => (
              <PlanCard
                key={plan.id}
                plan={plan}
                familyConfig={familyConfig}
                isFamily={isFamily}
                index={i}
              />
            ))}
          </div>
        )}

        {/* ══ FOOTER ══ */}
        <footer
          style={{
            borderTop: "1px solid rgba(255,255,255,0.04)",
            padding: "32px 0",
            textAlign: "center",
            animation: "fadeIn 0.6s ease-out",
          }}
        >
          <ByytLogo size={28} />
          <div
            style={{
              marginTop: 16,
              padding: "12px 20px",
              background: "rgba(255,255,255,0.02)",
              border: "1px solid rgba(255,255,255,0.06)",
              borderRadius: 12,
              display: "inline-block",
              maxWidth: 600,
            }}
          >
            <p style={{ fontSize: 12, color: "#64748b", lineHeight: 1.6 }}>
              <strong style={{ color: "#94a3b8" }}>Affiliate-disclosure:</strong> Byyt innehåller
              affiliate-länkar. Det innebär att vi kan få ersättning om du tecknar ett abonnemang
              via våra länkar. Detta påverkar inte priset du betalar och vi strävar alltid efter att
              visa alla alternativ neutralt.
            </p>
          </div>
          <p style={{ fontSize: 11, color: "#334155", marginTop: 16 }}>
            © 2026 Byyt. Alla priser är exklusive eventuella kampanjerbjudanden.
          </p>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ByytApp));
</script>
</body>
</html>
