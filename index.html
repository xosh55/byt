function PlanCard({plan,familyConfig,isFamily,index}){
  const[h,sH]=useState(false);const[ex,setEx]=useState(false);const oc=opColor(plan.operator);const on=opName(plan.operator);
  const dl=plan.data>=9999?"Obegr.":`${plan.data} GB`;
  let tp=plan.price,fb=null;
  if(isFamily&&plan.perExtra){const e=familyConfig.adults-1+familyConfig.children;tp=plan.price+e*plan.perExtra;fb={b:plan.price,e,pe:plan.perExtra,t:tp};}
  const hc=plan.campaignPrice!==null;const bd=BUNDLE_DISCOUNTS[plan.operator]||0;const isTip=BYYT_TIPS.includes(plan.id);
  return(<div onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)} style={{background:"rgba(255,255,255,0.03)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:`1px solid ${isTip?"rgba(6,214,160,0.25)":h?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.06)"}`,borderRadius:16,padding:"14px 18px",transition:"all 0.2s",transform:h?"translateY(-1px)":"none",boxShadow:h?"0 8px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06)":"inset 0 1px 0 rgba(255,255,255,0.04)",animation:`cardIn .3s ease-out ${index*.02}s both`,cursor:"pointer"}} onClick={()=>setEx(!ex)}>
    <div style={{display:"flex",alignItems:"center",gap:14}}>
      {/* Operator color dot + name */}
      <div style={{minWidth:90}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:"50%",background:oc,flexShrink:0}}/><span style={{fontSize:12,fontWeight:700,color:oc}}>{on}</span></div>
        <div style={{fontSize:13,fontWeight:600,color:C.text,marginTop:2}}>{plan.name.replace(on+" ","")}</div>
      </div>
      {/* Data + Network */}
      <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
        <span style={{fontSize:14,fontWeight:800,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{dl}</span>
        <span style={{fontSize:10,color:C.subtle}}>{plan.network}</span>
        {plan.fiveG&&<span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:8,background:`linear-gradient(135deg,${C.cyan},${C.violet})`,color:"#fff"}}>5G</span>}
        {isTip&&<span style={{fontSize:8,fontWeight:700,color:C.mint,padding:"1px 6px",borderRadius:8,background:"rgba(6,214,160,0.1)"}}>Byyt-tipset</span>}
        {hc&&<span style={{fontSize:9,fontWeight:700,color:C.mint,padding:"1px 6px",borderRadius:8,background:"rgba(6,214,160,0.08)"}}>Kampanj</span>}
      </div>
      {/* Price */}
      <div style={{textAlign:"right",minWidth:80}}>
        <div style={{fontSize:24,fontWeight:800,fontFamily:"'DM Mono',monospace",color:hc?C.mint:C.text,lineHeight:1}}>{hc?plan.campaignPrice:tp}</div>
        <div style={{fontSize:10,color:C.subtle}}>kr/mån{hc&&<span style={{textDecoration:"line-through",marginLeft:4}}>{tp}</span>}</div>
      </div>
    </div>
    {/* Expanded details */}
    {ex&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.06)",animation:"fadeIn .15s"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>{plan.perks.map((p,i)=>(<span key={i} style={{fontSize:9,fontWeight:600,padding:"2px 8px",borderRadius:10,background:"rgba(6,214,160,0.06)",color:C.mint}}>{p}</span>))}</div>
      {bd>0&&!isFamily&&<div style={{fontSize:10,fontWeight:600,color:"#a78bfa",marginBottom:6}}>Spara {bd} kr/mån med bredband hos {on}</div>}
      {hc&&<div style={{fontSize:10,color:C.subtle,marginBottom:6}}>Kampanj {plan.campaignMonths} mån — 12 mån totalt: <strong style={{color:C.mint}}>{plan.campaignPrice*plan.campaignMonths+plan.price*(12-plan.campaignMonths)} kr</strong></div>}
      {fb&&<div style={{fontSize:10,color:"#a78bfa",marginBottom:6}}>{fb.b}+{fb.e}×{fb.pe}=<strong style={{color:C.text}}>{fb.t} kr/mån</strong></div>}
      {plan.bindingOffer&&<div style={{fontSize:10,color:"#a78bfa",marginBottom:6}}>{plan.bindingOffer}</div>}
      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:C.subtle,marginBottom:8}}><span>{plan.speedMbps} Mbit/s</span><span>·</span><span>{plan.network}-nätet</span></div>
      <a href={plan.affiliateUrl} target="_blank" rel="noopener noreferrer sponsored" style={{display:"inline-block",padding:"8px 20px",borderRadius:10,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:12,fontWeight:800,textDecoration:"none"}}>Besök {on} →</a>
    </div>}
    {!ex&&<div style={{fontSize:10,color:C.cyan,fontWeight:600,textAlign:"center",marginTop:6,opacity:.7}}>▼ Detaljer</div>}
  </div>);
}

function RangeSlider({label,min,max,value,onChange,step=1,dl}){const pct=((value-min)/(max-min))*100;return(<div style={{flex:1,minWidth:140}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase"}}>{label}</span><span style={{fontSize:12,fontWeight:700,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{dl}</span></div><div style={{position:"relative",height:16,display:"flex",alignItems:"center"}}><div style={{position:"absolute",left:0,right:0,height:3,borderRadius:2,background:"rgba(255,255,255,0.05)"}}/><div style={{position:"absolute",left:0,width:`${pct}%`,height:3,borderRadius:2,background:`linear-gradient(90deg,${C.mint},${C.cyan})`}}/><input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(+e.target.value)} style={{position:"absolute",width:"100%",height:16,opacity:0,cursor:"pointer",zIndex:2}}/><div style={{position:"absolute",left:`${pct}%`,transform:"translateX(-50%)",width:14,height:14,borderRadius:"50%",background:"#fff",boxShadow:`0 0 6px ${C.cyan}44`,pointerEvents:"none"}}/></div></div>);}

function FamilyCalc({config,onChange}){
  const Ctr=({label,value,onD,onI,m=0})=>(<div style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.02)",borderRadius:10,padding:"8px 14px",border:`1px solid ${C.surface}`}}><span style={{fontSize:13,fontWeight:600,color:C.text,flex:1}}>{label}</span><button onClick={onD} disabled={value<=m} style={{width:26,height:26,borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:value<=m?C.surface2:C.text,fontSize:15,fontWeight:700,cursor:value<=m?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button><span style={{fontSize:18,fontWeight:800,color:C.cyan,width:22,textAlign:"center",fontFamily:"'DM Mono',monospace"}}>{value}</span><button onClick={onI} style={{width:26,height:26,borderRadius:8,border:"1px solid rgba(139,92,246,0.3)",background:"rgba(139,92,246,0.06)",color:"#a78bfa",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button></div>);
  return(<div style={{background:"linear-gradient(145deg,rgba(139,92,246,0.04),rgba(0,180,216,0.02))",border:"1px solid rgba(139,92,246,0.12)",borderRadius:14,padding:18,marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:10}}>Familjekalkylator <span style={{fontSize:12,color:C.subtle}}>{config.adults+config.children} pers.</span></div><div style={{display:"flex",flexDirection:"column",gap:6}}><Ctr label="Vuxna" value={config.adults} m={1} onD={()=>onChange({...config,adults:Math.max(1,config.adults-1)})} onI={()=>onChange({...config,adults:Math.min(6,config.adults+1)})}/><Ctr label="Barn" value={config.children} m={0} onD={()=>onChange({...config,children:Math.max(0,config.children-1)})} onI={()=>onChange({...config,children:Math.min(6,config.children+1)})}/></div></div>);
}

function BroadbandView(){

// ═══ ALLT-I-ETT VIEW — v3 ═══
function PaketView(){
  const[isFam,setIsFam]=useState(null);const[famN,setFamN]=useState(2);
  const[surfLvl,setSurfLvl]=useState(null);
  const[sm,setSm]=useState(null);const[phones,setPhones]=useState([]);const[sb,setSb]=useState(null);
  const[tvSize,setTvSize]=useState(null);const[wantSport,setWantSport]=useState(null);const[stv,setStv]=useState(null);
  const[sportPicks,setSportPicks]=useState([]);const[sstr,setSstr]=useState([]);
  const[step,setStep]=useState(0);const[phBrand,setPhBrand]=useState(null);
  const bOps=["telia","tele2","telenor","tre"];
  const famExtra={telia:239,tele2:169,tre:149,telenor:199};

  const surfMin=surfLvl==="10gb"?5:surfLvl==="30gb"?20:surfLvl==="obegr"?9999:0;
  const mO=PLANS.filter(p=>p.categories.includes(isFam?"familj":"privat")&&bOps.includes(p.operator)&&p.data>=surfMin).sort((a,b)=>a.price-b.price);
  const pO=PHONES.filter(ph=>ph.ops.some(o=>bOps.includes(o.o))).sort((a,b)=>Math.min(...a.ops.map(o=>o.p))-Math.min(...b.ops.map(o=>o.p)));
  const bO=BROADBAND.filter(b=>bOps.includes(b.operator)).sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price));
  const selOp=sm?.operator||null;
  const bbS=useMemo(()=>{if(!selOp)return bO;return[...bO.filter(b=>b.operator===selOp),...bO.filter(b=>b.operator!==selOp)];},[selOp,bO]);

  // TV filtered by size + operator priority
  const bbOp=sb?.operator||null;
  const tvBySize=useMemo(()=>{
    if(!bbOp)return[];
    let plans=TV_PLANS.filter(t=>t.operator===bbOp&&t.type!=="streaming");
    if(tvSize==="bas")plans=plans.filter(t=>t.size==="bas");
    else if(tvSize==="mellan")plans=plans.filter(t=>t.size==="bas"||t.size==="mellan");
    else if(tvSize==="stor")plans=plans.filter(t=>t.size==="stor"||t.size==="mellan");
    if(wantSport)plans=[...TV_PLANS.filter(t=>t.operator===bbOp&&t.size==="sport"),...plans.filter(t=>t.size!=="sport")];
    else plans=plans.filter(t=>t.size!=="sport");
    plans.sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price));
    return plans;
  },[tvSize,wantSport,bbOp]);

  // INGAR logic
  const getIncluded=()=>{
    const inc=new Set();
    if(sm&&sm.operator==="telia"&&sm.name){
      if(sm.name.includes("3-i-1")||sm.name.includes("Netflix, HBO")){["netflix","hbomax","disneyplus"].forEach(s=>inc.add(s));}
      else if(sm.name.includes("Netflix"))inc.add("netflix");
      else if(sm.name.includes("Disney"))inc.add("disneyplus");
      else if(sm.name.includes("HBO")||sm.name.includes("Max"))inc.add("hbomax");
    }
    if(stv&&stv.streamIncludes){stv.streamIncludes.forEach(s=>inc.add(s));}
    return inc;
  };

  const streamPicks=[
    {id:"netflix",name:"Netflix",price:149},{id:"hbomax",name:"HBO Max",price:119},{id:"disneyplus",name:"Disney+",price:109},
    {id:"viaplaytotal",name:"Viaplay Total",price:449},{id:"prime",name:"Amazon Prime",price:69},
    {id:"skyshowtime",name:"SkyShowtime",price:89},{id:"tv4sport",name:"TV4 Sport Fotboll",price:249},
    {id:"tv4hockey",name:"TV4 Sport Hockey",price:249},
    {id:"appletv",name:"Apple TV+",price:99},{id:"discoveryplus",name:"Discovery+",price:79},
  ];
  const toggleStr=id=>setSstr(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const included=getIncluded();
  const strTotal=sstr.reduce((s,id)=>{if(included.has(id))return s;const f=streamPicks.find(x=>x.id===id);return s+(f?f.price:0);},0);

  const res=useMemo(()=>{if(!sm)return[];return bOps.map(op=>{
    const mp=mO.filter(p=>p.operator===op),bp=bO.filter(b=>b.operator===op);
    if(!mp.length)return null;
    const bM=mp.find(p=>p.data>=surfMin)||mp[mp.length-1];
    if(!bM)return null;
    let bB=null,bP=0;
    if(sb&&bp.length){bB=bp.find(b=>b.speedDown>=(sb?.speedDown||0))||bp[bp.length-1];if(bB)bP=bB.campaignPrice||bB.price;}
    let mP=bM.campaignPrice||bM.price;
    if(isFam)mP=mP+(famN-1)*(famExtra[op]||199);
    const d=(sb&&bB&&bB.operator===op)?BUNDLE_DISCOUNTS[op]||0:0;
    let tP=0,bT=null;
    if(stv){const tvOps=TV_PLANS.filter(t=>t.operator===op&&t.type!=="streaming");
      if(tvOps.length){
        if(stv.operator===op){bT=stv;}
        else{
          const stvPrice=stv.campaignPrice||stv.price;
          const sorted=[...tvOps].sort((a,b)=>Math.abs((a.campaignPrice||a.price)-stvPrice)-Math.abs((b.campaignPrice||b.price)-stvPrice));
          if(wantSport)bT=sorted.find(t=>t.size==="sport")||sorted[sorted.length-1];
          else bT=sorted.find(t=>t.size===tvSize)||sorted[0];
        }
        if(bT)tP=bT.campaignPrice||bT.price;
      }
    }
    // Per-operator included streaming
    const opInc=new Set();
    if(bM.operator==="telia"&&bM.name){
      if(bM.name.includes("3-i-1")||bM.name.includes("Netflix, HBO")){["netflix","hbomax","disneyplus"].forEach(s=>opInc.add(s));}
      else if(bM.name.includes("Netflix"))opInc.add("netflix");
      else if(bM.name.includes("Disney"))opInc.add("disneyplus");
      else if(bM.name.includes("HBO")||bM.name.includes("Max"))opInc.add("hbomax");
    }
    if(bT&&bT.streamIncludes)bT.streamIncludes.forEach(s=>opInc.add(s));
    const opStrTotal=sstr.reduce((s,id)=>{if(opInc.has(id))return s;const f=streamPicks.find(x=>x.id===id);return s+(f?f.price:0);},0);
    let phP=0,phNames=[];
    phones.forEach(ph=>{const opPrice=ph.ops.find(o=>o.o===op);if(opPrice){phP+=opPrice.p;phNames.push(ph.name);}});
    return{op,bM,bB,bT,phNames,mP,bP,tP,phP,strTotal:opStrTotal,opInc,d,total:mP+bP+tP+phP+opStrTotal-d,is5g:bB&&bB.type==="5g"};
  }).filter(Boolean).sort((a,b)=>a.total-b.total);},[sm,sb,stv,phones,sstr,isFam,famN,surfLvl,tvSize,wantSport]);

  const Dot=({n,l,a,done})=>(<div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,background:done?C.mint:a?"rgba(6,214,160,0.15)":C.surface,color:done?C.ink:a?C.mint:C.subtle}}>{done?"✓":n}</div><span style={{fontSize:10,fontWeight:600,color:a?C.text:C.subtle}}>{l}</span></div>);
  const Pick=({item,sel:s,onP,l1,l2,col,discount,samla})=>(<div onClick={onP} style={{background:s?"rgba(6,214,160,0.06)":C.dark,border:`1px solid ${samla?"rgba(6,214,160,0.5)":discount>0&&!s?"rgba(6,214,160,0.35)":s?C.mint:C.surface}`,borderRadius:14,padding:14,cursor:"pointer",transition:"all .15s",position:"relative"}}>{samla&&<div style={{position:"absolute",top:-1,left:0,right:0,textAlign:"center"}}><span style={{fontSize:9,fontWeight:800,color:C.ink,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,padding:"3px 14px",borderRadius:"0 0 10px 10px",display:"inline-block"}}>SAMLA & FÅ {discount} KR RABATT</span></div>}{discount>0&&!samla&&!s&&<div style={{position:"absolute",top:-1,right:12,fontSize:8,fontWeight:700,color:C.ink,background:C.mint,padding:"1px 8px",borderRadius:"0 0 8px 8px"}}>-{discount} kr</div>}<div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:2,marginTop:samla?10:0}}>{l1}</div><div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>{item.name||""}</div><div style={{display:"flex",alignItems:"baseline",gap:3}}><span style={{fontSize:22,fontWeight:800,color:col||C.mint,fontFamily:"'DM Mono',monospace"}}>{item.campaignPrice||item.price||0}</span><span style={{fontSize:10,color:C.subtle}}>kr/mån</span><span style={{marginLeft:"auto",fontSize:12,fontWeight:700,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{l2}</span></div></div>);
  const SkipBtn=({label,onSkip})=>(<button onClick={onSkip} style={{width:"100%",padding:"14px 20px",borderRadius:12,background:"rgba(6,214,160,0.06)",border:"1.5px solid rgba(6,214,160,0.3)",color:C.mint,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"center",marginBottom:16}}>{label}</button>);
  const BackBtn=({onBack})=>(<button onClick={onBack} style={{display:"flex",alignItems:"center",gap:6,marginBottom:16,background:C.dark,border:`1.5px solid ${C.cyan}40`,color:C.cyan,padding:"10px 20px",borderRadius:12,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Tillbaka</button>);
  const resetAll=()=>{setStep(0);setIsFam(null);setSm(null);setPhones([]);setSb(null);setStv(null);setSstr([]);setPhBrand(null);setSurfLvl(null);setTvSize(null);setWantSport(null);setSportPicks([]);};

  return(<div>
    <section style={{textAlign:"center",padding:"36px 20px 20px"}}><h2 style={{fontSize:"clamp(24px,4vw,40px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:6,color:C.text}}><span style={{background:`linear-gradient(135deg,${C.mint},${C.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Allt-i-ett</span></h2><p style={{fontSize:14,color:C.subtle}}>Bygg ditt paket steg för steg — se totalkostnaden.</p></section>
    {step>0&&<div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:20,flexWrap:"wrap"}}>
      <Dot n={1} l={isFam?`Familj (${famN})`:"Singel"} a={step<=1} done={step>1}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={2} l="Surf" a={step===2} done={step>2}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={3} l="Mobil" a={step===3} done={step>3}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={4} l="Telefon" a={step===4} done={step>4}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={5} l="Bredband" a={step===5} done={step>5}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={6} l="TV" a={step>=6&&step<=8} done={step>8}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={7} l="Resultat" a={step===9}/>
    </div>}

    {/* Step 0: Singel / Familj */}
    {step===0&&<div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
      <div onClick={()=>{setIsFam(false);setStep(2);}} style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"28px 36px",cursor:"pointer",textAlign:"center",transition:"all .2s",flex:"0 1 220px"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.cyan+"66";e.currentTarget.style.transform="translateY(-3px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;e.currentTarget.style.transform="none";}}>
        <div style={{width:48,height:48,borderRadius:14,background:"rgba(0,180,216,0.1)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.cyan} strokeWidth="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg></div>
        <div style={{fontSize:16,fontWeight:800,color:C.text}}>Bara mig</div><div style={{fontSize:11,color:C.subtle,marginTop:4}}>1 person</div>
      </div>
      <div onClick={()=>{setIsFam(true);setStep(1);}} style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"28px 36px",cursor:"pointer",textAlign:"center",transition:"all .2s",flex:"0 1 220px"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.violet+"66";e.currentTarget.style.transform="translateY(-3px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;e.currentTarget.style.transform="none";}}>
        <div style={{width:48,height:48,borderRadius:14,background:"rgba(139,92,246,0.1)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.violet} strokeWidth="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
        <div style={{fontSize:16,fontWeight:800,color:C.text}}>Familj</div><div style={{fontSize:11,color:C.subtle,marginTop:4}}>2–6 personer</div>
      </div>
    </div>}

    {/* Step 1: Antal */}
    {step===1&&<div style={{textAlign:"center"}}><BackBtn onBack={()=>{setStep(0);setIsFam(null);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:16}}>Hur många är ni?</div>
      <div style={{display:"flex",gap:8,justifyContent:"center"}}>{[2,3,4,5,6].map(n=>(<button key={n} onClick={()=>{setFamN(n);setStep(2);}} style={{width:56,height:56,borderRadius:14,border:`1px solid ${C.surface}`,background:C.dark,color:C.text,fontSize:22,fontWeight:800,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{n}</button>))}</div>
    </div>}

    {/* Step 2: Surf */}
    {step===2&&<div style={{textAlign:"center"}}><BackBtn onBack={()=>{setStep(isFam?1:0);setSurfLvl(null);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:20}}>Hur mycket surf behöver {isFam?"ni":"du"}?</div>
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        {[{id:"10gb",l:"10 GB",desc:"Mestadels wifi",col:C.subtle},{id:"30gb",l:"30 GB",desc:"Vardagssurfande",col:C.cyan},{id:"obegr",l:"Obegränsad",desc:"Streama fritt",col:C.mint}].map(s=>(<div key={s.id} onClick={()=>{setSurfLvl(s.id);setStep(3);}} style={{background:C.dark,border:`1.5px solid ${C.surface}`,borderRadius:16,padding:"24px 28px",cursor:"pointer",textAlign:"center",transition:"all .2s",flex:"0 1 200px"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=s.col;e.currentTarget.style.transform="translateY(-3px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;e.currentTarget.style.transform="none";}}>
          <div style={{fontSize:28,fontWeight:800,color:s.col,fontFamily:"'DM Mono',monospace",marginBottom:6}}>{s.l}</div>
          <div style={{fontSize:11,color:C.subtle}}>{s.desc}</div>
        </div>))}
      </div>
    </div>}

    {/* Step 3: Mobil */}
    {step===3&&<div><BackBtn onBack={()=>{setStep(2);setSm(null);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Välj mobilabonnemang</div>
      <div style={{fontSize:11,color:C.subtle,marginBottom:14}}>{surfLvl==="obegr"?"Obegränsad surf":surfLvl==="30gb"?"Minst 30 GB":"Minst 10 GB"}{isFam?` · ${famN} personer`:""}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>{mO.slice(0,12).map(p=>(<Pick key={p.id} item={p} sel={sm?.id===p.id} onP={()=>{setSm(p);setStep(4);}} l1={opName(p.operator)} l2={p.data>=9999?"Obegr.":p.data+" GB"} col={C.mint} discount={0} samla={false}/>))}</div>
    </div>}

    {/* Step 4: Telefon */}
    {step===4&&<div><BackBtn onBack={()=>{setStep(3);setPhones([]);setPhBrand(null);}}/>
      <SkipBtn label={isFam?"Inga nya telefoner — hoppa över →":"Jag har redan telefon — hoppa över →"} onSkip={()=>{setPhones([]);setPhBrand(null);setStep(5);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}}>Välj telefoner</div>
      {phones.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
        {phones.map((ph,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:10,background:"rgba(6,214,160,0.06)",border:`1px solid rgba(6,214,160,0.2)`}}><span style={{fontSize:11,fontWeight:600,color:C.text}}>#{i+1} {ph.name}</span><button onClick={()=>setPhones(phones.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#f87171",fontSize:14,cursor:"pointer",padding:0}}>×</button></div>))}
        <button onClick={()=>setStep(5)} style={{padding:"8px 20px",borderRadius:10,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:12,fontWeight:800,cursor:"pointer",border:"none",fontFamily:"inherit"}}>{phones.length} valda — fortsätt →</button>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[{b:"Apple",col:"#94A3B8"},{b:"Samsung",col:"#1428A0"},{b:"Google",col:"#4285F4"},{b:"OnePlus",col:"#F5010C"}].map(({b,col})=>(<div key={b} onClick={()=>setPhBrand(phBrand===b?null:b)} style={{background:phBrand===b?"rgba(0,180,216,0.08)":C.dark,border:phBrand===b?`2px solid ${C.cyan}`:`1px solid ${C.surface}`,borderRadius:14,padding:"16px 12px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
          <div style={{fontSize:15,fontWeight:800,color:phBrand===b?C.text:C.muted}}>{b}</div>
          <div style={{fontSize:10,color:C.subtle,marginTop:2}}>{pO.filter(ph=>ph.brand===b).length} modeller</div>
        </div>))}
      </div>
      {phBrand&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:8,animation:"fadeIn .15s"}}>{pO.filter(ph=>ph.brand===phBrand).map(ph=>{const cheapOp=ph.ops.find(o=>o.o===selOp)||ph.ops[0];const canAdd=phones.length<5;return(<div key={ph.id} onClick={()=>{if(canAdd)setPhones([...phones,ph]);}} style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:12,padding:14,cursor:canAdd?"pointer":"not-allowed",opacity:canAdd?1:.4,transition:"all .15s"}} onMouseEnter={e=>{if(canAdd)e.currentTarget.style.borderColor="rgba(0,180,216,0.3)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text}}>{ph.name}</div>
        <div style={{fontSize:10,color:C.subtle,marginBottom:6}}>{ph.storage}</div>
        <span style={{fontSize:20,fontWeight:800,color:C.mint,fontFamily:"'DM Mono',monospace"}}>{cheapOp.p}</span><span style={{fontSize:10,color:C.subtle}}> kr/mån</span>
      </div>);})}</div>}
    </div>}

    {/* Step 5: Bredband */}
    {step===5&&<div><BackBtn onBack={()=>{setStep(4);setSb(null);}}/>
      <SkipBtn label="Jag har redan bredband — hoppa över →" onSkip={()=>{setSb(null);setTvSize(null);setWantSport(null);setStv(null);setStep(8);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Välj bredband</div>
      {selOp&&<div style={{fontSize:12,color:C.mint,marginBottom:12,fontWeight:600}}>Samla med {opName(selOp)} och få {BUNDLE_DISCOUNTS[selOp]||0} kr rabatt/mån</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>{bbS.slice(0,12).map(b=>{const isSame=b.operator===selOp;const disc=isSame?(BUNDLE_DISCOUNTS[selOp]||0):0;return(<Pick key={b.id} item={b} sel={sb?.id===b.id} onP={()=>{setSb(b);const hasTv=TV_PLANS.some(t=>t.operator===b.operator&&t.type!=="streaming");setStep(hasTv?6:8);}} l1={opName(b.operator)+(b.type==="5g"?" (5G Hem)":"")} l2={b.speedDown>=1000?"1 Gbit":b.speedDown+" Mbit"} col={C.cyan} discount={disc} samla={isSame&&disc>0}/>);})}</div>
    </div>}

    {/* Step 6: TV - storlek */}
    {step===6&&<div><BackBtn onBack={()=>{setStep(5);setTvSize(null);setWantSport(null);setStv(null);}}/>
      <SkipBtn label="Hoppa över TV — gå till streaming →" onSkip={()=>{setTvSize(null);setWantSport(null);setStv(null);setStep(8);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Hur stort TV-paket?</div>
      <div style={{fontSize:11,color:C.subtle,marginBottom:16}}>TV via {bbOp?opName(bbOp):"din bredbandsleverantör"}</div>
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        {[{id:"bas",l:"Bas",desc:"~20 kanaler\nGrundutbud",col:C.subtle},{id:"mellan",l:"Mellan",desc:"~40 kanaler\nFilm & serier",col:C.cyan},{id:"stor",l:"Stort",desc:"~60 kanaler\nAllt för familjen",col:C.violet}].map(s=>(<div key={s.id} onClick={()=>{setTvSize(s.id);setStep(7);}} style={{background:C.dark,border:`1.5px solid ${C.surface}`,borderRadius:16,padding:"22px 24px",cursor:"pointer",textAlign:"center",transition:"all .2s",flex:"0 1 180px"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=s.col;e.currentTarget.style.transform="translateY(-3px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;e.currentTarget.style.transform="none";}}>
          <div style={{fontSize:20,fontWeight:800,color:s.col,marginBottom:6}}>{s.l}</div>
          <div style={{fontSize:11,color:C.subtle,whiteSpace:"pre-line"}}>{s.desc}</div>
        </div>))}
      </div>
    </div>}

    {/* Step 7: Sport? */}
    {step===7&&<div><BackBtn onBack={()=>{setStep(6);setWantSport(null);setStv(null);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:16}}>Vill du ha sport i TV-paketet?</div>
      <div style={{display:"flex",gap:12,justifyContent:"center"}}>
        <div onClick={()=>{setWantSport(true);setStep(7.5);}} style={{background:C.dark,border:`1.5px solid ${C.surface}`,borderRadius:16,padding:"22px 32px",cursor:"pointer",textAlign:"center",transition:"all .2s",flex:"0 1 200px"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.mint;e.currentTarget.style.transform="translateY(-3px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;e.currentTarget.style.transform="none";}}>
          <div style={{fontSize:18,fontWeight:800,color:C.mint}}>Ja, visa sportpaket</div>
          <div style={{fontSize:11,color:C.subtle,marginTop:4}}>Allsvenskan, PL, F1, SHL</div>
        </div>
        <div onClick={()=>{setWantSport(false);setStep(7.5);}} style={{background:C.dark,border:`1.5px solid ${C.surface}`,borderRadius:16,padding:"22px 32px",cursor:"pointer",textAlign:"center",transition:"all .2s",flex:"0 1 200px"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.subtle;e.currentTarget.style.transform="translateY(-3px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;e.currentTarget.style.transform="none";}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text}}>Nej tack</div>
          <div style={{fontSize:11,color:C.subtle,marginTop:4}}>Bara kanaler och streaming</div>
        </div>
      </div>
    </div>}

    {/* Step 7.5: Välj TV-paket */}
    {step===7.5&&<div><BackBtn onBack={()=>{setStep(7);setStv(null);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Välj TV-paket hos {bbOp?opName(bbOp):""}</div>
      <div style={{fontSize:11,color:C.subtle,marginBottom:12}}>TV levereras via din bredbandsleverantör</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>{tvBySize.slice(0,10).map(t=>{const incl=t.streamIncludes||[];return(<div key={t.id} onClick={()=>{setStv(t);setStep(8);}} style={{background:stv?.id===t.id?"rgba(6,214,160,0.06)":C.dark,border:`1px solid ${stv?.id===t.id?C.mint:C.surface}`,borderRadius:14,padding:14,cursor:"pointer",transition:"all .15s",position:"relative"}}>
        <div style={{fontSize:10,fontWeight:700,color:opColor(t.operator),textTransform:"uppercase"}}>{opName(t.operator)}</div>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>{t.name}</div>
        <div style={{fontSize:9,color:C.subtle,marginBottom:6}}>{t.channels} kanaler{t.perks.length>0&&" · "+t.perks.join(", ")}</div>
        <div style={{fontSize:22,fontWeight:800,color:C.mint,fontFamily:"'DM Mono',monospace"}}>{t.campaignPrice||t.price}<span style={{fontSize:10,color:C.subtle,fontFamily:"inherit",fontWeight:400}}> kr/mån</span></div>
        {incl.length>0&&<div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:6}}>{incl.slice(0,4).map(s=>{const sp=streamPicks.find(x=>x.id===s);return sp?<span key={s} style={{fontSize:8,fontWeight:700,color:C.success,padding:"1px 6px",borderRadius:8,background:"rgba(34,197,94,0.08)"}}>{sp.name} INGÅR</span>:null;})}</div>}
      </div>);})}</div>
    </div>}

    {/* Step 8: Streaming */}
    {step===8&&<div><BackBtn onBack={()=>{const hasTv=bbOp&&TV_PLANS.some(t=>t.operator===bbOp&&t.type!=="streaming");setStep(stv?7.5:hasTv?6:5);setSstr([]);}}/>
      <SkipBtn label="Hoppa över streaming — visa resultat →" onSkip={()=>{setSstr([]);setStep(9);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Streaming & sport-tillägg</div>
      {included.size>0&&<div style={{fontSize:11,color:C.mint,marginBottom:10,fontWeight:600}}>Tjänster som ingår i ditt val visas med 0 kr</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8,marginBottom:16}}>{streamPicks.map(s=>{const free=included.has(s.id);const active=sstr.includes(s.id);return(<div key={s.id} onClick={()=>toggleStr(s.id)} style={{background:free?"rgba(6,214,160,0.1)":active?"rgba(0,180,216,0.08)":C.dark,border:`1px solid ${free?"rgba(6,214,160,0.3)":active?C.cyan:C.surface}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",position:"relative"}}>
        {free&&<div style={{position:"absolute",top:6,right:8,fontSize:8,fontWeight:800,color:C.mint,background:"rgba(6,214,160,0.15)",padding:"1px 6px",borderRadius:8}}>INGÅR</div>}
        <div style={{fontSize:13,fontWeight:700,color:active||free?C.text:C.muted}}>{s.name}</div>
        <div style={{fontSize:16,fontWeight:800,color:free?C.success:active?C.cyan:C.subtle,fontFamily:"'DM Mono',monospace"}}>{free?"0 kr":s.price+" kr"}</div>
      </div>);})}</div>
      {strTotal>0&&<div style={{fontSize:12,color:C.cyan,marginBottom:10,fontFamily:"'DM Mono',monospace",fontWeight:700}}>Streaming-tillägg: +{strTotal} kr/mån</div>}
      <button onClick={()=>setStep(9)} style={{width:"100%",padding:"14px",borderRadius:12,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit",border:"none"}}>Visa resultat →</button>
    </div>}

    {/* Step 9: Resultat */}
    {step===9&&res.length>0&&(()=>{const myOp=res.find(r=>r.op===selOp);const others=res.filter(r=>r.op!==selOp);
      const RCard=({r,isMy})=>{
        // Check if all services are same operator
        const allOps=new Set([r.op]);
        if(r.bB)allOps.add(r.bB.operator||r.op);
        if(r.bT)allOps.add(r.bT.operator||r.op);
        const singleOp=allOps.size===1;
        const surfLabel=surfLvl==="obegr"?"Obegränsad":surfLvl==="30gb"?"30 GB":"10 GB";
        return(<div style={{background:isMy?"rgba(0,180,216,0.04)":C.dark,border:`1px solid ${isMy?"rgba(0,180,216,0.25)":C.surface}`,borderRadius:16,padding:22,marginBottom:14}}>
          {isMy&&<div style={{fontSize:9,fontWeight:700,color:C.cyan,padding:"3px 10px",borderRadius:16,background:"rgba(0,180,216,0.08)",display:"inline-block",marginBottom:10}}>Ditt val</div>}
          <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:14}}>{opName(r.op)}{isFam&&<span style={{fontSize:11,color:C.violet,marginLeft:8}}>{famN} personer</span>}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
            {/* Mobil */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>Mobilabonnemang</div><div style={{fontSize:10,color:C.subtle}}>{isFam?famN+" SIM-kort · ":""}{surfLabel} · 5G</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16,fontWeight:800,color:C.mint,fontFamily:"'DM Mono',monospace"}}>{r.mP} kr</span>{!singleOp&&<a href={getUrl(r.op)} target="_blank" rel="noopener noreferrer sponsored" style={{fontSize:10,fontWeight:700,color:C.cyan,textDecoration:"none"}}>Gå till →</a>}</div>
            </div>
            {/* Telefoner */}
            {r.phP>0&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>Telefoner ({phones.length} st)</div><div style={{fontSize:10,color:C.subtle}}>{r.phNames.join(", ")} · 24 mån</div></div>
              <span style={{fontSize:16,fontWeight:800,color:"#E8345A",fontFamily:"'DM Mono',monospace"}}>{r.phP} kr</span>
            </div>}
            {/* Bredband */}
            {r.bP>0&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>Bredband{r.is5g?" (5G Hem)":""}</div><div style={{fontSize:10,color:C.subtle}}>{r.bB?r.bB.speedDown>=1000?"1 Gbit":r.bB.speedDown+" Mbit":""}{r.bB?" · "+opName(r.bB.operator):""}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16,fontWeight:800,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{r.bP} kr</span>{!singleOp&&r.bB&&<a href={getUrl(r.bB.operator)} target="_blank" rel="noopener noreferrer sponsored" style={{fontSize:10,fontWeight:700,color:C.cyan,textDecoration:"none"}}>Gå till →</a>}</div>
            </div>}
            {/* TV */}
            {r.bT&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{r.bT.name}</div><div style={{fontSize:10,color:C.subtle}}>{r.bT.channels} kanaler{r.bT.perks?" · "+r.bT.perks.join(", "):""}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16,fontWeight:800,color:C.violet,fontFamily:"'DM Mono',monospace"}}>{r.tP} kr</span>{!singleOp&&<a href={getUrl(r.bT.operator)} target="_blank" rel="noopener noreferrer sponsored" style={{fontSize:10,fontWeight:700,color:C.cyan,textDecoration:"none"}}>Gå till →</a>}</div>
            </div>}
            {/* Streaming */}
            {sstr.length>0&&sstr.map(id=>{const f=streamPicks.find(x=>x.id===id);const free=r.opInc&&r.opInc.has(id);if(!f)return null;return(<div key={id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",borderRadius:10,background:free?"rgba(6,214,160,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${free?"rgba(6,214,160,0.15)":C.surface}`}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text}}>{f.name}{free&&<span style={{fontSize:9,color:C.mint,marginLeft:6,fontWeight:700}}>INGÅR</span>}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,fontWeight:800,color:free?C.success:C.cyan,fontFamily:"'DM Mono',monospace"}}>{free?"0 kr":f.price+" kr"}</span>{!free&&<a href={getUrl(id)} target="_blank" rel="noopener noreferrer sponsored" style={{fontSize:10,fontWeight:700,color:C.cyan,textDecoration:"none"}}>Gå till →</a>}</div>
            </div>);})}
            {/* Rabatt */}

        {myOp&&<div><div style={{fontSize:10,fontWeight:600,color:C.cyan,textTransform:"uppercase",marginBottom:8}}>Baserat på ditt val — {opName(selOp)}</div><RCard r={myOp} isMy={true}/></div>}

      </div>);})()}
  </div>);
}

function PageJamfor(){

  const[ops,setOps]=useState([]);const[sb,setSb]=useState("price_asc");const[fc,setFc]=useState({adults:2,children:1});
  const[sq,setSq]=useState("");const[sf,setSf]=useState(false);const[chip,setChip]=useState(null);const[sticky,setSticky]=useState(false);
  const br=useRef(null);const isF=cat==="familj";const sM=isF?3000:800;const nM=pm>=sM;const nS=dm>=100;
  useEffect(()=>{setPm(isF?3000:800);},[cat]);
  useEffect(()=>{const h=()=>{if(br.current)setSticky(br.current.getBoundingClientRect().top<=60);};window.addEventListener("scroll",h,{passive:true});return()=>window.removeEventListener("scroll",h);},[]);
  const applyChip=c=>{if(chip===c){setChip(null);setSb("price_asc");return;}setChip(c);if(c==="billigast")setSb("price_asc");if(c==="varde")setSb("value");};
  const fl=useMemo(()=>{let r=PLANS.filter(p=>p.categories.includes(cat));if(sq.trim()){const q=sq.toLowerCase();r=r.filter(p=>p.name.toLowerCase().includes(q)||p.operator.includes(q)||p.network.toLowerCase().includes(q));}if(!nM){r=r.filter(p=>{let pr=p.price;if(isF&&p.perExtra)pr+=( fc.adults-1+fc.children)*p.perExtra;return pr<=pm;});}if(nS)r=r.filter(p=>p.data>=9999);else if(dm>0)r=r.filter(p=>p.data>=dm);if(fg)r=r.filter(p=>p.fiveG);if(ops.length>0)r=r.filter(p=>ops.includes(p.operator));if(chip==="kampanj")r=r.filter(p=>p.campaignPrice!==null);r.sort((a,b)=>{const g=p=>{if(isF&&p.perExtra)return p.price+(fc.adults-1+fc.children)*p.perExtra;return p.price;};switch(sb){case"price_asc":return g(a)-g(b);case"price_desc":return g(b)-g(a);case"data_desc":return b.data-a.data;case"value":return g(a)/Math.max(a.data,1)-g(b)/Math.max(b.data,1);default:return 0;}});return r;},[cat,pm,dm,fg,ops,sb,fc,isF,sq,nM,nS,chip]);
  const MODES=[{id:"mobil",l:"Mobil"},{id:"bredband",l:"Bredband"},{id:"tv",l:"TV"},{id:"streaming",l:"Streaming"},{id:"telefoner",l:"Telefoner"},{id:"paket",l:"Allt-i-ett"},{id:"radgivare",l:"Kolla ditt pris"}];
  return(<div>

        <div style={{position:"absolute",top:"15%",left:"50%",transform:"translateX(-50%)",width:"clamp(300px,60vw,600px)",height:"clamp(300px,60vw,600px)",borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,0.12) 0%,rgba(0,180,216,0.06) 40%,transparent 70%)",animation:"heroGlow 8s ease-in-out infinite",pointerEvents:"none"}}/>

        <p style={{fontSize:"clamp(15px,2vw,18px)",color:C.subtle,maxWidth:500,marginBottom:36,lineHeight:1.5,position:"relative",zIndex:1}}>Hitta, jämför och teckna — helt digitalt.<br/>Mobil, bredband, TV, streaming och telefoner.</p>

      {/* ═══ FEATURE GRID — 6 boxes, Allt-i-ett pulsates ═══ */}
      <section style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:20,animation:"fadeIn .6s ease-out .5s both"}} className="fgrid">
        {[
          {id:"mobil",l:"Mobilabb",desc:"Enbart SIM-kort",col:C.mint,icon:"M4 4a2 2 0 012-2h12a2 2 0 012 2v1H4V4zM2 7h20v10a2 2 0 01-2 2H4a2 2 0 01-2-2V7z",pulse:false},
          {id:"telefoner",l:"Telefoner",desc:"iPhone, Samsung m.fl.",col:"#E8345A",icon:"M8 2h8a2 2 0 012 2v16a2 2 0 01-2 2H8a2 2 0 01-2-2V4a2 2 0 012-2zM11 18h2",pulse:false},
          {id:"bredband",l:"Bredband",desc:"Fiber och 5G Hem",col:C.cyan,icon:"M2 12h20M6 12v6M12 12v6M18 12v6M4 8l8-4 8 4",pulse:false},
          {id:"tv",l:"TV",desc:"Kanaler och baspaket",col:"#FF6B00",icon:"M3 5h18v11H3zM8 20h8M12 16v4",pulse:false},
          {id:"streaming",l:"Streaming",desc:"Film, serier, sport",col:C.violet,icon:"M5 3l14 9-14 9V3z",pulse:false},
          {id:"paket",l:"Allt-i-ett",desc:"Bygg hela paketet",col:C.success,icon:"M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5",pulse:true},
        ].map(f=>(<div key={f.id} onClick={()=>setMode(f.id==="paket"?"paket":f.id)} style={{background:"rgba(255,255,255,0.03)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:`1px solid rgba(255,255,255,0.08)`,borderRadius:12,padding:"12px 6px",cursor:"pointer",transition:"all .3s",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:4,animation:f.pulse?"featurePulse 2.5s ease-in-out infinite":"none",boxShadow:"0 4px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05)"}} onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.06)";e.currentTarget.style.borderColor=f.col+"44";e.currentTarget.style.transform="translateY(-3px)";if(f.pulse)e.currentTarget.style.animation="none";}} onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.03)";e.currentTarget.style.borderColor="rgba(255,255,255,0.08)";e.currentTarget.style.transform="none";if(f.pulse)e.currentTarget.style.animation="featurePulse 2.5s ease-in-out infinite";}}>
          <div style={{width:32,height:32,borderRadius:10,background:`${f.col}12`,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={f.col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={f.icon}/></svg></div>
          <div style={{fontSize:11,fontWeight:700,color:C.text}}>{f.l}</div>
        </div>))}
      </section>
      {/* ═══ KOLLA DITT PRIS CTA ═══ */}
      <div onClick={()=>setMode("radgivare")} style={{maxWidth:520,margin:"0 auto 18px",background:"linear-gradient(145deg,rgba(6,214,160,0.06),rgba(0,180,216,0.04))",border:"1.5px solid rgba(6,214,160,0.2)",borderRadius:16,padding:"16px 20px",cursor:"pointer",transition:"all .25s",display:"flex",alignItems:"center",gap:14,animation:"fadeIn .6s ease-out .55s both"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(6,214,160,0.5)";e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(6,214,160,0.08)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(6,214,160,0.2)";e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
        <div style={{width:40,height:40,borderRadius:12,background:"rgba(6,214,160,0.12)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.mint} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 3 5-7"/></svg></div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:800,color:C.text}}>Kolla ditt pris</div><div style={{fontSize:11,color:C.subtle,marginTop:2}}>Fyll i vad du betalar — se hur mycket du kan spara</div></div>
        <span style={{fontSize:13,fontWeight:700,color:C.mint,flexShrink:0}}>Testa →</span>
      </div>
            {/* FAMILY BANNER */}
      {cat!=="familj"&&<div onClick={()=>setCat("familj")} style={{display:"flex",alignItems:"center",gap:12,maxWidth:480,margin:"0 auto 18px",background:C.dark,border:"1px solid rgba(139,92,246,0.15)",borderRadius:12,padding:"10px 16px",cursor:"pointer",transition:"all .2s"}} className="family-banner" onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(139,92,246,0.35)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(139,92,246,0.15)";}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.violet} strokeWidth="1.5" style={{flexShrink:0}}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span style={{fontSize:12,fontWeight:700,color:C.text,flex:1}}>Familjekalkylator</span>
        <span style={{fontSize:8,fontWeight:700,color:C.ink,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,padding:"2px 8px",borderRadius:10,flexShrink:0}}>Unik funktion</span>
        <span style={{fontSize:11,fontWeight:700,color:C.violet,flexShrink:0}} className="fbc">Testa →</span>
      </div>}

      {/* CATEGORIES */}
      <div ref={br} style={{display:"flex",gap:6,justifyContent:"center",marginBottom:14,flexWrap:"wrap"}}>{CATEGORIES.map(c=>{const a=cat===c.id;const cnt=PLANS.filter(p=>p.categories.includes(c.id)).length;return(<button key={c.id} onClick={()=>setCat(c.id)} style={{padding:"8px 16px",borderRadius:10,border:a?`1.5px solid ${C.cyan}`:`1px solid ${C.surface}`,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:a?700:500,background:a?"rgba(0,180,216,0.08)":"rgba(255,255,255,0.02)",color:a?C.text:C.subtle,display:"flex",alignItems:"center",gap:6}}>{c.label}<span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:8,background:a?"rgba(0,180,216,0.15)":"rgba(255,255,255,0.04)",color:a?C.cyan:C.subtle}}>{cnt}</span></button>);})}</div>

      {/* SIDEBAR + CARDS LAYOUT */}
      {/* Mobile filter — hidden on desktop */}
      <div className="mb" style={{display:"none",marginBottom:12}}>
        <FilterBtn sf={sf} setSf={setSf} count={fl.length}/>
        {sf&&<div style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:14,padding:16,marginBottom:12,display:"flex",flexDirection:"column",gap:12,animation:"fadeIn .2s"}}>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{[{id:"billigast",l:"Billigast"},{id:"varde",l:"Bäst värde"},{id:"kampanj",l:"Kampanj"}].map(ch=>(<button key={ch.id} onClick={()=>applyChip(ch.id)} style={{padding:"5px 12px",borderRadius:16,border:chip===ch.id?`1px solid ${C.mint}`:`1px solid ${C.surface}`,background:chip===ch.id?"rgba(6,214,160,0.1)":"transparent",color:chip===ch.id?C.mint:C.subtle,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{ch.l}</button>))}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`,borderRadius:10,padding:"8px 14px"}}><input type="text" placeholder="Sök..." value={sq} onChange={e=>setSq(e.target.value)} style={{background:"transparent",border:"none",outline:"none",color:C.text,fontSize:13,fontFamily:"inherit",width:"100%"}}/></div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}><RangeSlider label="Max pris" min={100} max={sM} step={10} value={pm} onChange={setPm} dl={nM?"Alla":`${pm} kr`}/><RangeSlider label="Min surf" min={0} max={100} step={5} value={dm} onChange={setDm} dl={nS?"Obegr.":dm>0?`${dm} GB`:"Alla"}/></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>setFg(!fg)} style={{width:36,height:20,borderRadius:10,border:"none",background:fg?`linear-gradient(135deg,${C.cyan},${C.violet})`:"rgba(255,255,255,0.05)",cursor:"pointer",position:"relative"}}><div style={{width:14,height:14,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:fg?19:3,transition:"left .2s"}}/></button><span style={{fontSize:12,fontWeight:600,color:fg?C.cyan:C.subtle}}>Bara 5G</span></div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{OPERATORS.slice(0,8).map(op=>{const a=ops.includes(op.id);return(<button key={op.id} onClick={()=>setOps(p=>p.includes(op.id)?p.filter(o=>o!==op.id):[...p,op.id])} style={{display:"flex",alignItems:"center",gap:3,padding:"4px 10px",borderRadius:8,border:a?`1px solid ${op.color}66`:`1px solid ${C.surface}`,background:a?`${op.color}12`:"transparent",color:a?op.color:C.subtle,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}><span style={{width:6,height:6,borderRadius:"50%",background:a?op.color:"rgba(255,255,255,.1)"}}/>{op.name}</button>);})}{ops.length>0&&<button onClick={()=>setOps([])} style={{padding:"4px 8px",borderRadius:8,border:"1px solid rgba(239,68,68,.2)",color:"#f87171",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Rensa</button>}</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{SORT_OPTIONS.map(o=>(<button key={o.id} onClick={()=>setSb(o.id)} style={{padding:"4px 12px",borderRadius:8,border:sb===o.id?`1px solid rgba(0,180,216,.3)`:`1px solid ${C.surface}`,background:sb===o.id?"rgba(0,180,216,.06)":"transparent",color:sb===o.id?C.cyan:C.subtle,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{o.label}</button>))}</div>
        </div>}
      </div>
      {isF&&<div className="mb" style={{display:"none",marginBottom:12}}><FamilyCalc config={fc} onChange={setFc}/></div>}
      <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
        {/* Sidebar — desktop only */}
        <div className="sidebar" style={{width:220,flexShrink:0,position:"sticky",top:70,background:"rgba(255,255,255,0.03)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:16,display:"flex",flexDirection:"column",gap:14,boxShadow:"inset 0 1px 0 rgba(255,255,255,0.04)"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.subtle,textTransform:"uppercase"}}>Filter</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{[{id:"billigast",l:"Billigast"},{id:"varde",l:"Bäst värde"},{id:"kampanj",l:"Kampanj"}].map(ch=>(<button key={ch.id} onClick={()=>applyChip(ch.id)} style={{padding:"4px 10px",borderRadius:16,border:chip===ch.id?`1px solid ${C.mint}`:`1px solid ${C.surface}`,background:chip===ch.id?"rgba(6,214,160,0.1)":"transparent",color:chip===ch.id?C.mint:C.subtle,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{ch.l}</button>))}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`,borderRadius:8,padding:"6px 10px"}}><svg width="12" height="12" fill="none" stroke={C.subtle} strokeWidth="2"><circle cx="5" cy="5" r="4"/><path d="M8 8l3 3"/></svg><input type="text" placeholder="Sök..." value={sq} onChange={e=>setSq(e.target.value)} style={{background:"transparent",border:"none",outline:"none",color:C.text,fontSize:11,fontFamily:"inherit",width:"100%"}}/></div>
          <RangeSlider label="Max pris" min={100} max={sM} step={10} value={pm} onChange={setPm} dl={nM?"Alla":`${pm} kr`}/>
          <RangeSlider label="Min surf" min={0} max={100} step={5} value={dm} onChange={setDm} dl={nS?"Obegr.":dm>0?`${dm} GB`:"Alla"}/>
          <div style={{display:"flex",alignItems:"center",gap:6}}><button onClick={()=>setFg(!fg)} style={{width:32,height:16,borderRadius:8,border:"none",background:fg?`linear-gradient(135deg,${C.cyan},${C.violet})`:"rgba(255,255,255,0.05)",cursor:"pointer",position:"relative"}}><div style={{width:12,height:12,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:fg?17:3,transition:"left .2s"}}/></button><span style={{fontSize:10,fontWeight:600,color:fg?C.cyan:C.subtle}}>Bara 5G</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}><div style={{fontSize:10,fontWeight:600,color:C.subtle,textTransform:"uppercase",marginBottom:2}}>Operatörer</div>{OPERATORS.slice(0,8).map(op=>{const a=ops.includes(op.id);return(<button key={op.id} onClick={()=>setOps(p=>p.includes(op.id)?p.filter(o=>o!==op.id):[...p,op.id])} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 8px",borderRadius:6,border:"none",background:a?`${op.color}12`:"transparent",color:a?op.color:C.subtle,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}><span style={{width:6,height:6,borderRadius:"50%",background:a?op.color:"rgba(255,255,255,.1)",flexShrink:0}}/>{op.name}</button>);})}{ops.length>0&&<button onClick={()=>setOps([])} style={{padding:"2px 6px",borderRadius:6,border:"none",background:"transparent",color:"#f87171",fontSize:9,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>Rensa filter</button>}</div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}><div style={{fontSize:10,fontWeight:600,color:C.subtle,textTransform:"uppercase",marginBottom:2}}>Sortering</div>{SORT_OPTIONS.map(o=>(<button key={o.id} onClick={()=>setSb(o.id)} style={{padding:"3px 8px",borderRadius:6,border:"none",background:sb===o.id?"rgba(0,180,216,.06)":"transparent",color:sb===o.id?C.cyan:C.subtle,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>{sb===o.id?"→ ":""}{o.label}</button>))}</div>
          {isF&&<div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:12}}><div style={{fontSize:10,fontWeight:600,color:C.subtle,textTransform:"uppercase",marginBottom:8}}>Familj</div><div style={{display:"flex",flexDirection:"column",gap:6}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:10,color:C.muted}}>Vuxna</span><div style={{display:"flex",alignItems:"center",gap:4}}><button onClick={()=>setFc({...fc,adults:Math.max(1,fc.adults-1)})} style={{width:22,height:22,borderRadius:6,border:`1px solid ${C.surface}`,background:"transparent",color:C.text,fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button><span style={{fontSize:13,fontWeight:800,color:C.cyan,fontFamily:"'DM Mono',monospace",width:16,textAlign:"center"}}>{fc.adults}</span><button onClick={()=>setFc({...fc,adults:Math.min(6,fc.adults+1)})} style={{width:22,height:22,borderRadius:6,border:`1px solid rgba(139,92,246,0.3)`,background:"rgba(139,92,246,0.06)",color:"#a78bfa",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button></div></div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:10,color:C.muted}}>Barn</span><div style={{display:"flex",alignItems:"center",gap:4}}><button onClick={()=>setFc({...fc,children:Math.max(0,fc.children-1)})} style={{width:22,height:22,borderRadius:6,border:`1px solid ${C.surface}`,background:"transparent",color:fc.children<=0?C.surface2:C.text,fontSize:12,fontWeight:700,cursor:fc.children<=0?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button><span style={{fontSize:13,fontWeight:800,color:C.cyan,fontFamily:"'DM Mono',monospace",width:16,textAlign:"center"}}>{fc.children}</span><button onClick={()=>setFc({...fc,children:Math.min(6,fc.children+1)})} style={{width:22,height:22,borderRadius:6,border:`1px solid rgba(139,92,246,0.3)`,background:"rgba(139,92,246,0.06)",color:"#a78bfa",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button></div></div><div style={{fontSize:9,color:C.subtle,textAlign:"center"}}>{fc.adults+fc.children} personer</div></div></div>}
        </div>
        {/* Cards */}
        <div style={{flex:1,minWidth:0}}>
          {fl.length===0?<div style={{textAlign:"center",padding:"48px",color:C.subtle}}>Inga abonnemang matchar</div>:<div style={{display:"flex",flexDirection:"column",gap:8}}>{fl.map((p,i)=>(<PlanCard key={p.id} plan={p} familyConfig={fc} isFamily={isF} index={i}/>))}</div>}
        </div>
      </div>
      <NetworkMap/>
    </div>):(
    <div>
      <div style={{display:"flex",justifyContent:"center",padding:"20px 20px 0",gap:5,flexWrap:"wrap"}}>{MODES.map(m=>(<button key={m.id} onClick={()=>setMode(m.id)} style={{padding:"8px 16px",borderRadius:24,border:mode===m.id?"none":`1px solid ${C.surface}`,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:mode===m.id?`linear-gradient(135deg,${C.mint},${C.cyan})`:C.dark,color:mode===m.id?C.ink:C.muted}}>{m.l}</button>))}</div>
      {mode==="bredband"&&<BroadbandView/>}
      {mode==="tv"&&<TvViewTab/>}
      {mode==="streaming"&&<StreamingView/>}
      {mode==="telefoner"&&<PhoneView/>}
      {mode==="paket"&&<PaketView/>}
      {mode==="radgivare"&&<AdvisorView/>}
    </div>)}
  </div>);
}

// ═══ PAGES ═══
function PageOm(){return(<div style={{maxWidth:640,margin:"0 auto",padding:"48px 20px"}}><h1 style={{fontSize:"clamp(28px,5vw,44px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:10,background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Om Byyt</h1><p style={{fontSize:16,color:C.muted,marginBottom:32}}>Oberoende jämförelsetjänst. Gratis, transparent, på din sida.</p>{[{t:"Vad vi gör",x:"Jämför mobil, bredband, TV, streaming och telefoner. Unik familjekalkylator."},{t:"Byggt för alla",x:"Pris, surf, operatör, 5G. Sveriges mest kompletta jämförelseverktyg."},{t:"Kontakt",x:"kontakt@byyt.se"}].map((i,idx)=>(<div key={idx} style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"20px 24px",borderLeft:`3px solid ${C.mint}`,marginBottom:12}}><h2 style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:6}}>{i.t}</h2><p style={{fontSize:13,color:C.muted,lineHeight:1.7}}>{i.x}</p></div>))}</div>);}
function PagePriv(){const[oi,setOi]=useState(null);const s=[{t:"Ansvarig",c:"Byyt.se — kontakt@byyt.se"},{t:"Uppgifter",c:"IP (anon.), webbläsartyp, sidor."},{t:"Cookies",c:"Nödvändiga + GA4."},{t:"Affiliate",c:"Provision vid teckning. Priset påverkas inte."},{t:"GDPR",c:"Tillgång, rättelse, radering. kontakt@byyt.se"}];return(<div style={{maxWidth:680,margin:"0 auto",padding:"48px 20px"}}><h1 style={{fontSize:"clamp(24px,4vw,36px)",fontWeight:800,background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Integritetspolicy</h1><p style={{color:C.subtle,fontSize:12,marginBottom:28}}>Mars 2026</p>{s.map((x,i)=>{const o=oi===i;return(<div key={i} style={{background:o?C.surface:C.dark,borderRadius:10,border:`1px solid ${o?"rgba(0,180,216,.12)":"rgba(255,255,255,.04)"}`,overflow:"hidden",marginBottom:2}}><button onClick={()=>setOi(o?null:i)} style={{width:"100%",display:"flex",justifyContent:"space-between",padding:"12px 18px",background:"none",border:"none",color:C.text,fontSize:14,fontWeight:600,fontFamily:"inherit",cursor:"pointer",textAlign:"left"}}>{x.t}<span style={{color:C.cyan,transform:o?"rotate(45deg)":"none",transition:"transform .15s"}}>+</span></button>{o&&<div style={{padding:"0 18px 14px",color:C.muted,fontSize:13}}>{x.c}</div>}</div>);})}</div>);}
function PageKontakt(){return(<div style={{maxWidth:480,margin:"0 auto",padding:"48px 20px"}}><h1 style={{fontSize:"clamp(28px,5vw,42px)",fontWeight:800,background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6}}>Kontakt</h1><p style={{fontSize:14,color:C.muted,marginBottom:36}}>Svarar inom 24h.</p><div style={{display:"flex",flexDirection:"column",gap:12}}><a href="mailto:kontakt@byyt.se" style={{display:"flex",alignItems:"center",gap:14,background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"18px 22px",textDecoration:"none"}}><div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="18" height="18" fill="none" stroke="white" strokeWidth="2"><path d="M3 3h14c1 0 2 1 2 2v10c0 1-1 2-2 2H3c-1 0-2-1-2-2V5c0-1 1-2 2-2z"/><polyline points="19,5 10,12 1,5"/></svg></div><div><div style={{fontSize:10,color:C.subtle,fontWeight:600}}>E-post</div><div style={{fontSize:15,fontWeight:700,color:C.cyan}}>kontakt@byyt.se</div></div></a><a href="https://instagram.com/byyt.se" target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:14,background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"18px 22px",textDecoration:"none"}}><div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#833AB4,#FD1D1D,#F77737)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="18" height="18" fill="none" stroke="white" strokeWidth="2"><rect x="2" y="2" width="16" height="16" rx="4"/><circle cx="10" cy="10" r="3"/></svg></div><div><div style={{fontSize:10,color:C.subtle,fontWeight:600}}>Instagram</div><div style={{fontSize:15,fontWeight:700,color:"#e1306c"}}>@byyt.se</div></div></a></div></div>);}

function Footer({go}){return(<footer style={{borderTop:"1px solid rgba(255,255,255,.03)",padding:"32px 24px 24px",background:C.dark,marginTop:40}}><div style={{maxWidth:960,margin:"0 auto"}}><div style={{display:"flex",flexWrap:"wrap",justifyContent:"space-between",gap:24,marginBottom:20}}><div><ByytLogo size={28} onClick={()=>go("j")}/><p style={{fontSize:11,color:C.subtle,marginTop:6,maxWidth:220,lineHeight:1.5}}>Oberoende jämförelse för mobil, bredband, TV, streaming och telefoner.</p></div><div style={{display:"flex",gap:28}}><div><div style={{fontSize:10,color:C.subtle,fontWeight:600,textTransform:"uppercase",marginBottom:8}}>Sidor</div>{[{l:"Jämför",p:"j"},{l:"Om oss",p:"o"},{l:"Integritet",p:"p"},{l:"Kontakt",p:"k"}].map(i=>(<button key={i.p} onClick={()=>go(i.p)} style={{display:"block",background:"none",border:"none",padding:"2px 0",color:C.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{i.l}</button>))}</div><div><div style={{fontSize:10,color:C.subtle,fontWeight:600,textTransform:"uppercase",marginBottom:8}}>Socialt</div><a href="https://instagram.com/byyt.se" target="_blank" rel="noopener noreferrer" style={{color:C.muted,textDecoration:"none",fontSize:12}}>Instagram</a></div></div></div><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.surface2}}><span>© 2026 Byyt.se</span><span>Priser: mars 2026</span></div></div></footer>);}

function ByytApp(){
  const[pg,sPg]=useState("j");const[mm,sMm]=useState(false);
  const NAV=[{id:"j",l:"Jämför"},{id:"o",l:"Om oss"},{id:"p",l:"Integritet"},{id:"k",l:"Kontakt"}];
  const go=p=>{sPg(p);sMm(false);window.scrollTo({top:0,behavior:"smooth"});};
  return(
    <div style={{minHeight:"100vh",background:C.ink,color:C.text,fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",overflowX:"hidden"}}>
      <style>{`
        @keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes heroGlow{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.55;transform:scale(1.06)}}
        @keyframes scrollBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
        @keyframes featurePulse{0%,100%{border-color:rgba(34,197,94,0.15);box-shadow:none}50%{border-color:rgba(34,197,94,0.5);box-shadow:0 0 16px rgba(34,197,94,0.1)}}
        @keyframes filterPulse{0%,100%{border-color:rgba(0,180,216,0.2)}50%{border-color:rgba(0,180,216,0.5)}}
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.2);border-radius:3px}
        input[type=range]{-webkit-appearance:none;appearance:none;background:transparent}
        body{background:${C.ink}}
        @media(max-width:640px){.dn{display:none!important}.mb{display:flex!important;flex-direction:column}.pg{grid-template-columns:1fr!important}.fsl{flex-direction:column!important;gap:14px!important}.mw{padding:0 12px!important}.family-banner{flex-direction:column!important;gap:8px!important;text-align:center!important}.fbc{width:100%!important;text-align:center!important}.fgrid{grid-template-columns:repeat(3,1fr)!important;gap:6px!important}.sidebar{display:none!important}}
        @media(min-width:641px){.mb{display:none!important}}
      `}</style>
      <header style={{padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,.04)",backdropFilter:"blur(20px)",position:"sticky",top:0,zIndex:100,background:"rgba(8,14,26,.92)",height:60}}>
        <ByytLogo size={30} onClick={()=>go("j")}/>
        <nav style={{display:"flex",gap:2}} className="dn">{NAV.map(n=>{const a=pg===n.id;return(<button key={n.id} onClick={()=>go(n.id)} style={{padding:"6px 12px",borderRadius:8,border:"none",background:a?"rgba(0,180,216,.08)":"transparent",color:a?C.cyan:C.muted,fontSize:13,fontWeight:a?700:500,cursor:"pointer",fontFamily:"inherit"}}>{n.l}</button>);})}</nav>
        <button onClick={()=>sMm(!mm)} className="mb" style={{display:"none",background:"none",border:`1px solid ${C.surface}`,borderRadius:8,padding:"5px 8px",color:C.muted,cursor:"pointer",fontSize:14}}>☰</button>
      </header>
      {mm&&<div style={{position:"fixed",top:60,left:0,right:0,zIndex:99,background:C.dark,borderBottom:`1px solid ${C.surface}`,padding:10,display:"flex",flexDirection:"column",gap:2,animation:"fadeIn .15s"}}>{NAV.map(n=>(<button key={n.id} onClick={()=>go(n.id)} style={{padding:"10px 16px",borderRadius:10,border:"none",background:pg===n.id?"rgba(0,180,216,.06)":"transparent",color:pg===n.id?C.cyan:C.muted,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>{n.l}</button>))}</div>}
      <main style={{maxWidth:1200,margin:"0 auto",padding:"0 20px",position:"relative",zIndex:1}} className="mw">
        {pg==="j"&&<PageJamfor/>}
        {pg==="o"&&<PageOm/>}
        {pg==="p"&&<PagePriv/>}
        {pg==="k"&&<PageKontakt/>}
      </main>
      <Footer go={go}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ByytApp));
</script>
</body>
</html>
