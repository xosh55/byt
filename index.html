  const [mPersons, setMPersons] = useState(1);
  const [mSurf, setMSurf]       = useState(null);
  const [mStudent, setMStudent] = useState(false);
  const [mSenior, setMSenior]   = useState(false);
  const [mShowAll, setMShowAll] = useState(false);

    if (mStep < 2 || !mSurf) return [];

      const g = p => { let pr = p.campaignPrice || p.price; if (mFam && p.perExtra) pr += (mPersons - 1) * p.perExtra; return pr; };
      return g(a) - g(b);
    });
    return r;

      <a href="/radgivare.html" style={{textDecoration:"none",maxWidth:520,margin:"0 auto 24px",background:"linear-gradient(145deg,rgba(6,214,160,0.06),rgba(0,180,216,0.04))",border:"1.5px solid rgba(6,214,160,0.2)",borderRadius:16,padding:"16px 20px",cursor:"pointer",transition:"all .25s",display:"flex",alignItems:"center",gap:14}} onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(6,214,160,0.5)";e.currentTarget.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(6,214,160,0.2)";e.currentTarget.style.transform="none";}}>
        <div style={{width:40,height:40,borderRadius:12,background:"rgba(6,214,160,0.12)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.mint} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 3 5-7"/></svg></div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:800,color:C.text}}>Kolla ditt pris</div><div style={{fontSize:11,color:C.subtle,marginTop:2}}>Fyll i vad du betalar — se hur mycket du kan spara</div></div>
        <span style={{fontSize:13,fontWeight:700,color:C.mint,flexShrink:0}}>Testa →</span>
      </a>
      {mStep===-1&&<div style={{maxWidth:640,margin:"0 auto",animation:"fadeIn .4s ease-out .6s both"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10,textAlign:"center"}}>Populärast just nu</div>
        <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:20}}>
          {PLANS.filter(p=>p.categories.includes("privat")).sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price)).slice(0,4).map((p,i)=>{
            const oc=opColor(p.operator);const on=opName(p.operator);const hc=p.campaignPrice!==null;
            return(<div key={p.id} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flex:1}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:oc}}/>
                <span style={{fontSize:13,fontWeight:700,color:oc}}>{on}</span>
                <span style={{fontSize:11,color:C.muted}}>{p.data>=9999?"Obegr.":`${p.data} GB`}</span>
                {p.fiveG&&<span style={{fontSize:7,fontWeight:700,padding:"1px 4px",borderRadius:4,background:`linear-gradient(135deg,${C.cyan},${C.violet})`,color:"#fff"}}>5G</span>}
              </div>
              <span style={{fontSize:20,fontWeight:800,fontFamily:"'DM Mono',monospace",color:hc?C.mint:C.text}}>{hc?p.campaignPrice:p.price}</span>
              <span style={{fontSize:10,color:C.subtle,marginLeft:4}}>kr/mån</span>
              {hc&&<span style={{fontSize:10,color:C.subtle,textDecoration:"line-through",marginLeft:6}}>{p.price}</span>}
            </div>);
          })}
        </div>
        <button onClick={()=>setMStep(0)} style={{display:"block",width:"100%",maxWidth:400,margin:"0 auto",padding:"16px 24px",borderRadius:14,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit",border:"none",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform="none"}>Jämför alla mobilabonnemang →</button>
        <div style={{textAlign:"center",marginTop:8,fontSize:11,color:C.subtle}}>63 planer från 10 operatörer — hitta ditt på 10 sekunder</div>
      </div>}
      {mStep>=0&&mStep<2&&<div style={{maxWidth:600,margin:"0 auto"}}>
        {/* Step 0: Vem? */}
        {mStep===0&&<div style={{animation:"fadeIn .2s",textAlign:"center"}}>
          <div style={{fontSize:11,fontWeight:600,color:C.cyan,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Steg 1 av 2</div>
          <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:6}}>Vem är abonnemanget för?</div>
          <div style={{fontSize:13,color:C.subtle,marginBottom:24}}>Välj nedan så filtrerar vi fram de bästa planerna åt dig</div>
          <div style={{display:"flex",gap:12,maxWidth:400,margin:"0 auto"}}>
            <Choice label="Bara mig" sub="1 abonnemang" active={false} onClick={()=>{setMFam(false);setMPersons(1);setMStep(1);}}/>
            <Choice label="Familj" sub="2–5 personer" active={mFam} onClick={()=>setMFam(true)}/>
          </div>
          {mFam&&<div style={{marginTop:16,animation:"fadeIn .15s"}}>
            <div style={{fontSize:13,fontWeight:600,color:C.muted,marginBottom:10}}>Hur många är ni?</div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>{[2,3,4,5].map(n=>(<button key={n} onClick={()=>{setMPersons(n);setMStep(1);}} style={{width:48,height:48,borderRadius:12,border:`1px solid rgba(255,255,255,0.06)`,background:"rgba(255,255,255,0.02)",color:C.muted,fontSize:20,fontWeight:800,cursor:"pointer",fontFamily:"'DM Mono',monospace",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.violet;e.currentTarget.style.color=C.text;}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.06)";e.currentTarget.style.color=C.muted;}}>{n}</button>))}</div>
          </div>}
        </div>}

        {/* Step 1: Surf */}
        {mStep===1&&<div style={{animation:"fadeIn .2s",textAlign:"center"}}>
          <button onClick={()=>{setMStep(0);setMSurf(null);setMStudent(false);setMSenior(false);}} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:C.cyan,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:16,padding:0}}>← Tillbaka</button>
          <div style={{fontSize:11,fontWeight:600,color:C.cyan,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Steg 2 av 2</div>
          <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:6}}>Hur mycket surf behöver {mFam?"ni":"du"}?</div>
          <div style={{fontSize:13,color:C.subtle,marginBottom:24}}>Vi visar bara planer som matchar</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,maxWidth:400,margin:"0 auto"}}>
            <Choice label="Lite" sub="5–10 GB" onClick={()=>{setMSurf(5);setMStep(2);}}/>
            <Choice label="Lagom" sub="20–30 GB" onClick={()=>{setMSurf(20);setMStep(2);}}/>
            <Choice label="Mycket" sub="50–100 GB" onClick={()=>{setMSurf(50);setMStep(2);}}/>
            <Choice label="Obegränsad" sub="Utan gräns" onClick={()=>{setMSurf(9999);setMStep(2);}}/>
          </div>
          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:20}}>
            <button onClick={()=>{setMStudent(!mStudent);setMSenior(false);}} style={{padding:"12px 24px",borderRadius:12,border:mStudent?`1.5px solid ${C.cyan}`:`1px solid rgba(255,255,255,0.06)`,background:mStudent?"rgba(0,180,216,0.06)":"rgba(255,255,255,0.02)",color:mStudent?C.text:C.muted,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Jag är student</button>
            <button onClick={()=>{setMSenior(!mSenior);setMStudent(false);}} style={{padding:"12px 24px",borderRadius:12,border:mSenior?`1.5px solid ${C.cyan}`:`1px solid rgba(255,255,255,0.06)`,background:mSenior?"rgba(0,180,216,0.06)":"rgba(255,255,255,0.02)",color:mSenior?C.text:C.muted,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Jag är senior</button>
          </div>
        </div>}
      </div>}
      {mStep===2&&<div style={{maxWidth:640,margin:"0 auto",animation:"fadeIn .2s"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button onClick={()=>{setMStep(1);setMShowAll(false);}} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:C.cyan,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",padding:0}}>← Ändra</button>
          <div style={{fontSize:12,color:C.subtle}}>{mResults.length} planer · {mFam?mPersons+" pers":"Singel"} · {mSurf>=9999?"Obegr.":mSurf+"+ GB"}{mStudent?" · Student":""}{mSenior?" · Senior":""}</div>
        </div>
        {mResults.length===0&&<div style={{textAlign:"center",padding:40,color:C.subtle}}>Inga planer matchar. Prova annat surfval.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {mResults.map((p,i)=>{
            const oc=opColor(p.operator);const on=opName(p.operator);
            const dl=p.data>=9999?"Obegränsad":`${p.data} GB`;
            const hc=p.campaignPrice!==null;
            let tp=p.price;
            if(mFam&&p.perExtra)tp=p.price+(mPersons-1)*p.perExtra;
            const price=hc?p.campaignPrice:tp;
            const bd=BUNDLE_DISCOUNTS[p.operator]||0;
            return(<MobilCard key={p.id} p={p} oc={oc} on={on} dl={dl} hc={hc} tp={tp} price={price} bd={bd} mFam={mFam} mPersons={mPersons} i={i} defaultOpen={true}/>);
          })}
        </div>
        <NetworkMap/>
      </div>}
      </div>
    </Page>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<MobilPage/>);
</script>
</body>
</html>
