<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2306D6A0'/><stop offset='50%25' stop-color='%2300B4D8'/><stop offset='100%25' stop-color='%238B5CF6'/></linearGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/><g stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'><path d='M8 11L19 11'/><polyline points='16,8 19,11 16,14'/><path d='M24 21L13 21'/><polyline points='16,18 13,21 16,24'/></g></svg>">
<link rel="stylesheet" href="shared.css">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
</head>
<body>
<a href="#main" class="skip-link">Hoppa till innehåll</a>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

// ── Surf Wizard ──
const SURF_OPTIONS = [
  { id: 'lite', label: 'Lite', sub: '1–5 GB', detail: 'Mail & surf', icon: '📱' },
  { id: 'lagom', label: 'Lagom', sub: '5–15 GB', detail: 'Social media', icon: '📲' },
  { id: 'mycket', label: 'Mycket', sub: '15–50 GB', detail: 'Streaming', icon: '🎬' },
  { id: 'obegransad', label: 'Obegränsad', sub: '∞', detail: 'Allt utan gräns', icon: '⚡' },
];

function SurfWizard() {
  return (
    <div style={{ padding: '20px', background: 'var(--card)', borderRadius: 'var(--radius-xl)', border: '1px solid var(--border)' }}>
      <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 4 }}>Hur mycket surf behöver du?</div>
      <div style={{ fontSize: 12, color: 'var(--sub)', marginBottom: 14 }}>Välj och jämför direkt</div>
      <div className="wizard-grid">
        {SURF_OPTIONS.map(opt => (
          <a
            key={opt.id}
            href={`mobil.html?surf=${opt.id}`}
            className="wizard-option"
            role="button"
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 20 }} aria-hidden="true">{opt.icon}</span>
              <div>
                <div className="wizard-option-title">{opt.label}</div>
                <div className="wizard-option-sub">{opt.sub}</div>
              </div>
            </div>
            <div className="wizard-option-detail">{opt.detail}</div>
          </a>
        ))}
      </div>
    </div>
  );
}

// ── Popular Plan Card ──
function PopularCard({ plan, index }) {
  const [expanded, setExpanded] = useState(false);
  const op = OPERATORS.find(o => o.id === plan.operator);
  const color = op ? op.color : '#94A3B8';
  const name = op ? op.name : plan.operator;
  const hasCampaign = plan.campaignPrice !== null;
  const price = hasCampaign ? plan.campaignPrice : plan.price;
  const dataLabel = plan.data >= 9999 ? 'Obegränsad' : plan.data + ' GB';

  return (
    <div
      className={`result-card ${expanded ? 'expanded' : ''}`}
      onClick={() => setExpanded(!expanded)}
      role="button"
      tabIndex={0}
      aria-expanded={expanded}
      onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setExpanded(!expanded); }}}
      style={{ animation: `cardIn 0.2s ease-out ${index * 0.05}s both` }}
    >
      <div style={{ display: 'flex', alignItems: 'center' }}>
        <OperatorLogo name={plan.operator} size={40} />
        <div style={{ flex: 1, marginLeft: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color }}>{name}</span>
            {hasCampaign && <span className="badge badge-campaign">Kampanj</span>}
          </div>
          <div style={{ fontSize: 12, color: 'var(--sub)' }}>
            {dataLabel} · {plan.network}{plan.fiveG ? ' · 5G' : ''}
          </div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'flex-end', gap: 3 }}>
            <span style={{ fontSize: 22, fontWeight: 800, fontFamily: "'DM Mono', monospace", color: hasCampaign ? 'var(--mint)' : 'var(--text)' }}>{price}</span>
            <span style={{ fontSize: 10, color: 'var(--muted)' }}>kr</span>
          </div>
          {hasCampaign && (
            <div style={{ fontSize: 10, color: 'var(--muted)', textDecoration: 'line-through' }}>{plan.price} kr</div>
          )}
        </div>
      </div>

      {!expanded && (
        <div style={{ textAlign: 'center', marginTop: 6, paddingTop: 4, borderTop: '1px solid var(--border)' }}>
          <span style={{ fontSize: 10, fontWeight: 600, color: 'var(--cyan)', opacity: 0.6 }}>Visa detaljer</span>
        </div>
      )}

      {expanded && (
        <div className="details" onClick={e => e.stopPropagation()} style={{ animation: 'fadeInFast 0.15s' }}>
          {plan.perks.length > 0 && (
            <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 8 }}>
              {plan.perks.map((p, i) => <span key={i} className="perk">{p}</span>)}
            </div>
          )}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, fontSize: 11, color: 'var(--sub)', marginBottom: 10 }}>
            <span>{plan.speedMbps} Mbit/s</span>
            <span>{plan.network}-nätet</span>
            <span>{plan.bindingMonths === 0 ? 'Ingen bindning' : plan.bindingMonths + ' mån'}</span>
          </div>
          {hasCampaign && (
            <div style={{ fontSize: 11, color: 'var(--sub)', marginBottom: 8 }}>
              Kampanj {plan.campaignMonths} mån, sedan {plan.price} kr.
              Årskostnad: <strong style={{ color: 'var(--text)' }}>
                {plan.campaignPrice * plan.campaignMonths + plan.price * (12 - plan.campaignMonths)} kr
              </strong>
            </div>
          )}
          <a
            href={plan.affiliateUrl}
            target="_blank"
            rel="noopener noreferrer sponsored"
            className="cta cta-operator cta-full"
            style={{ background: `linear-gradient(135deg, ${color}, ${color}dd)` }}
            onClick={e => e.stopPropagation()}
          >
            Gå till {name} →
          </a>
          <div className="disclosure">Vi får provision — ditt pris påverkas inte</div>
        </div>
      )}
    </div>
  );
}

// ── Main App ──
function HomePage() {
  // Get 3 most popular (cheapest campaign or cheapest price, varied operators)
  const popular = useMemo(() => {
    const withCampaign = PLANS.filter(p => p.campaignPrice !== null && p.categories.includes('privat'));
    const sorted = withCampaign.sort((a, b) => a.campaignPrice - b.campaignPrice);
    // Pick top 3 from different operators
    const picked = [];
    const seen = new Set();
    for (const p of sorted) {
      if (!seen.has(p.operator) && picked.length < 3) {
        picked.push(p);
        seen.add(p.operator);
      }
    }
    return picked;
  }, []);

  const categories = [
    { icon: '🌐', label: 'Bredband', href: 'bredband.html' },
    { icon: '📺', label: 'TV-paket', href: 'tv.html' },
    { icon: '🎬', label: 'Streaming', href: 'streaming.html' },
    { icon: '📞', label: 'Telefoner', href: 'telefoner.html' },
  ];

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', color: 'var(--text)' }}>
      <NavBar />

      <main id="main" className="container">
        {/* HERO */}
        <section className="hero" aria-label="Hitta billigaste abonnemanget">
          <div className="hero-badge">
            <span className="hero-badge-dot" aria-hidden="true"></span>
            Uppdaterad april 2026
          </div>
          <h1>
            <span className="text-gradient">Hitta billigaste</span><br />
            abonnemanget
          </h1>
          <p className="hero-sub">
            Jämför {PLANS.length}+ abonnemang från alla operatörer.<br />
            Oberoende. 30 sekunder.
          </p>
          <SurfWizard />
        </section>

        {/* POPULAR */}
        <section className="section" aria-label="Populäraste abonnemangen">
          <div className="section-title">
            <span aria-hidden="true">🔥</span> Populärast just nu
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {popular.map((plan, i) => (
              <PopularCard key={plan.id} plan={plan} index={i} />
            ))}
          </div>
        </section>

        {/* TRUST */}
        <div className="trust-bar" role="list" aria-label="Fördelar">
          <div className="trust-item" role="listitem"><span aria-hidden="true">🔒</span> Oberoende</div>
          <div className="trust-item" role="listitem"><span aria-hidden="true">🔄</span> Dagliga priser</div>
          <div className="trust-item" role="listitem"><span aria-hidden="true">💰</span> Alltid gratis</div>
        </div>

        {/* ADVISOR CTA */}
        <section className="section" aria-label="Rådgivare">
          <a href="totalkostnad.html" className="promo-card" style={{ display: 'block' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{
                width: 44, height: 44, borderRadius: 12,
                background: 'var(--gradient)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 20, flexShrink: 0
              }} aria-hidden="true">✦</div>
              <div>
                <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 2 }}>Osäker? Svara på 3 frågor</div>
                <div style={{ fontSize: 12, color: 'var(--sub)' }}>Vi hittar rätt abonnemang åt dig</div>
              </div>
              <div style={{ marginLeft: 'auto', fontSize: 18, color: 'var(--mint)' }} aria-hidden="true">→</div>
            </div>
          </a>
        </section>

        {/* CATEGORIES */}
        <section className="section" aria-label="Kategorier">
          <div className="section-title">Jämför mer</div>
          <div className="cat-grid">
            {categories.map(cat => (
              <a key={cat.label} href={cat.href} className="cat-card">
                <div className="cat-card-icon" aria-hidden="true">{cat.icon}</div>
                <div className="cat-card-text">{cat.label}</div>
              </a>
            ))}
          </div>
        </section>
      </main>

      <Footer />
      <BottomTabs active="home" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<HomePage />);
</script>
</body>
</html>
