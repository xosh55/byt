function RangeSlider({label,min,max,value,onChange,step=1,dl}){const pct=((value-min)/(max-min))*100;return(<div style={{flex:1,minWidth:140}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase"}}>{label}</span><span style={{fontSize:12,fontWeight:700,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{dl}</span></div><div style={{position:"relative",height:16,display:"flex",alignItems:"center"}}><div style={{position:"absolute",left:0,right:0,height:3,borderRadius:2,background:"rgba(255,255,255,0.05)"}}/><div style={{position:"absolute",left:0,width:`${pct}%`,height:3,borderRadius:2,background:`linear-gradient(90deg,${C.mint},${C.cyan})`}}/><input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(+e.target.value)} style={{position:"absolute",width:"100%",height:16,opacity:0,cursor:"pointer",zIndex:2}}/><div style={{position:"absolute",left:`${pct}%`,transform:"translateX(-50%)",width:14,height:14,borderRadius:"50%",background:"#fff",boxShadow:`0 0 6px ${C.cyan}44`,pointerEvents:"none"}}/></div></div>);}

  const[step,setStep]=useState(0);const[phBrand,setPhBrand]=useState(null);
  const bOps=["telia","tele2","telenor","tre"];
  const famExtra={telia:239,tele2:169,tre:149,telenor:199};

  const surfMin=surfLvl==="10gb"?5:surfLvl==="30gb"?20:surfLvl==="obegr"?9999:0;
  const mO=PLANS.filter(p=>p.categories.includes(isFam?"familj":"privat")&&bOps.includes(p.operator)&&p.data>=surfMin).sort((a,b)=>a.price-b.price);
  const pO=PHONES.filter(ph=>ph.ops.some(o=>bOps.includes(o.o))).sort((a,b)=>Math.min(...a.ops.map(o=>o.p))-Math.min(...b.ops.map(o=>o.p)));
  const bO=BROADBAND.filter(b=>bOps.includes(b.operator)).sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price));
  const selOp=sm?.operator||null;
  const bbS=useMemo(()=>{if(!selOp)return bO;return[...bO.filter(b=>b.operator===selOp),...bO.filter(b=>b.operator!==selOp)];},[selOp,bO]);

  // TV filtered by size + operator priority
  const bbOp=sb?.operator||null;
  const tvBySize=useMemo(()=>{
    if(!bbOp)return[];
    let plans=TV_PLANS.filter(t=>t.operator===bbOp&&t.type!=="streaming");
    if(tvSize==="bas")plans=plans.filter(t=>t.size==="bas");

    if(wantSport)plans=[...TV_PLANS.filter(t=>t.operator===bbOp&&t.size==="sport"),...plans.filter(t=>t.size!=="sport")];
    else plans=plans.filter(t=>t.size!=="sport");
    plans.sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price));
    return plans;
  },[tvSize,wantSport,bbOp]);

  // INGAR logic
  const getIncluded=()=>{
    const inc=new Set();
    if(sm&&sm.operator==="telia"&&sm.name){
      if(sm.name.includes("3-i-1")||sm.name.includes("Netflix, HBO")){["netflix","hbomax","disneyplus"].forEach(s=>inc.add(s));}
      else if(sm.name.includes("Netflix"))inc.add("netflix");
      else if(sm.name.includes("Disney"))inc.add("disneyplus");
      else if(sm.name.includes("HBO")||sm.name.includes("Max"))inc.add("hbomax");

    if(stv&&stv.streamIncludes){stv.streamIncludes.forEach(s=>inc.add(s));}
    return inc;
  };

  const streamPicks=[
    {id:"netflix",name:"Netflix",price:149},{id:"hbomax",name:"HBO Max",price:119},{id:"disneyplus",name:"Disney+",price:109},
    {id:"viaplaytotal",name:"Viaplay Total",price:449},{id:"prime",name:"Amazon Prime",price:69},
    {id:"skyshowtime",name:"SkyShowtime",price:89},{id:"tv4sport",name:"TV4 Sport Fotboll",price:249},
    {id:"tv4hockey",name:"TV4 Sport Hockey",price:249},

  const toggleStr=id=>setSstr(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const included=getIncluded();
  const strTotal=sstr.reduce((s,id)=>{if(included.has(id))return s;const f=streamPicks.find(x=>x.id===id);return s+(f?f.price:0);},0);

  const res=useMemo(()=>{if(!sm)return[];return bOps.map(op=>{
    const mp=mO.filter(p=>p.operator===op),bp=bO.filter(b=>b.operator===op);
    if(!mp.length)return null;
    const bM=mp.find(p=>p.data>=surfMin)||mp[mp.length-1];
    if(!bM)return null;
    let bB=null,bP=0;
    if(sb&&bp.length){bB=bp.find(b=>b.speedDown>=(sb?.speedDown||0))||bp[bp.length-1];if(bB)bP=bB.campaignPrice||bB.price;}
    let mP=bM.campaignPrice||bM.price;
    if(isFam)mP=mP+(famN-1)*(famExtra[op]||199);
    const d=(sb&&bB&&bB.operator===op)?BUNDLE_DISCOUNTS[op]||0:0;
    let tP=0,bT=null;
    if(stv){const tvOps=TV_PLANS.filter(t=>t.operator===op&&t.type!=="streaming");
      if(tvOps.length){
        if(stv.operator===op){bT=stv;}
        else{
          const stvPrice=stv.campaignPrice||stv.price;
          const sorted=[...tvOps].sort((a,b)=>Math.abs((a.campaignPrice||a.price)-stvPrice)-Math.abs((b.campaignPrice||b.price)-stvPrice));
          if(wantSport)bT=sorted.find(t=>t.size==="sport")||sorted[sorted.length-1];
          else bT=sorted.find(t=>t.size===tvSize)||sorted[0];
        }
        if(bT)tP=bT.campaignPrice||bT.price;
      }
    }
    // Per-operator included streaming
    const opInc=new Set();
    if(bM.operator==="telia"&&bM.name){
      if(bM.name.includes("3-i-1")||bM.name.includes("Netflix, HBO")){["netflix","hbomax","disneyplus"].forEach(s=>opInc.add(s));}
      else if(bM.name.includes("Netflix"))opInc.add("netflix");
      else if(bM.name.includes("Disney"))opInc.add("disneyplus");
      else if(bM.name.includes("HBO")||bM.name.includes("Max"))opInc.add("hbomax");
    }
    if(bT&&bT.streamIncludes)bT.streamIncludes.forEach(s=>opInc.add(s));
    const opStrTotal=sstr.reduce((s,id)=>{if(opInc.has(id))return s;const f=streamPicks.find(x=>x.id===id);return s+(f?f.price:0);},0);
    let phP=0,phNames=[];
    phones.forEach(ph=>{const opPrice=ph.ops.find(o=>o.o===op);if(opPrice){phP+=opPrice.p;phNames.push(ph.name);}});
    return{op,bM,bB,bT,phNames,mP,bP,tP,phP,strTotal:opStrTotal,opInc,d,total:mP+bP+tP+phP+opStrTotal-d,is5g:bB&&bB.type==="5g"};
  }).filter(Boolean).sort((a,b)=>a.total-b.total);},[sm,sb,stv,phones,sstr,isFam,famN,surfLvl,tvSize,wantSport]);

  const Dot=({n,l,a,done})=>(<div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,background:done?C.mint:a?"rgba(6,214,160,0.15)":C.surface,color:done?C.ink:a?C.mint:C.subtle}}>{done?"✓":n}</div><span style={{fontSize:10,fontWeight:600,color:a?C.text:C.subtle}}>{l}</span></div>);
  const Pick=({item,sel:s,onP,l1,l2,col,discount,samla})=>(<div onClick={onP} style={{background:s?"rgba(6,214,160,0.06)":C.dark,border:`1px solid ${samla?"rgba(6,214,160,0.5)":discount>0&&!s?"rgba(6,214,160,0.35)":s?C.mint:C.surface}`,borderRadius:14,padding:14,cursor:"pointer",transition:"all .15s",position:"relative"}}>{samla&&<div style={{position:"absolute",top:-1,left:0,right:0,textAlign:"center"}}><span style={{fontSize:9,fontWeight:800,color:C.ink,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,padding:"3px 14px",borderRadius:"0 0 10px 10px",display:"inline-block"}}>SAMLA & FÅ {discount} KR RABATT</span></div>}{discount>0&&!samla&&!s&&<div style={{position:"absolute",top:-1,right:12,fontSize:8,fontWeight:700,color:C.ink,background:C.mint,padding:"1px 8px",borderRadius:"0 0 8px 8px"}}>-{discount} kr</div>}<div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:2,marginTop:samla?10:0}}>{l1}</div><div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>{item.name||""}</div><div style={{display:"flex",alignItems:"baseline",gap:3}}><span style={{fontSize:22,fontWeight:800,color:col||C.mint,fontFamily:"'DM Mono',monospace"}}>{item.campaignPrice||item.price||0}</span><span style={{fontSize:10,color:C.subtle}}>kr/mån</span><span style={{marginLeft:"auto",fontSize:12,fontWeight:700,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{l2}</span></div></div>);
  const SkipBtn=({label,onSkip})=>(<button onClick={onSkip} style={{width:"100%",padding:"14px 20px",borderRadius:12,background:"rgba(6,214,160,0.06)",border:"1.5px solid rgba(6,214,160,0.3)",color:C.mint,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"center",marginBottom:16}}>{label}</button>);
  const BackBtn=({onBack})=>(<button onClick={onBack} style={{display:"flex",alignItems:"center",gap:6,marginBottom:16,background:C.dark,border:`1.5px solid ${C.cyan}40`,color:C.cyan,padding:"10px 20px",borderRadius:12,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Tillbaka</button>);
  const resetAll=()=>{setStep(0);setIsFam(null);setSm(null);setPhones([]);setSb(null);setStv(null);setSstr([]);setPhBrand(null);setSurfLvl(null);setTvSize(null);setWantSport(null);setSportPicks([]);};

  return(<div>
    <section style={{textAlign:"center",padding:"36px 20px 20px"}}><h2 style={{fontSize:"clamp(24px,4vw,40px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:6,color:C.text}}><span style={{background:`linear-gradient(135deg,${C.mint},${C.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Allt-i-ett</span></h2><p style={{fontSize:14,color:C.subtle}}>Bygg ditt paket steg för steg — se totalkostnaden.</p></section>
    {step>0&&<div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:20,flexWrap:"wrap"}}>
      <Dot n={1} l={isFam?`Familj (${famN})`:"Singel"} a={step<=1} done={step>1}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={2} l="Surf" a={step===2} done={step>2}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={3} l="Mobil" a={step===3} done={step>3}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={4} l="Telefon" a={step===4} done={step>4}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={5} l="Bredband" a={step===5} done={step>5}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={6} l="TV" a={step>=6&&step<=8} done={step>8}/>
      <div style={{width:8,height:1,background:C.surface,margin:"auto"}}/>
      <Dot n={7} l="Resultat" a={step===9}/>

    {/* Step 0: Singel / Familj */}

        <div style={{width:48,height:48,borderRadius:14,background:"rgba(0,180,216,0.1)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.cyan} strokeWidth="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg></div>
        <div style={{fontSize:16,fontWeight:800,color:C.text}}>Bara mig</div><div style={{fontSize:11,color:C.subtle,marginTop:4}}>1 person</div>

        <div style={{width:48,height:48,borderRadius:14,background:"rgba(139,92,246,0.1)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.violet} strokeWidth="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
        <div style={{fontSize:16,fontWeight:800,color:C.text}}>Familj</div><div style={{fontSize:11,color:C.subtle,marginTop:4}}>2–6 personer</div>
      </div>
    </div>}

    </div>}

    {/* Step 2: Surf */}
    {step===2&&<div style={{textAlign:"center"}}><BackBtn onBack={()=>{setStep(isFam?1:0);setSurfLvl(null);}}/>

      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        {[{id:"10gb",l:"10 GB",desc:"Mestadels wifi",col:C.subtle},{id:"30gb",l:"30 GB",desc:"Vardagssurfande",col:C.cyan},{id:"obegr",l:"Obegränsad",desc:"Streama fritt",col:C.mint}].map(s=>(<div key={s.id} onClick={()=>{setSurfLvl(s.id);setStep(3);}} style={{background:C.dark,border:`1.5px solid ${C.surface}`,borderRadius:16,padding:"24px 28px",cursor:"pointer",textAlign:"center",transition:"all .2s",flex:"0 1 200px"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=s.col;e.currentTarget.style.transform="translateY(-3px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;e.currentTarget.style.transform="none";}}>
          <div style={{fontSize:28,fontWeight:800,color:s.col,fontFamily:"'DM Mono',monospace",marginBottom:6}}>{s.l}</div>
          <div style={{fontSize:11,color:C.subtle}}>{s.desc}</div>
        </div>))}
      </div>
    </div>}

    {/* Step 3: Mobil */}
    {step===3&&<div><BackBtn onBack={()=>{setStep(2);setSm(null);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Välj mobilabonnemang</div>
      <div style={{fontSize:11,color:C.subtle,marginBottom:14}}>{surfLvl==="obegr"?"Obegränsad surf":surfLvl==="30gb"?"Minst 30 GB":"Minst 10 GB"}{isFam?` · ${famN} personer`:""}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>{mO.slice(0,12).map(p=>(<Pick key={p.id} item={p} sel={sm?.id===p.id} onP={()=>{setSm(p);setStep(4);}} l1={opName(p.operator)} l2={p.data>=9999?"Obegr.":p.data+" GB"} col={C.mint} discount={0} samla={false}/>))}</div>
    </div>}

    {/* Step 4: Telefon */}
    {step===4&&<div><BackBtn onBack={()=>{setStep(3);setPhones([]);setPhBrand(null);}}/>
      <SkipBtn label={isFam?"Inga nya telefoner — hoppa över →":"Jag har redan telefon — hoppa över →"} onSkip={()=>{setPhones([]);setPhBrand(null);setStep(5);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}}>Välj telefoner</div>
      {phones.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
        {phones.map((ph,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:10,background:"rgba(6,214,160,0.06)",border:`1px solid rgba(6,214,160,0.2)`}}><span style={{fontSize:11,fontWeight:600,color:C.text}}>#{i+1} {ph.name}</span><button onClick={()=>setPhones(phones.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#f87171",fontSize:14,cursor:"pointer",padding:0}}>×</button></div>))}
        <button onClick={()=>setStep(5)} style={{padding:"8px 20px",borderRadius:10,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:12,fontWeight:800,cursor:"pointer",border:"none",fontFamily:"inherit"}}>{phones.length} valda — fortsätt →</button>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[{b:"Apple",col:"#94A3B8"},{b:"Samsung",col:"#1428A0"},{b:"Google",col:"#4285F4"},{b:"OnePlus",col:"#F5010C"}].map(({b,col})=>(<div key={b} onClick={()=>setPhBrand(phBrand===b?null:b)} style={{background:phBrand===b?"rgba(0,180,216,0.08)":C.dark,border:phBrand===b?`2px solid ${C.cyan}`:`1px solid ${C.surface}`,borderRadius:14,padding:"16px 12px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
          <div style={{fontSize:15,fontWeight:800,color:phBrand===b?C.text:C.muted}}>{b}</div>
          <div style={{fontSize:10,color:C.subtle,marginTop:2}}>{pO.filter(ph=>ph.brand===b).length} modeller</div>
        </div>))}
      </div>
      {phBrand&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:8,animation:"fadeIn .15s"}}>{pO.filter(ph=>ph.brand===phBrand).map(ph=>{const cheapOp=ph.ops.find(o=>o.o===selOp)||ph.ops[0];const canAdd=phones.length<5;return(<div key={ph.id} onClick={()=>{if(canAdd)setPhones([...phones,ph]);}} style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:12,padding:14,cursor:canAdd?"pointer":"not-allowed",opacity:canAdd?1:.4,transition:"all .15s"}} onMouseEnter={e=>{if(canAdd)e.currentTarget.style.borderColor="rgba(0,180,216,0.3)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text}}>{ph.name}</div>
        <div style={{fontSize:10,color:C.subtle,marginBottom:6}}>{ph.storage}</div>
        <span style={{fontSize:20,fontWeight:800,color:C.mint,fontFamily:"'DM Mono',monospace"}}>{cheapOp.p}</span><span style={{fontSize:10,color:C.subtle}}> kr/mån</span>
      </div>);})}</div>}
    </div>}

    {/* Step 5: Bredband */}
    {step===5&&<div><BackBtn onBack={()=>{setStep(4);setSb(null);}}/>
      <SkipBtn label="Jag har redan bredband — hoppa över →" onSkip={()=>{setSb(null);setTvSize(null);setWantSport(null);setStv(null);setStep(8);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Välj bredband</div>
      {selOp&&<div style={{fontSize:12,color:C.mint,marginBottom:12,fontWeight:600}}>Samla med {opName(selOp)} och få {BUNDLE_DISCOUNTS[selOp]||0} kr rabatt/mån</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>{bbS.slice(0,12).map(b=>{const isSame=b.operator===selOp;const disc=isSame?(BUNDLE_DISCOUNTS[selOp]||0):0;return(<Pick key={b.id} item={b} sel={sb?.id===b.id} onP={()=>{setSb(b);const hasTv=TV_PLANS.some(t=>t.operator===b.operator&&t.type!=="streaming");setStep(hasTv?6:8);}} l1={opName(b.operator)+(b.type==="5g"?" (5G Hem)":"")} l2={b.speedDown>=1000?"1 Gbit":b.speedDown+" Mbit"} col={C.cyan} discount={disc} samla={isSame&&disc>0}/>);})}</div>
    </div>}

    {/* Step 6: TV - storlek */}
    {step===6&&<div><BackBtn onBack={()=>{setStep(5);setTvSize(null);setWantSport(null);setStv(null);}}/>
      <SkipBtn label="Hoppa över TV — gå till streaming →" onSkip={()=>{setTvSize(null);setWantSport(null);setStv(null);setStep(8);}}/>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Hur stort TV-paket?</div>
      <div style={{fontSize:11,color:C.subtle,marginBottom:16}}>TV via {bbOp?opName(bbOp):"din bredbandsleverantör"}</div>
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        {[{id:"bas",l:"Bas",desc:"~20 kanaler\nGrundutbud",col:C.subtle},{id:"mellan",l:"Mellan",desc:"~40 kanaler\nFilm & serier",col:C.cyan},{id:"stor",l:"Stort",desc:"~60 kanaler\nAllt för familjen",col:C.violet}].map(s=>(<div key={s.id} onClick={()=>{setTvSize(s.id);setStep(7);}} style={{background:C.dark,border:`1.5px solid ${C.surface}`,borderRadius:16,padding:"22px 24px",cursor:"pointer",textAlign:"center",transition:"all .2s",flex:"0 1 180px"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=s.col;e.currentTarget.style.transform="translateY(-3px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.surface;e.currentTarget.style.transform="none";}}>
          <div style={{fontSize:20,fontWeight:800,color:s.col,marginBottom:6}}>{s.l}</div>
          <div style={{fontSize:11,color:C.subtle,whiteSpace:"pre-line"}}>{s.desc}</div>
        </div>))}
      </div>
    </div>}

    {/* Step 7: Sport? */}
    {step===7&&<div><BackBtn onBack={()=>{setStep(6);setWantSport(null);setStv(null);}}/>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8,marginBottom:16}}>{streamPicks.map(s=>{const free=included.has(s.id);const active=sstr.includes(s.id);return(<div key={s.id} onClick={()=>toggleStr(s.id)} style={{background:free?"rgba(6,214,160,0.1)":active?"rgba(0,180,216,0.08)":C.dark,border:`1px solid ${free?"rgba(6,214,160,0.3)":active?C.cyan:C.surface}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",position:"relative"}}>

      {strTotal>0&&<div style={{fontSize:12,color:C.cyan,marginBottom:10,fontFamily:"'DM Mono',monospace",fontWeight:700}}>Streaming-tillägg: +{strTotal} kr/mån</div>}

    {/* Step 9: Resultat */}
    {step===9&&res.length>0&&(()=>{const myOp=res.find(r=>r.op===selOp);const others=res.filter(r=>r.op!==selOp);
      const RCard=({r,isMy})=>{
        // Check if all services are same operator

        const surfLabel=surfLvl==="obegr"?"Obegränsad":surfLvl==="30gb"?"30 GB":"10 GB";
        return(<div style={{background:isMy?"rgba(0,180,216,0.04)":C.dark,border:`1px solid ${isMy?"rgba(0,180,216,0.25)":C.surface}`,borderRadius:16,padding:22,marginBottom:14}}>
          {isMy&&<div style={{fontSize:9,fontWeight:700,color:C.cyan,padding:"3px 10px",borderRadius:16,background:"rgba(0,180,216,0.08)",display:"inline-block",marginBottom:10}}>Ditt val</div>}
          <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:14}}>{opName(r.op)}{isFam&&<span style={{fontSize:11,color:C.violet,marginLeft:8}}>{famN} personer</span>}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
            {/* Mobil */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>Mobilabonnemang</div><div style={{fontSize:10,color:C.subtle}}>{isFam?famN+" SIM-kort · ":""}{surfLabel} · 5G</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16,fontWeight:800,color:C.mint,fontFamily:"'DM Mono',monospace"}}>{r.mP} kr</span>{!singleOp&&<a href={getUrl(r.op)} target="_blank" rel="noopener noreferrer sponsored" style={{fontSize:10,fontWeight:700,color:C.cyan,textDecoration:"none"}}>Gå till →</a>}</div>
            </div>
            {/* Telefoner */}
            {r.phP>0&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>Telefoner ({phones.length} st)</div><div style={{fontSize:10,color:C.subtle}}>{r.phNames.join(", ")} · 24 mån</div></div>
              <span style={{fontSize:16,fontWeight:800,color:"#E8345A",fontFamily:"'DM Mono',monospace"}}>{r.phP} kr</span>
            </div>}
            {/* Bredband */}
            {r.bP>0&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>Bredband{r.is5g?" (5G Hem)":""}</div><div style={{fontSize:10,color:C.subtle}}>{r.bB?r.bB.speedDown>=1000?"1 Gbit":r.bB.speedDown+" Mbit":""}{r.bB?" · "+opName(r.bB.operator):""}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16,fontWeight:800,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{r.bP} kr</span>{!singleOp&&r.bB&&<a href={getUrl(r.bB.operator)} target="_blank" rel="noopener noreferrer sponsored" style={{fontSize:10,fontWeight:700,color:C.cyan,textDecoration:"none"}}>Gå till →</a>}</div>
            </div>}
            {/* TV */}
            {r.bT&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`}}>
              <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{r.bT.name}</div><div style={{fontSize:10,color:C.subtle}}>{r.bT.channels} kanaler{r.bT.perks?" · "+r.bT.perks.join(", "):""}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16,fontWeight:800,color:C.violet,fontFamily:"'DM Mono',monospace"}}>{r.tP} kr</span>{!singleOp&&<a href={getUrl(r.bT.operator)} target="_blank" rel="noopener noreferrer sponsored" style={{fontSize:10,fontWeight:700,color:C.cyan,textDecoration:"none"}}>Gå till →</a>}</div>
            </div>}
            {/* Streaming */}
            {sstr.length>0&&sstr.map(id=>{const f=streamPicks.find(x=>x.id===id);const free=r.opInc&&r.opInc.has(id);if(!f)return null;return(<div key={id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",borderRadius:10,background:free?"rgba(6,214,160,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${free?"rgba(6,214,160,0.15)":C.surface}`}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text}}>{f.name}{free&&<span style={{fontSize:9,color:C.mint,marginLeft:6,fontWeight:700}}>INGÅR</span>}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,fontWeight:800,color:free?C.success:C.cyan,fontFamily:"'DM Mono',monospace"}}>{free?"0 kr":f.price+" kr"}</span>{!free&&<a href={getUrl(id)} target="_blank" rel="noopener noreferrer sponsored" style={{fontSize:10,fontWeight:700,color:C.cyan,textDecoration:"none"}}>Gå till →</a>}</div>
            </div>);})}

          </div>
          {/* Total + CTA */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:10,borderTop:`1px solid ${C.surface}`}}>
            <div><span style={{fontSize:32,fontWeight:800,color:C.text,fontFamily:"'DM Mono',monospace"}}>{r.total}</span><span style={{fontSize:13,color:C.subtle,marginLeft:4}}>kr/mån</span>{isFam&&<div style={{fontSize:12,color:C.muted}}>= {Math.round(r.total/famN)} kr/person</div>}</div>
            {singleOp&&<a href={getUrl(r.op)} target="_blank" rel="noopener noreferrer sponsored" style={{padding:"12px 24px",borderRadius:12,textDecoration:"none",background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:13,fontWeight:800}}>Gå till {opName(r.op)} →</a>}

        </div>);};
      return(<div>
        <div style={{fontSize:10,fontWeight:600,color:C.subtle,textTransform:"uppercase",marginBottom:6}}>{surfLvl==="obegr"?"Obegränsad":surfLvl==="30gb"?"30 GB":"10 GB"}{isFam?` · ${famN} pers.`:""}{phones.length>0?` · ${phones.length} tel.`:""}{stv?" · TV":""}{sstr.length>0?` · ${sstr.length} streaming`:""}</div>
        {myOp&&<div><div style={{fontSize:10,fontWeight:600,color:C.cyan,textTransform:"uppercase",marginBottom:8}}>Baserat på ditt val — {opName(selOp)}</div><RCard r={myOp} isMy={true}/></div>}
        {others.length>0&&<div><div style={{fontSize:10,fontWeight:600,color:C.subtle,textTransform:"uppercase",marginBottom:8,marginTop:myOp?4:0}}>Andra operatörer</div>{others.map(r=>(<RCard key={r.op} r={r} isMy={false}/>))}</div>}
        <button onClick={resetAll} style={{background:"transparent",border:`1px solid ${C.surface}`,color:C.subtle,padding:"8px 16px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>Börja om</button>
      </div>);})()}
  </div>);
}


// ═══ RÅDGIVAREN — "Jämför med det du har idag" ═══
function AdvisorView(){
  const[step,setStep]=useState(0);
  const[curOp,setCurOp]=useState(null);const[curPrice,setCurPrice]=useState("");
  const[hasBB,setHasBB]=useState(null);const[bbPrice,setBbPrice]=useState("");
  const[hasTV,setHasTV]=useState(null);const[tvPrice,setTvPrice]=useState("");
  const[curStr,setCurStr]=useState([]);
  const[wSurf,setWSurf]=useState("obegr");const[wSport,setWSport]=useState(false);

  const allOps=OPERATORS.map(o=>o.id);
  const bundleOps=["telia","tele2","telenor","tre"];
  const stPicks=[
    {id:"netflix",name:"Netflix",price:149},{id:"hbomax",name:"HBO Max",price:119},{id:"disneyplus",name:"Disney+",price:109},
    {id:"viaplaytotal",name:"Viaplay Total",price:449},{id:"prime",name:"Amazon Prime",price:69},
    {id:"skyshowtime",name:"SkyShowtime",price:89},{id:"tv4sport",name:"TV4 Sport",price:249},
    {id:"appletv",name:"Apple TV+",price:99},{id:"discoveryplus",name:"Discovery+",price:79},
  ];
  const toggleCS=id=>setCurStr(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const curTotal=(parseInt(curPrice)||0)+(parseInt(bbPrice)||0)+(parseInt(tvPrice)||0)+curStr.reduce((s,id)=>{const f=stPicks.find(x=>x.id===id);return s+(f?f.price:0);},0);

  const alts=useMemo(()=>{
    if(step<6)return[];
    const surfMin=wSurf==="10gb"?5:wSurf==="30gb"?20:9999;
    return bundleOps.map(op=>{
      const plans=PLANS.filter(p=>p.operator===op&&p.data>=surfMin).sort((a,b)=>a.price-b.price);
      if(!plans.length)return null;
      const mob=plans[0];let mP=mob.campaignPrice||mob.price;
      const bbs=BROADBAND.filter(b=>b.operator===op).sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price));
      const bb=bbs[0];const bP=bb?(bb.campaignPrice||bb.price):0;
      const disc=bb?BUNDLE_DISCOUNTS[op]||0:0;
      const tvs=TV_PLANS.filter(t=>t.operator===op&&t.type!=="streaming");
      let tv=null,tP=0;
      if(tvs.length){if(wSport)tv=tvs.find(t=>t.streaming.some(s=>s.toLowerCase().includes("sport")))||tvs[tvs.length-1];else tv=tvs[0];if(tv)tP=tv.campaignPrice||tv.price;}
      const inc=new Set();
      if(op==="telia"&&mob.name){if(mob.name.includes("3-i-1")){["netflix","hbomax","disneyplus"].forEach(s=>inc.add(s));}else if(mob.name.includes("Netflix"))inc.add("netflix");else if(mob.name.includes("Disney"))inc.add("disneyplus");else if(mob.name.includes("HBO"))inc.add("hbomax");}
      const strP=curStr.reduce((s,id)=>{if(inc.has(id))return s;const f=stPicks.find(x=>x.id===id);return s+(f?f.price:0);},0);
      const total=mP+bP+tP+strP-disc;
      const saving=curTotal-total;
      return{op,mob,bb,tv,mP,bP,tP,strP,disc,total,saving,inc,yearSaving:saving*12};
    }).filter(Boolean).sort((a,b)=>a.total-b.total);
  },[step,curTotal,wSurf,wSport,curStr]);

  const Choice=({label,sub,onClick,active})=>(<button onClick={onClick} style={{flex:"1 1 140px",padding:"16px 12px",borderRadius:14,border:active?`1.5px solid ${C.cyan}`:`1px solid rgba(255,255,255,0.06)`,background:active?"rgba(0,180,216,0.06)":"rgba(255,255,255,0.02)",color:active?C.text:C.muted,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"center",transition:"all .15s"}}>{label}{sub&&<div style={{fontSize:11,fontWeight:400,color:C.subtle,marginTop:4}}>{sub}</div>}</button>);
  const Back=({to})=>(<button onClick={()=>setStep(to)} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:C.cyan,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",padding:0,marginBottom:16}}>← Tillbaka</button>);
  const stepOf=n=><div style={{fontSize:11,fontWeight:600,color:C.cyan,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Steg {n} av 5</div>;

  return(<div>
    <section style={{textAlign:"center",padding:"36px 20px 20px"}}><h2 style={{fontSize:"clamp(24px,4vw,40px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:6,color:C.text}}>Kolla <span style={{background:`linear-gradient(135deg,${C.mint},${C.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ditt pris</span></h2><p style={{fontSize:14,color:C.subtle}}>Steg för steg — se om du kan spara.</p></section>
    <div style={{maxWidth:600,margin:"0 auto"}}>
    {step===0&&<div style={{textAlign:"center",animation:"fadeIn .2s"}}>{stepOf(1)}
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:6}}>Vilken mobiloperatör har du?</div>
      <div style={{fontSize:13,color:C.subtle,marginBottom:20}}>Välj din nuvarande operatör</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>{allOps.map(op=>(<button key={op} onClick={()=>{setCurOp(op);setStep(1);}} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 16px",borderRadius:10,border:`1px solid rgba(255,255,255,0.06)`,background:"rgba(255,255,255,0.02)",color:C.muted,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=opColor(op);e.currentTarget.style.color=opColor(op);}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.06)";e.currentTarget.style.color=C.muted;}}><div style={{width:8,height:8,borderRadius:"50%",background:opColor(op)}}/>{opName(op)}</button>))}</div>
    </div>}
    {step===1&&<div style={{textAlign:"center",animation:"fadeIn .2s"}}><Back to={0}/>{stepOf(2)}
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:6}}>Vad betalar du för mobilen?</div>
      <div style={{fontSize:13,color:C.subtle,marginBottom:20}}>Totalt per månad</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:20}}>
        <input type="number" placeholder="399" value={curPrice} onChange={e=>setCurPrice(e.target.value)} style={{width:120,padding:"12px 16px",borderRadius:12,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.03)",color:C.text,fontSize:24,fontWeight:800,fontFamily:"'DM Mono',monospace",outline:"none",textAlign:"center"}}/>
        <span style={{fontSize:14,color:C.subtle}}>kr/mån</span>
      </div>
      <button onClick={()=>setStep(2)} disabled={!curPrice} style={{padding:"14px 40px",borderRadius:14,background:curPrice?`linear-gradient(135deg,${C.mint},${C.cyan})`:"rgba(255,255,255,0.04)",color:curPrice?C.ink:C.subtle,fontSize:15,fontWeight:800,cursor:curPrice?"pointer":"not-allowed",border:"none",fontFamily:"inherit"}}>Fortsätt →</button>
    </div>}
    {step===2&&<div style={{textAlign:"center",animation:"fadeIn .2s"}}><Back to={1}/>{stepOf(3)}
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:6}}>Har du bredband?</div>
      <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:20,marginBottom:16}}>
        <Choice label="Ja" active={hasBB===true} onClick={()=>setHasBB(true)}/>
        <Choice label="Nej" active={hasBB===false} onClick={()=>{setHasBB(false);setBbPrice("");setStep(3);}}/>
      </div>
      {hasBB&&<div style={{animation:"fadeIn .15s"}}><div style={{fontSize:13,color:C.subtle,marginBottom:12}}>Vad betalar du per månad?</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16}}>
          <input type="number" placeholder="369" value={bbPrice} onChange={e=>setBbPrice(e.target.value)} style={{width:120,padding:"12px 16px",borderRadius:12,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.03)",color:C.text,fontSize:24,fontWeight:800,fontFamily:"'DM Mono',monospace",outline:"none",textAlign:"center"}}/>
          <span style={{fontSize:14,color:C.subtle}}>kr/mån</span>
        </div>
        <button onClick={()=>setStep(3)} disabled={!bbPrice} style={{padding:"14px 40px",borderRadius:14,background:bbPrice?`linear-gradient(135deg,${C.mint},${C.cyan})`:"rgba(255,255,255,0.04)",color:bbPrice?C.ink:C.subtle,fontSize:15,fontWeight:800,cursor:bbPrice?"pointer":"not-allowed",border:"none",fontFamily:"inherit"}}>Fortsätt →</button>
      </div>}
    </div>}
    {step===3&&<div style={{textAlign:"center",animation:"fadeIn .2s"}}><Back to={2}/>{stepOf(4)}

          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:20}}>
            <button onClick={()=>{setMStudent(!mStudent);setMSenior(false);}} style={{padding:"12px 24px",borderRadius:12,border:mStudent?`1.5px solid ${C.cyan}`:`1px solid rgba(255,255,255,0.06)`,background:mStudent?"rgba(0,180,216,0.06)":"rgba(255,255,255,0.02)",color:mStudent?C.text:C.muted,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Jag är student</button>
            <button onClick={()=>{setMSenior(!mSenior);setMStudent(false);}} style={{padding:"12px 24px",borderRadius:12,border:mSenior?`1.5px solid ${C.cyan}`:`1px solid rgba(255,255,255,0.06)`,background:mSenior?"rgba(0,180,216,0.06)":"rgba(255,255,255,0.02)",color:mSenior?C.text:C.muted,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Jag är senior</button>
          </div>
        </div>}
      </div>}

      {/* Step 2: Results */}
      {mStep===2&&<div style={{maxWidth:640,margin:"0 auto",animation:"fadeIn .2s"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <button onClick={()=>{setMStep(1);setMShowAll(false);}} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:C.cyan,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",padding:0}}>← Ändra</button>
          <div style={{fontSize:12,color:C.subtle}}>{mResults.length} planer · {mFam?mPersons+" pers":"Singel"} · {mSurf>=9999?"Obegr.":mSurf+"+ GB"}{mStudent?" · Student":""}{mSenior?" · Senior":""}</div>
        </div>
        {mResults.length===0&&<div style={{textAlign:"center",padding:40,color:C.subtle}}>Inga planer matchar. Prova annat surfval.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {mResults.map((p,i)=>{
            const oc=opColor(p.operator);const on=opName(p.operator);
            const dl=p.data>=9999?"Obegränsad":`${p.data} GB`;
            const hc=p.campaignPrice!==null;
            let tp=p.price;
            if(mFam&&p.perExtra)tp=p.price+(mPersons-1)*p.perExtra;
            const price=hc?p.campaignPrice:tp;
            const bd=BUNDLE_DISCOUNTS[p.operator]||0;
            return(<MobilCard key={p.id} p={p} oc={oc} on={on} dl={dl} hc={hc} tp={tp} price={price} bd={bd} mFam={mFam} mPersons={mPersons} i={i} defaultOpen={true}/>);
          })}
        </div>
        <NetworkMap/>
      </div>}
    </div>):(
    <div>
      <div style={{display:"flex",justifyContent:"center",padding:"20px 20px 0",gap:5,flexWrap:"wrap"}}>{MODES.map(m=>(<button key={m.id} onClick={()=>{setMode(m.id);resetMobil();}} style={{padding:"8px 16px",borderRadius:24,border:mode===m.id?"none":`1px solid ${C.surface}`,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:mode===m.id?`linear-gradient(135deg,${C.mint},${C.cyan})`:C.dark,color:mode===m.id?C.ink:C.muted}}>{m.l}</button>))}</div>
      {mode==="bredband"&&<BroadbandView/>}
      {mode==="tv"&&<TvViewTab/>}
      {mode==="streaming"&&<StreamingView/>}
      {mode==="telefoner"&&<PhoneView/>}
      {mode==="paket"&&<PaketView/>}
      {mode==="radgivare"&&<AdvisorView/>}
    </div>)}
  </div>);
}

// ═══ PAGES ═══
function PageOm(){return(<div style={{maxWidth:640,margin:"0 auto",padding:"48px 20px"}}><h1 style={{fontSize:"clamp(28px,5vw,44px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:10,background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Om Byyt</h1><p style={{fontSize:16,color:C.muted,marginBottom:32}}>Oberoende jämförelsetjänst. Gratis, transparent, på din sida.</p>{[{t:"Vad vi gör",x:"Jämför mobil, bredband, TV, streaming och telefoner. Unik familjekalkylator."},{t:"Byggt för alla",x:"Pris, surf, operatör, 5G. Sveriges mest kompletta jämförelseverktyg."},{t:"Kontakt",x:"kontakt@byyt.se"}].map((i,idx)=>(<div key={idx} style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"20px 24px",borderLeft:`3px solid ${C.mint}`,marginBottom:12}}><h2 style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:6}}>{i.t}</h2><p style={{fontSize:13,color:C.muted,lineHeight:1.7}}>{i.x}</p></div>))}</div>);}
function PagePriv(){const[oi,setOi]=useState(null);const s=[{t:"Ansvarig",c:"Byyt.se — kontakt@byyt.se"},{t:"Uppgifter",c:"IP (anon.), webbläsartyp, sidor."},{t:"Cookies",c:"Nödvändiga + GA4."},{t:"Affiliate",c:"Provision vid teckning. Priset påverkas inte."},{t:"GDPR",c:"Tillgång, rättelse, radering. kontakt@byyt.se"}];return(<div style={{maxWidth:680,margin:"0 auto",padding:"48px 20px"}}><h1 style={{fontSize:"clamp(24px,4vw,36px)",fontWeight:800,background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Integritetspolicy</h1><p style={{color:C.subtle,fontSize:12,marginBottom:28}}>Mars 2026</p>{s.map((x,i)=>{const o=oi===i;return(<div key={i} style={{background:o?C.surface:C.dark,borderRadius:10,border:`1px solid ${o?"rgba(0,180,216,.12)":"rgba(255,255,255,.04)"}`,overflow:"hidden",marginBottom:2}}><button onClick={()=>setOi(o?null:i)} style={{width:"100%",display:"flex",justifyContent:"space-between",padding:"12px 18px",background:"none",border:"none",color:C.text,fontSize:14,fontWeight:600,fontFamily:"inherit",cursor:"pointer",textAlign:"left"}}>{x.t}<span style={{color:C.cyan,transform:o?"rotate(45deg)":"none",transition:"transform .15s"}}>+</span></button>{o&&<div style={{padding:"0 18px 14px",color:C.muted,fontSize:13}}>{x.c}</div>}</div>);})}</div>);}
function PageKontakt(){return(<div style={{maxWidth:480,margin:"0 auto",padding:"48px 20px"}}><h1 style={{fontSize:"clamp(28px,5vw,42px)",fontWeight:800,background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6}}>Kontakt</h1><p style={{fontSize:14,color:C.muted,marginBottom:36}}>Svarar inom 24h.</p><div style={{display:"flex",flexDirection:"column",gap:12}}><a href="mailto:kontakt@byyt.se" style={{display:"flex",alignItems:"center",gap:14,background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"18px 22px",textDecoration:"none"}}><div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="18" height="18" fill="none" stroke="white" strokeWidth="2"><path d="M3 3h14c1 0 2 1 2 2v10c0 1-1 2-2 2H3c-1 0-2-1-2-2V5c0-1 1-2 2-2z"/><polyline points="19,5 10,12 1,5"/></svg></div><div><div style={{fontSize:10,color:C.subtle,fontWeight:600}}>E-post</div><div style={{fontSize:15,fontWeight:700,color:C.cyan}}>kontakt@byyt.se</div></div></a><a href="https://instagram.com/byyt.se" target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:14,background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"18px 22px",textDecoration:"none"}}><div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#833AB4,#FD1D1D,#F77737)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="18" height="18" fill="none" stroke="white" strokeWidth="2"><rect x="2" y="2" width="16" height="16" rx="4"/><circle cx="10" cy="10" r="3"/></svg></div><div><div style={{fontSize:10,color:C.subtle,fontWeight:600}}>Instagram</div><div style={{fontSize:15,fontWeight:700,color:"#e1306c"}}>@byyt.se</div></div></a></div></div>);}

function Footer({go}){return(<footer style={{borderTop:"1px solid rgba(255,255,255,.03)",padding:"32px 24px 24px",background:C.dark,marginTop:40}}><div style={{maxWidth:960,margin:"0 auto"}}><div style={{display:"flex",flexWrap:"wrap",justifyContent:"space-between",gap:24,marginBottom:20}}><div><ByytLogo size={28} onClick={()=>go("j")}/><p style={{fontSize:11,color:C.subtle,marginTop:6,maxWidth:220,lineHeight:1.5}}>Oberoende jämförelse för mobil, bredband, TV, streaming och telefoner.</p></div><div style={{display:"flex",gap:28}}><div><div style={{fontSize:10,color:C.subtle,fontWeight:600,textTransform:"uppercase",marginBottom:8}}>Sidor</div>{[{l:"Jämför",p:"j"},{l:"Om oss",p:"o"},{l:"Integritet",p:"p"},{l:"Kontakt",p:"k"}].map(i=>(<button key={i.p} onClick={()=>go(i.p)} style={{display:"block",background:"none",border:"none",padding:"2px 0",color:C.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{i.l}</button>))}</div><div><div style={{fontSize:10,color:C.subtle,fontWeight:600,textTransform:"uppercase",marginBottom:8}}>Socialt</div><a href="https://instagram.com/byyt.se" target="_blank" rel="noopener noreferrer" style={{color:C.muted,textDecoration:"none",fontSize:12}}>Instagram</a></div></div></div><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.surface2}}><span>© 2026 Byyt.se</span><span>Priser: mars 2026</span></div></div></footer>);}

function ByytApp(){
  const[pg,sPg]=useState("j");const[mm,sMm]=useState(false);
  const NAV=[{id:"j",l:"Jämför"},{id:"o",l:"Om oss"},{id:"p",l:"Integritet"},{id:"k",l:"Kontakt"}];
  const go=p=>{sPg(p);sMm(false);window.scrollTo({top:0,behavior:"smooth"});};
  return(
    <div style={{minHeight:"100vh",background:C.ink,color:C.text,fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",overflowX:"hidden"}}>
      <header style={{padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,.04)",backdropFilter:"blur(20px)",position:"sticky",top:0,zIndex:100,background:"rgba(8,14,26,.92)",height:60}}>
        <ByytLogo size={30} onClick={()=>go("j")}/>
        <nav style={{display:"flex",gap:2}} className="dn">{NAV.map(n=>{const a=pg===n.id;return(<button key={n.id} onClick={()=>go(n.id)} style={{padding:"6px 12px",borderRadius:8,border:"none",background:a?"rgba(0,180,216,.08)":"transparent",color:a?C.cyan:C.muted,fontSize:13,fontWeight:a?700:500,cursor:"pointer",fontFamily:"inherit"}}>{n.l}</button>);})}</nav>
        <button onClick={()=>sMm(!mm)} className="mb" style={{display:"none",background:"none",border:`1px solid ${C.surface}`,borderRadius:8,padding:"5px 8px",color:C.muted,cursor:"pointer",fontSize:14}}>☰</button>
      </header>
      {mm&&<div style={{position:"fixed",top:60,left:0,right:0,zIndex:99,background:C.dark,borderBottom:`1px solid ${C.surface}`,padding:10,display:"flex",flexDirection:"column",gap:2,animation:"fadeIn .15s"}}>{NAV.map(n=>(<button key={n.id} onClick={()=>go(n.id)} style={{padding:"10px 16px",borderRadius:10,border:"none",background:pg===n.id?"rgba(0,180,216,.06)":"transparent",color:pg===n.id?C.cyan:C.muted,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>{n.l}</button>))}</div>}
      <main style={{maxWidth:1200,margin:"0 auto",padding:"0 20px",position:"relative",zIndex:1}} className="mw">
        {pg==="j"&&<PageJamfor/>}
        {pg==="o"&&<PageOm/>}
        {pg==="p"&&<PagePriv/>}
        {pg==="k"&&<PageKontakt/>}
      </main>
      <Footer go={go}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ByytApp));
</script>
