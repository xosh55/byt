function ByytLogo({size=40,onClick}){return(<div onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,cursor:onClick?"pointer":"default"}}><svg width={size} height={size} viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="logoG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={C.mint}/><stop offset="50%" stopColor={C.cyan}/><stop offset="100%" stopColor={C.violet}/></linearGradient></defs><circle cx="60" cy="60" r="56" fill="url(#logoG)"/><g stroke="#FFF" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" fill="none"><path d="M36 44L67 44"/><polyline points="59,36 67,44 59,52"/><path d="M84 76L53 76"/><polyline points="61,68 53,76 61,84"/></g></svg><span style={{fontSize:size*.62,fontWeight:800,letterSpacing:"-0.03em",background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>byyt</span></div>);}

function PlanCard({plan,familyConfig,isFamily,index}){
  const[hov,setHov]=useState(false);const op=OPERATORS.find(o=>o.id===plan.operator);
  const dl=plan.data>=9999?"Obegr.":`${plan.data} GB`;
  let tp=plan.price,fb=null;
  if(isFamily&&plan.perExtra){const e=familyConfig.adults-1+familyConfig.children;tp=plan.price+e*plan.perExtra;fb={b:plan.price,e,pe:plan.perExtra,t:tp};}
  const hc=plan.campaignPrice!==null&&plan.campaignMonths!==null;
  const bd=BUNDLE_DISCOUNTS[plan.operator]||0;const isTip=BYYT_TIPS.includes(plan.id);
  return(
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:C.dark,border:`1px solid ${isTip?"rgba(6,214,160,0.3)":hov?"rgba(0,180,216,0.2)":C.surface}`,borderRadius:16,padding:"18px 20px",display:"flex",flexDirection:"column",gap:10,transition:"all 0.2s",transform:hov?"translateY(-2px)":"none",animation:`cardIn .3s ease-out ${index*.025}s both`,position:"relative"}}>
      {isTip&&<div style={{fontSize:10,fontWeight:700,color:C.mint,padding:"2px 8px",borderRadius:16,background:"rgba(6,214,160,0.08)",border:"1px solid rgba(6,214,160,0.2)",alignSelf:"flex-start"}}>Byyt-tipset</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span style={{fontSize:12,fontWeight:600,color:op?.color}}>{op?.name}</span><div style={{fontSize:14,fontWeight:700,color:C.text,marginTop:2}}>{plan.name}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:26,fontWeight:800,fontFamily:"'DM Mono',monospace",color:hc?C.mint:C.text,lineHeight:1}}>{hc?plan.campaignPrice:tp}</div><div style={{fontSize:11,color:C.subtle}}>kr/mån{hc&&<span style={{textDecoration:"line-through",marginLeft:4}}>{tp}</span>}</div></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <span style={{fontSize:12,fontWeight:700,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{dl}</span>
        <span style={{width:1,height:12,background:C.surface}}/>
        <span style={{fontSize:11,color:C.subtle}}>{plan.network}</span>
        <span style={{width:1,height:12,background:C.surface}}/>
        <span style={{fontSize:11,color:C.subtle}}>{plan.speedMbps} Mbit</span>
        {plan.fiveG&&<span style={{fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:10,background:`linear-gradient(135deg,${C.cyan},${C.violet})`,color:"#fff"}}>5G</span>}
      </div>
      {bd>0&&!isFamily&&<div style={{fontSize:10,fontWeight:600,color:"#a78bfa",padding:"2px 8px",borderRadius:12,background:"rgba(139,92,246,0.06)",border:"1px solid rgba(139,92,246,0.15)",alignSelf:"flex-start"}}>Spara {bd} kr/mån med bredband</div>}
      {hc&&<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:10,fontWeight:700,color:C.mint,padding:"1px 6px",borderRadius:10,background:"rgba(6,214,160,0.08)"}}>Kampanj {plan.campaignMonths} mån</span><span style={{fontSize:10,color:C.subtle}}>12 mån: <strong style={{color:C.mint}}>{plan.campaignPrice*plan.campaignMonths+plan.price*(12-plan.campaignMonths)} kr</strong></span></div>}
      {fb&&<div style={{fontSize:10,color:"#a78bfa",padding:"4px 8px",borderRadius:8,background:"rgba(139,92,246,0.04)"}}>{fb.b} kr + {fb.e}×{fb.pe} kr = <strong style={{color:C.text}}>{fb.t} kr/mån</strong></div>}
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{plan.perks.slice(0,3).map((p,i)=>(<span key={i} style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:10,background:"rgba(6,214,160,0.06)",color:C.mint}}>{p}</span>))}</div>
      {plan.bindingOffer&&<div style={{fontSize:10,color:"#a78bfa",padding:"3px 8px",borderRadius:8,background:"rgba(139,92,246,0.04)"}}>{plan.bindingOffer}</div>}
      <a href={plan.affiliateUrl} target="_blank" rel="noopener noreferrer sponsored" style={{display:"block",padding:"10px 16px",borderRadius:12,textAlign:"center",background:hov?`linear-gradient(135deg,${C.cyan},${C.violet})`:"rgba(255,255,255,0.03)",color:hov?"#fff":C.text,fontSize:12,fontWeight:700,textDecoration:"none",transition:"all 0.2s",border:hov?"none":`1px solid ${C.surface}`}}>Besök {op?.name} →</a>
    </div>
  );
}

function RangeSlider({label,min,max,value,onChange,step=1,dl}){const pct=((value-min)/(max-min))*100;return(<div style={{flex:1,minWidth:140}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase"}}>{label}</span><span style={{fontSize:12,fontWeight:700,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{dl}</span></div><div style={{position:"relative",height:16,display:"flex",alignItems:"center"}}><div style={{position:"absolute",left:0,right:0,height:3,borderRadius:2,background:"rgba(255,255,255,0.05)"}}/><div style={{position:"absolute",left:0,width:`${pct}%`,height:3,borderRadius:2,background:`linear-gradient(90deg,${C.mint},${C.cyan})`}}/><input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(+e.target.value)} style={{position:"absolute",width:"100%",height:16,opacity:0,cursor:"pointer",zIndex:2}}/><div style={{position:"absolute",left:`${pct}%`,transform:"translateX(-50%)",width:14,height:14,borderRadius:"50%",background:"#fff",boxShadow:`0 0 6px ${C.cyan}44`,pointerEvents:"none"}}/></div></div>);}

function FamilyCalc({config,onChange}){

// ★ PAKET & SPARA — smart operator matching
function PaketView(){
  const[sm,setSm]=useState(null);const[sb,setSb]=useState(null);const[st,setSt]=useState(null);const[step,setStep]=useState(1);
  const bOps=["telia","tele2","telenor","tre"];
  const mO=PLANS.filter(p=>p.categories.includes("privat")&&bOps.includes(p.operator)).sort((a,b)=>a.price-b.price);
  const bO=BROADBAND.filter(b=>bOps.includes(b.operator)).sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price));
  const tO=TV_PLANS.filter(t=>bOps.includes(t.operator)).sort((a,b)=>(a.campaignPrice||a.price)-(b.campaignPrice||b.price));
  // ★ Smart sort: selected operator's items first
  const selOp=sm?.operator||null;
  const bbSorted=useMemo(()=>{if(!selOp)return bO;const match=bO.filter(b=>b.operator===selOp);const rest=bO.filter(b=>b.operator!==selOp);return[...match,...rest];},[selOp,bO]);
  const tvSorted=useMemo(()=>{if(!selOp)return tO;const match=tO.filter(t=>t.operator===selOp);const rest=tO.filter(t=>t.operator!==selOp);return[...match,...rest];},[selOp,tO]);

  const res=useMemo(()=>{if(!sm||!sb)return[];return bOps.map(op=>{const mp=mO.filter(p=>p.operator===op),bp=bO.filter(b=>b.operator===op);if(!mp.length||!bp.length)return null;const bM=mp.find(p=>p.data>=(sm?.data||0))||mp[mp.length-1],bB=bp.find(b=>b.speedDown>=(sb?.speedDown||0))||bp[bp.length-1];if(!bM||!bB)return null;const mP=bM.campaignPrice||bM.price,bP=bB.campaignPrice||bB.price,d=BUNDLE_DISCOUNTS[op]||0;let tP=0,bT=null;if(st){const tp=tO.filter(t=>t.operator===op);bT=tp.find(t=>t.channels>=(st?.channels||0))||tp[tp.length-1];if(bT)tP=bT.campaignPrice||bT.price;}return{op,bM,bB,bT,mP,bP,tP,d,total:mP+bP+tP-d,is5g:bB.type==="5g"};}).filter(Boolean).sort((a,b)=>a.total-b.total);},[sm,sb,st]);

  const Dot=({n,l,a,done})=>(<div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,background:done?C.mint:a?"rgba(6,214,160,0.15)":C.surface,color:done?C.ink:a?C.mint:C.subtle}}>{done?"✓":n}</div><span style={{fontSize:11,fontWeight:600,color:a?C.text:C.subtle}}>{l}</span></div>);

  // ★ Pick card with recommended highlight
  const Pick=({item,sel,onP,l1,l2,col,discount})=>(<div onClick={onP} style={{background:sel?"rgba(6,214,160,0.06)":C.dark,border:`1px solid ${discount&&!sel?"rgba(6,214,160,0.35)":sel?C.mint:C.surface}`,borderRadius:12,padding:12,cursor:"pointer",transition:"all .15s",position:"relative"}}>{discount>0&&!sel&&<div style={{position:"absolute",top:-1,right:12,fontSize:8,fontWeight:700,color:C.ink,background:C.mint,padding:"1px 8px",borderRadius:"0 0 8px 8px"}}>Spara {discount} kr/mån</div>}<div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:1}}>{l1}</div><div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:3}}>{item.name}</div><div style={{display:"flex",alignItems:"baseline",gap:3}}><span style={{fontSize:20,fontWeight:800,color:col||C.mint,fontFamily:"'DM Mono',monospace"}}>{item.campaignPrice||item.price}</span><span style={{fontSize:10,color:C.subtle}}>kr/mån</span><span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{l2}</span></div></div>);

  return(<div>
    <section style={{textAlign:"center",padding:"36px 20px 20px"}}><h2 style={{fontSize:"clamp(24px,4vw,40px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:6,color:C.text}}><span style={{background:`linear-gradient(135deg,${C.mint},${C.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Paketspara</span> — samla allt</h2><p style={{fontSize:14,color:C.subtle}}>Mobil + bredband + TV — se vad du sparar.</p></section>
    <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:24,flexWrap:"wrap"}}><Dot n={1} l="Mobil" a={step===1} done={step>1}/><div style={{width:16,height:1,background:C.surface,margin:"auto"}}/><Dot n={2} l="Bredband" a={step===2} done={step>2}/><div style={{width:16,height:1,background:C.surface,margin:"auto"}}/><Dot n={3} l="TV" a={step===3} done={step>3}/><div style={{width:16,height:1,background:C.surface,margin:"auto"}}/><Dot n={4} l="Resultat" a={step===4} done={false}/></div>

    {step===1&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:8}}>{mO.slice(0,12).map(p=>(<Pick key={p.id} item={p} sel={sm?.id===p.id} onP={()=>{setSm(p);setStep(2);}} l1={OPERATORS.find(o=>o.id===p.operator)?.name} l2={p.data>=9999?"Obegr.":p.data+" GB"} col={C.mint}/>))}</div>}

    {step===2&&<div><div style={{fontSize:12,fontWeight:600,color:C.subtle,marginBottom:10}}>Välj bredband {selOp&&<span style={{color:C.mint}}>— spara {BUNDLE_DISCOUNTS[selOp]||0} kr/mån med {OPERATORS.find(o=>o.id===selOp)?.name}</span>}</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:8}}>{bbSorted.slice(0,12).map(b=>(<Pick key={b.id} item={b} sel={sb?.id===b.id} onP={()=>{setSb(b);setStep(3);}} l1={BB_OPERATORS.find(o=>o.id===b.operator)?.name+(b.type==="5g"?" (5G)":"")} l2={b.speedDown>=1000?"1 Gbit":b.speedDown+" Mbit"} col={C.cyan} discount={b.operator===selOp?(BUNDLE_DISCOUNTS[selOp]||0):0}/>))}</div><button onClick={()=>{setStep(1);setSb(null);}} style={{marginTop:10,background:"transparent",border:`1px solid ${C.surface}`,color:C.subtle,padding:"5px 12px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:11}}>← Tillbaka</button></div>}

    {step===3&&<div>
    {/* Hoppa över TV — at top, prominent */}
    <button onClick={()=>{setSt(null);setStep(4);}} style={{width:"100%",padding:"14px 20px",borderRadius:12,background:"rgba(6,214,160,0.06)",border:`1.5px solid rgba(6,214,160,0.3)`,color:C.mint,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .2s",textAlign:"center",marginBottom:16}}>Hoppa över TV — visa resultat →</button>
    <div style={{fontSize:12,fontWeight:600,color:C.subtle,marginBottom:10}}>Eller välj TV-paket</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:8}}>{tvSorted.slice(0,12).map(t=>(<Pick key={t.id} item={t} sel={st?.id===t.id} onP={()=>{setSt(t);setStep(4);}} l1={TV_OPERATORS.find(o=>o.id===t.operator)?.name} l2={t.channels+" kan."} col={C.violet} discount={t.operator===selOp?(BUNDLE_DISCOUNTS[selOp]||0):0}/>))}</div>
    <button onClick={()=>{setStep(2);setSt(null);}} style={{marginTop:10,background:"transparent",border:`1px solid ${C.surface}`,color:C.subtle,padding:"5px 12px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:11}}>← Tillbaka</button></div>}

    {step===4&&res.length>0&&<div>{res.map((r,i)=>(<div key={r.op} style={{background:i===0?"rgba(6,214,160,0.04)":C.dark,border:`1px solid ${i===0?"rgba(6,214,160,0.25)":C.surface}`,borderRadius:16,padding:20,marginBottom:12}}>{i===0&&<div style={{fontSize:9,fontWeight:700,color:C.mint,padding:"2px 8px",borderRadius:16,background:"rgba(6,214,160,0.08)",display:"inline-block",marginBottom:8}}>Bäst totalpris</div>}<div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:12}}>{BB_OPERATORS.find(o=>o.id===r.op)?.name}{r.is5g&&<span style={{fontSize:10,color:C.cyan,marginLeft:6}}>(5G Hem)</span>}</div><div style={{display:"grid",gridTemplateColumns:r.bT?"1fr 1fr 1fr 1fr":"1fr 1fr 1fr",gap:6,marginBottom:12}}><div style={{background:C.surface,borderRadius:8,padding:8}}><div style={{fontSize:8,color:C.subtle}}>Mobil</div><div style={{fontSize:14,fontWeight:800,color:C.mint,fontFamily:"'DM Mono',monospace"}}>{r.mP} kr</div></div><div style={{background:C.surface,borderRadius:8,padding:8}}><div style={{fontSize:8,color:C.subtle}}>Bredband</div><div style={{fontSize:14,fontWeight:800,color:C.cyan,fontFamily:"'DM Mono',monospace"}}>{r.bP} kr</div></div>{r.bT&&<div style={{background:C.surface,borderRadius:8,padding:8}}><div style={{fontSize:8,color:C.subtle}}>TV</div><div style={{fontSize:14,fontWeight:800,color:C.violet,fontFamily:"'DM Mono',monospace"}}>{r.tP} kr</div></div>}<div style={{background:C.surface,borderRadius:8,padding:8}}><div style={{fontSize:8,color:C.subtle}}>Rabatt</div><div style={{fontSize:14,fontWeight:800,color:r.d>0?C.success:C.subtle,fontFamily:"'DM Mono',monospace"}}>{r.d>0?`-${r.d}`:"-"}</div></div></div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><span style={{fontSize:30,fontWeight:800,color:C.text,fontFamily:"'DM Mono',monospace"}}>{r.total}</span><span style={{fontSize:12,color:C.subtle,marginLeft:4}}>kr/mån</span></div><a href={r.bM.affiliateUrl} target="_blank" rel="noopener noreferrer" style={{padding:"8px 20px",borderRadius:10,textDecoration:"none",background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:12,fontWeight:800}}>Välj →</a></div></div>))}<button onClick={()=>{setStep(1);setSm(null);setSb(null);setSt(null);}} style={{background:"transparent",border:`1px solid ${C.surface}`,color:C.subtle,padding:"5px 12px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:11}}>Börja om</button></div>}
  </div>);
}

// ══════════════════════════════════════
// PAGE: JÄMFÖR — v3 LAYOUT
// ══════════════════════════════════════
function PageJamfor(){
  const[siteMode,setSiteMode]=useState("mobil");
  const[category,setCategory]=useState("privat");
  const[priceMax,setPriceMax]=useState(800);
  const[dataMin,setDataMin]=useState(0);
  const[fiveG,setFiveG]=useState(false);
  const[selOps,setSelOps]=useState([]);
  const[sortBy,setSortBy]=useState("price_asc");
  const[famCfg,setFamCfg]=useState({adults:2,children:1});
  const[search,setSearch]=useState("");
  const[showFilter,setShowFilter]=useState(false);
  const[chip,setChip]=useState(null);
  const[sticky,setSticky]=useState(false);
  const barRef=useRef(null);
  const isF=category==="familj";const sMax=isF?3000:800;const noMax=priceMax>=sMax;const noSurf=dataMin>=100;
  useEffect(()=>{setPriceMax(isF?3000:800);},[category]);
  useEffect(()=>{const h=()=>{if(barRef.current){setSticky(barRef.current.getBoundingClientRect().top<=60);}};window.addEventListener("scroll",h,{passive:true});return()=>window.removeEventListener("scroll",h);},[]);
  const toggleOp=id=>setSelOps(p=>p.includes(id)?p.filter(o=>o!==id):[...p,id]);
  const applyChip=c=>{if(chip===c){setChip(null);setSortBy("price_asc");return;}setChip(c);if(c==="billigast")setSortBy("price_asc");if(c==="varde")setSortBy("value");};

  const filtered=useMemo(()=>{
    let r=PLANS.filter(p=>p.categories.includes(category));
    if(search.trim()){const q=search.toLowerCase();r=r.filter(p=>p.name.toLowerCase().includes(q)||p.operator.toLowerCase().includes(q)||p.network.toLowerCase().includes(q));}
    if(!noMax){r=r.filter(p=>{let pr=p.price;if(isF&&p.perExtra)pr=p.price+(famCfg.adults-1+famCfg.children)*p.perExtra;return pr<=priceMax;});}
    if(noSurf)r=r.filter(p=>p.data>=9999);else if(dataMin>0)r=r.filter(p=>p.data>=dataMin);
    if(fiveG)r=r.filter(p=>p.fiveG);
    if(selOps.length>0)r=r.filter(p=>selOps.includes(p.operator));
    if(chip==="kampanj")r=r.filter(p=>p.campaignPrice!==null);
    r.sort((a,b)=>{const g=p=>{if(isF&&p.perExtra)return p.price+(famCfg.adults-1+famCfg.children)*p.perExtra;return p.price;};switch(sortBy){case"price_asc":return g(a)-g(b);case"price_desc":return g(b)-g(a);case"data_desc":return b.data-a.data;case"value":return g(a)/Math.max(a.data,1)-g(b)/Math.max(b.data,1);default:return 0;}});
    return r;
  },[category,priceMax,dataMin,fiveG,selOps,sortBy,famCfg,isF,search,noMax,noSurf,chip]);

  const MODES=[{id:"mobil",l:"Mobil"},{id:"bredband",l:"Bredband"},{id:"tv",l:"TV"},{id:"paket",l:"Paket & Spara"}];

  return(
    <div>
      {siteMode==="mobil"?(
      <div>
        {/* ═══ FULL-VIEWPORT HERO ═══ */}
        <section style={{minHeight:"calc(100vh - 60px)",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center",padding:"0 20px",position:"relative"}}>
          <div style={{position:"absolute",top:"15%",left:"50%",transform:"translateX(-50%)",width:"clamp(300px,60vw,600px)",height:"clamp(300px,60vw,600px)",borderRadius:"50%",background:"radial-gradient(circle,rgba(139,92,246,0.12) 0%,rgba(0,180,216,0.06) 40%,transparent 70%)",animation:"heroGlow 8s ease-in-out infinite",pointerEvents:"none"}}/>
          <h1 style={{fontSize:"clamp(32px,6vw,60px)",fontWeight:800,lineHeight:1.05,letterSpacing:"-0.04em",marginBottom:16,color:C.text,position:"relative",zIndex:1}}>
            Alla <span style={{background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>operatörer.</span><br/>Ett ställe.
          </h1>
          <p style={{fontSize:"clamp(15px,2vw,18px)",color:C.subtle,maxWidth:500,marginBottom:36,lineHeight:1.5,position:"relative",zIndex:1}}>Hitta, jämför och teckna — helt digitalt.<br/>Sveriges smartaste abonnemangssajt.</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:40,position:"relative",zIndex:1}}>
            {MODES.map(m=>(<button key={m.id} onClick={()=>setSiteMode(m.id)} style={{padding:"10px 22px",borderRadius:24,border:siteMode===m.id?"none":`1px solid ${C.surface}`,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700,background:siteMode===m.id?`linear-gradient(135deg,${C.mint},${C.cyan})`:C.dark,color:siteMode===m.id?C.ink:C.muted}}>{m.l}</button>))}
          </div>
          <div style={{display:"flex",gap:24,alignItems:"center",justifyContent:"center",flexWrap:"wrap",padding:"16px 24px",background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`,borderRadius:16,position:"relative",zIndex:1,animation:"fadeIn 1s ease-out .3s both"}}>
            {[{n:"63",l:"Abonnemang"},{n:"8",l:"Operatörer"},{n:"21",l:"Bredband"},{n:"17",l:"TV-paket"}].map((s,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6}}>{i>0&&<div style={{width:1,height:20,background:C.surface}}/>}<span style={{fontSize:20,fontWeight:800,fontFamily:"'DM Mono',monospace",background:`linear-gradient(135deg,${C.mint},${C.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{s.n}</span><span style={{fontSize:12,color:C.subtle}}>{s.l}</span></div>))}
          </div>
          <div style={{position:"absolute",bottom:24,left:"50%",transform:"translateX(-50%)",animation:"scrollBounce 2s ease-in-out infinite",opacity:.4}}>
            <svg width="24" height="24" fill="none" stroke={C.subtle} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        </section>

        {/* ═══ FAMILY BANNER — "Unik funktion" ═══ */}
        {category!=="familj"&&(
          <div onClick={()=>setCategory("familj")} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:14,maxWidth:560,margin:"0 auto 20px",background:"linear-gradient(135deg,rgba(139,92,246,0.06),rgba(0,180,216,0.04))",border:"1px solid rgba(139,92,246,0.15)",borderRadius:14,padding:"12px 18px",cursor:"pointer",transition:"all .2s"}} className="family-banner">
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>Jämför familjeabonnemang</span>
                <span style={{fontSize:9,fontWeight:700,color:C.ink,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,padding:"2px 8px",borderRadius:10}}>Unik funktion</span>
              </div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>Räknar ut exakt vad din familj betalar — ingen annan sajt har detta</div>
            </div>
            <div style={{background:`linear-gradient(135deg,${C.violet},${C.cyan})`,color:"#fff",fontSize:11,fontWeight:700,padding:"6px 14px",borderRadius:20,whiteSpace:"nowrap",flexShrink:0}} className="family-banner-cta">Testa nu →</div>
          </div>
        )}

        {/* ═══ CATEGORIES — own row, box-style ═══ */}
        <div ref={barRef} style={{display:"flex",gap:8,justifyContent:"center",marginBottom:14,flexWrap:"wrap"}}>
          {CATEGORIES.map(cat=>{const a=category===cat.id;const count=PLANS.filter(p=>p.categories.includes(cat.id)).length;return(
            <button key={cat.id} onClick={()=>setCategory(cat.id)} style={{padding:"10px 20px",borderRadius:12,border:a?`1.5px solid ${C.cyan}`:`1px solid ${C.surface}`,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:a?700:500,background:a?"rgba(0,180,216,0.08)":"rgba(255,255,255,0.02)",color:a?C.text:C.subtle,transition:"all .2s",display:"flex",alignItems:"center",gap:8}}>
              {cat.label}
              <span style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,background:a?"rgba(0,180,216,0.15)":"rgba(255,255,255,0.04)",color:a?C.cyan:C.subtle}}>{count}</span>
            </button>
          );})}
        </div>

        {/* ═══ FILTER BUTTON — pulsing, own row ═══ */}
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
          <button onClick={()=>setShowFilter(!showFilter)} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 28px",borderRadius:14,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700,transition:"all .2s",background:showFilter?"rgba(0,180,216,0.1)":"rgba(255,255,255,0.02)",border:showFilter?`1.5px solid ${C.cyan}`:`1.5px solid rgba(0,180,216,0.25)`,color:showFilter?C.cyan:C.text,animation:showFilter?"none":"filterPulse 2.5s ease-in-out infinite",boxShadow:showFilter?"none":"0 0 20px rgba(0,180,216,0.08)"}}>
            <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 4h14M4 8h10M6 12h6"/></svg>
            Filter &amp; sortering
            <span style={{fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace",color:C.cyan}}>{filtered.length}</span>
          </button>
        </div>

        {/* ═══ EXPANDED FILTER — chips inside ═══ */}
        {showFilter&&(
          <div style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:20,marginBottom:16,display:"flex",flexDirection:"column",gap:14,animation:"fadeIn .2s"}}>
            {/* Quick chips */}
            <div><div style={{fontSize:10,fontWeight:600,color:C.subtle,textTransform:"uppercase",marginBottom:6}}>Snabbval</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{[{id:"billigast",l:"Billigast"},{id:"varde",l:"Bäst värde"},{id:"kampanj",l:"Kampanj"}].map(ch=>(<button key={ch.id} onClick={()=>applyChip(ch.id)} style={{padding:"6px 14px",borderRadius:20,border:chip===ch.id?`1px solid ${C.mint}`:`1px solid ${C.surface}`,background:chip===ch.id?"rgba(6,214,160,0.1)":"transparent",color:chip===ch.id?C.mint:C.subtle,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{ch.l}</button>))}</div></div>
            {/* Search */}
            <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.02)",border:`1px solid ${C.surface}`,borderRadius:10,padding:"8px 14px"}}><svg width="14" height="14" fill="none" stroke={C.subtle} strokeWidth="2"><circle cx="6" cy="6" r="5"/><path d="M11 11l2 2"/></svg><input type="text" placeholder="Sök operatör eller plan..." value={search} onChange={e=>setSearch(e.target.value)} style={{background:"transparent",border:"none",outline:"none",color:C.text,fontSize:13,fontFamily:"inherit",width:"100%"}}/></div>
            {/* Sliders */}
            <div style={{display:"flex",gap:24,flexWrap:"wrap"}} className="filter-sliders"><RangeSlider label="Max pris" min={100} max={sMax} step={10} value={priceMax} onChange={setPriceMax} dl={noMax?"Alla":`${priceMax} kr`}/><RangeSlider label="Min surf" min={0} max={100} step={5} value={dataMin} onChange={setDataMin} dl={noSurf?"Obegr.":dataMin>0?`${dataMin} GB`:"Alla"}/></div>
            {/* 5G */}
            <div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>setFiveG(!fiveG)} style={{width:36,height:20,borderRadius:10,border:"none",background:fiveG?`linear-gradient(135deg,${C.cyan},${C.violet})`:"rgba(255,255,255,0.05)",cursor:"pointer",position:"relative"}}><div style={{width:14,height:14,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:fiveG?19:3,transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/></button><span style={{fontSize:12,fontWeight:600,color:fiveG?C.cyan:C.subtle}}>Bara 5G</span></div>
            {/* Operators */}
            <div><div style={{fontSize:10,fontWeight:600,color:C.subtle,textTransform:"uppercase",marginBottom:6}}>Operatörer</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{OPERATORS.map(op=>{const a=selOps.includes(op.id);return(<button key={op.id} onClick={()=>toggleOp(op.id)} style={{display:"flex",alignItems:"center",gap:3,padding:"4px 10px",borderRadius:8,border:a?`1px solid ${op.color}66`:`1px solid ${C.surface}`,background:a?`${op.color}12`:"transparent",color:a?op.color:C.subtle,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}><span style={{width:6,height:6,borderRadius:"50%",background:a?op.color:"rgba(255,255,255,.1)"}}/>{op.name}</button>);})}{selOps.length>0&&<button onClick={()=>setSelOps([])} style={{padding:"4px 8px",borderRadius:8,border:"1px solid rgba(239,68,68,.2)",background:"rgba(239,68,68,.04)",color:"#f87171",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Rensa</button>}</div></div>
            {/* Sort */}
            <div><div style={{fontSize:10,fontWeight:600,color:C.subtle,textTransform:"uppercase",marginBottom:6}}>Sortera</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{SORT_OPTIONS.map(o=>(<button key={o.id} onClick={()=>setSortBy(o.id)} style={{padding:"4px 12px",borderRadius:8,border:sortBy===o.id?`1px solid rgba(0,180,216,.3)`:`1px solid ${C.surface}`,background:sortBy===o.id?"rgba(0,180,216,.06)":"transparent",color:sortBy===o.id?C.cyan:C.subtle,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{o.label}</button>))}</div></div>
          </div>
        )}

        {isF&&<FamilyCalc config={famCfg} onChange={setFamCfg}/>}

        {/* ═══ CARDS ═══ */}
        {filtered.length===0?(<div style={{textAlign:"center",padding:"48px 20px"}}><div style={{fontSize:16,fontWeight:700,color:C.text}}>Inga abonnemang matchar</div><div style={{fontSize:13,color:C.subtle,marginTop:4}}>Justera filter</div></div>):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}} className="plan-grid">{filtered.map((p,i)=>(<PlanCard key={p.id} plan={p} familyConfig={famCfg} isFamily={isF} index={i}/>))}</div>
        )}
        <NetworkMap/>
      </div>
      ):(
      <div>
        <div style={{display:"flex",justifyContent:"center",padding:"20px 20px 0",gap:6}}>
          {MODES.map(m=>(<button key={m.id} onClick={()=>setSiteMode(m.id)} style={{padding:"8px 18px",borderRadius:24,border:siteMode===m.id?"none":`1px solid ${C.surface}`,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,background:siteMode===m.id?`linear-gradient(135deg,${C.mint},${C.cyan})`:C.dark,color:siteMode===m.id?C.ink:C.muted}}>{m.l}</button>))}
        </div>
        {siteMode==="bredband"&&<BroadbandView/>}
        {siteMode==="tv"&&<TvViewTab/>}
        {siteMode==="paket"&&<PaketView/>}
      </div>
      )}
    </div>
  );
}

// ═══ PAGES ═══
function PageOmOss(){return(<div style={{maxWidth:640,margin:"0 auto",padding:"48px 20px"}}><div style={{textAlign:"center",marginBottom:40}}><h1 style={{fontSize:"clamp(28px,5vw,44px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:10,background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Om Byyt</h1><p style={{fontSize:16,color:C.muted}}>Oberoende jämförelsetjänst. Gratis, transparent, på din sida.</p></div><div style={{display:"flex",flexDirection:"column",gap:16}}>{[{t:"Vad vi gör",x:"Filtrera, sortera och jämför mobil, bredband och TV. Familjekalkylator som räknar ut exakt kostnad."},{t:"Byggt för alla",x:"Pris, surfmängd, operatör, 5G. Sveriges mest kompletta jämförelseverktyg."},{t:"Vem vi är",x:"Byyt har ett mål: göra det enkelt att hitta rätt abonnemang."}].map((i,idx)=>(<div key={idx} style={{background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"20px 24px",borderLeft:`3px solid ${C.mint}`}}><h2 style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:6}}>{i.t}</h2><p style={{fontSize:13,color:C.muted,lineHeight:1.7}}>{i.x}</p></div>))}</div><div style={{marginTop:36,padding:"20px 24px",background:"linear-gradient(135deg,rgba(6,214,160,.05),rgba(139,92,246,.05))",border:"1px solid rgba(0,180,216,.12)",borderRadius:16,textAlign:"center"}}><a href="mailto:kontakt@byyt.se" style={{color:C.cyan,textDecoration:"none",fontSize:16,fontWeight:700}}>kontakt@byyt.se</a></div></div>);}

const PRIV_S=[{t:"Vem ansvarar?",c:"Byyt.se — oberoende jämförelsetjänst. kontakt@byyt.se"},{t:"Uppgifter",c:"IP (anon.), webbläsartyp, besökta sidor."},{t:"Cookies",c:"Nödvändiga + GA4 (anonymiserat)."},{t:"Affiliate",c:"Provision vid teckning. Priset påverkas inte."},{t:"Dina rättigheter",c:"GDPR: tillgång, rättelse, radering. kontakt@byyt.se"}];
function PagePriv(){const[oi,setOi]=useState(null);return(<div style={{maxWidth:680,margin:"0 auto",padding:"48px 20px"}}><h1 style={{fontSize:"clamp(24px,4vw,36px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:4,background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Integritetspolicy</h1><p style={{color:C.subtle,fontSize:12,marginBottom:28}}>Mars 2026</p><div style={{display:"flex",flexDirection:"column",gap:2}}>{PRIV_S.map((s,i)=>{const o=oi===i;return(<div key={i} style={{background:o?C.surface:C.dark,borderRadius:10,border:`1px solid ${o?"rgba(0,180,216,.12)":"rgba(255,255,255,.04)"}`,overflow:"hidden"}}><button onClick={()=>setOi(o?null:i)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 18px",background:"none",border:"none",color:C.text,fontSize:14,fontWeight:600,fontFamily:"inherit",cursor:"pointer",textAlign:"left"}}>{s.t}<span style={{color:C.cyan,fontSize:16,transform:o?"rotate(45deg)":"none",transition:"transform .15s"}}>+</span></button>{o&&<div style={{padding:"0 18px 14px",color:C.muted,fontSize:13,lineHeight:1.6}}>{s.c}</div>}</div>);})}</div></div>);}

function PageKontakt(){return(<div style={{maxWidth:480,margin:"0 auto",padding:"48px 20px"}}><div style={{textAlign:"center",marginBottom:36}}><h1 style={{fontSize:"clamp(28px,5vw,42px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:6,background:`linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Kontakt</h1><p style={{fontSize:14,color:C.muted}}>Vi svarar inom 24 timmar.</p></div><div style={{display:"flex",flexDirection:"column",gap:12}}><a href="mailto:kontakt@byyt.se" style={{display:"flex",alignItems:"center",gap:14,background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"18px 22px",textDecoration:"none"}}><div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="18" height="18" fill="none" stroke="white" strokeWidth="2"><path d="M3 3h14c1 0 2 1 2 2v10c0 1-1 2-2 2H3c-1 0-2-1-2-2V5c0-1 1-2 2-2z"/><polyline points="19,5 10,12 1,5"/></svg></div><div><div style={{fontSize:10,color:C.subtle,fontWeight:600,textTransform:"uppercase"}}>E-post</div><div style={{fontSize:15,fontWeight:700,color:C.cyan}}>kontakt@byyt.se</div></div></a><a href="https://instagram.com/byyt.se" target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:14,background:C.dark,border:`1px solid ${C.surface}`,borderRadius:16,padding:"18px 22px",textDecoration:"none"}}><div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#833AB4,#FD1D1D,#F77737)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><svg width="18" height="18" fill="none" stroke="white" strokeWidth="2"><rect x="2" y="2" width="16" height="16" rx="4"/><circle cx="10" cy="10" r="3"/></svg></div><div><div style={{fontSize:10,color:C.subtle,fontWeight:600,textTransform:"uppercase"}}>Instagram</div><div style={{fontSize:15,fontWeight:700,color:"#e1306c"}}>@byyt.se</div></div></a></div></div>);}

function Footer({go}){return(<footer style={{borderTop:"1px solid rgba(255,255,255,.03)",padding:"32px 24px 24px",background:C.dark,marginTop:40}}><div style={{maxWidth:960,margin:"0 auto"}}><div style={{display:"flex",flexWrap:"wrap",justifyContent:"space-between",gap:24,marginBottom:20}}><div><ByytLogo size={28} onClick={()=>go("jamfor")}/><p style={{fontSize:11,color:C.subtle,marginTop:6,maxWidth:220,lineHeight:1.5}}>Oberoende jämförelse för mobil, bredband och TV.</p></div><div style={{display:"flex",gap:28}}><div><div style={{fontSize:10,color:C.subtle,fontWeight:600,textTransform:"uppercase",marginBottom:8}}>Sidor</div>{[{l:"Jämför",p:"jamfor"},{l:"Om oss",p:"om"},{l:"Integritet",p:"priv"},{l:"Kontakt",p:"kontakt"}].map(i=>(<button key={i.p} onClick={()=>go(i.p)} style={{display:"block",background:"none",border:"none",padding:"2px 0",color:C.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{i.l}</button>))}</div><div><div style={{fontSize:10,color:C.subtle,fontWeight:600,textTransform:"uppercase",marginBottom:8}}>Socialt</div><a href="https://instagram.com/byyt.se" target="_blank" rel="noopener noreferrer" style={{color:C.muted,textDecoration:"none",fontSize:12}}>Instagram</a></div></div></div><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.surface2}}><span>© 2026 Byyt.se</span><span>Priser: mars 2026</span></div></div></footer>);}

function ByytApp(){
  const[page,setPage]=useState("jamfor");const[mm,setMm]=useState(false);
  const NAV=[{id:"jamfor",l:"Jämför"},{id:"om",l:"Om oss"},{id:"priv",l:"Integritet"},{id:"kontakt",l:"Kontakt"}];
  const go=p=>{setPage(p);setMm(false);window.scrollTo({top:0,behavior:"smooth"});};
  return(
    <div style={{minHeight:"100vh",background:C.ink,color:C.text,fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",overflowX:"hidden"}}>
      <style>{`
        @keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes heroGlow{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.55;transform:scale(1.06)}}
        @keyframes scrollBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
        @keyframes filterPulse{0%,100%{border-color:rgba(0,180,216,0.2)}50%{border-color:rgba(0,180,216,0.5)}}
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.2);border-radius:3px}
        input[type=range]{-webkit-appearance:none;appearance:none;background:transparent}
        body{background:${C.ink}}
        @media(max-width:640px){.desktop-nav{display:none!important}.mobile-menu-btn{display:flex!important}.plan-grid{grid-template-columns:1fr!important}.filter-sliders{flex-direction:column!important;gap:14px!important}.main-wrap{padding:0 12px!important}.family-banner{flex-direction:column!important;gap:8px!important;text-align:center!important}.family-banner-cta{width:100%!important;text-align:center!important}}
        @media(min-width:641px){.mobile-menu-btn{display:none!important}}
      `}</style>
      <header style={{padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,.04)",backdropFilter:"blur(20px)",position:"sticky",top:0,zIndex:100,background:"rgba(8,14,26,.92)",height:60}}>
        <ByytLogo size={30} onClick={()=>go("jamfor")}/>
        <nav style={{display:"flex",gap:2}} className="desktop-nav">{NAV.map(n=>{const a=page===n.id;return(<button key={n.id} onClick={()=>go(n.id)} style={{padding:"6px 12px",borderRadius:8,border:"none",background:a?"rgba(0,180,216,.08)":"transparent",color:a?C.cyan:C.muted,fontSize:13,fontWeight:a?700:500,cursor:"pointer",fontFamily:"inherit"}}>{n.l}</button>);})}</nav>
        <button onClick={()=>setMm(!mm)} className="mobile-menu-btn" style={{display:"none",background:"none",border:`1px solid ${C.surface}`,borderRadius:8,padding:"5px 8px",color:C.muted,cursor:"pointer",fontSize:14}}>☰</button>
      </header>
      {mm&&<div style={{position:"fixed",top:60,left:0,right:0,zIndex:99,background:C.dark,borderBottom:`1px solid ${C.surface}`,padding:10,display:"flex",flexDirection:"column",gap:2,animation:"fadeIn .15s"}}>{NAV.map(n=>(<button key={n.id} onClick={()=>go(n.id)} style={{padding:"10px 16px",borderRadius:10,border:"none",background:page===n.id?"rgba(0,180,216,.06)":"transparent",color:page===n.id?C.cyan:C.muted,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>{n.l}</button>))}</div>}
      <main style={{maxWidth:1200,margin:"0 auto",padding:"0 20px",position:"relative",zIndex:1}} className="main-wrap">
        {page==="jamfor"&&<PageJamfor/>}
        {page==="om"&&<PageOmOss/>}
        {page==="priv"&&<PagePriv/>}
        {page==="kontakt"&&<PageKontakt/>}
      </main>
      <Footer go={go}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ByytApp));
</script>
</body>
</html>
