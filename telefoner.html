// ─── Logo ────────────────────────────────────────────────────
function ByytLogo({ size = 40, href = "/" }) {
  const inner = (
    <div style={{ display: "flex", alignItems: "center", gap: 10, cursor: href ? "pointer" : "default" }}>
      <svg width={size} height={size} viewBox="0 0 120 120">
        <defs>
          <linearGradient id="logoG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={C.mint} />
            <stop offset="50%" stopColor={C.cyan} />
            <stop offset="100%" stopColor={C.violet} />
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="56" fill="url(#logoG)" />
        <g stroke="#FFF" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" fill="none">
          <path d="M36 44L67 44" />
          <polyline points="59,36 67,44 59,52" />
          <path d="M84 76L53 76" />
          <polyline points="61,68 53,76 61,84" />
        </g>
      </svg>
      <span style={{
        fontSize: size * 0.62, fontWeight: 800, letterSpacing: "-0.03em",
        background: `linear-gradient(135deg,${C.mint},${C.cyan},${C.violet})`,
        WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
      }}>byyt</span>
    </div>
  );
  if (!href) return inner;
  return <a href={href} style={{ textDecoration: "none" }}>{inner}</a>;
}

// ─── Header med riktig URL-navigation ────────────────────────
function ByytHeader({ active }) {
  const [mm, setMm] = React.useState(false);
  const NAV = [
    { id: "jamfor",     l: "Jämför",     href: "/" },
    { id: "om",         l: "Om oss",     href: "/om.html" },
    { id: "integritet", l: "Integritet", href: "/integritet.html" },
    { id: "kontakt",    l: "Kontakt",    href: "/kontakt.html" },
  ];
  return (
    <>
      <header style={{
        padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between",
        borderBottom: "1px solid rgba(255,255,255,.04)", backdropFilter: "blur(20px)",
        position: "sticky", top: 0, zIndex: 100, background: "rgba(8,14,26,.92)", height: 60
      }}>
        <ByytLogo size={30} href="/" />
        <nav style={{ display: "flex", gap: 2 }} className="dn">
          {NAV.map(n => {
            const a = active === n.id;
            return (
              <a key={n.id} href={n.href} style={{
                padding: "6px 12px", borderRadius: 8, textDecoration: "none",
                background: a ? "rgba(0,180,216,.08)" : "transparent",
                color: a ? C.cyan : C.muted, fontSize: 13, fontWeight: a ? 700 : 500
              }}>{n.l}</a>
            );
          })}
        </nav>
        <button onClick={() => setMm(!mm)} className="mb" style={{
          display: "none", background: "none", border: `1px solid ${C.surface}`,
          borderRadius: 8, padding: "5px 8px", color: C.muted, cursor: "pointer", fontSize: 14
        }}>☰</button>
      </header>
      {mm && (
        <div style={{
          position: "fixed", top: 60, left: 0, right: 0, zIndex: 99,
          background: C.dark, borderBottom: `1px solid ${C.surface}`,
          padding: 10, display: "flex", flexDirection: "column", gap: 2,
          animation: "fadeIn .15s"
        }}>
          {NAV.map(n => {
            const a = active === n.id;
            return (
              <a key={n.id} href={n.href} style={{
                padding: "10px 16px", borderRadius: 10, textDecoration: "none",
                background: a ? "rgba(0,180,216,.06)" : "transparent",

}

// ─── Footer med riktig URL-navigation ────────────────────────

              <div style={{ fontSize: 10, color: C.subtle, fontWeight: 600, textTransform: "uppercase", marginBottom: 8 }}>Socialt</div>
              <a href="https://instagram.com/byyt.se" target="_blank" rel="noopener noreferrer" style={{ color: C.muted, textDecoration: "none", fontSize: 12 }}>Instagram</a>

          <span>© 2026 Byyt.se</span>
          <span>Priser: mars 2026</span>

}

// ─── Mode-pills (delas mellan jämför-sidorna) ────────────────
function ByytModePills({ active }) {
  const MODES = [
    { id: "mobil",     l: "Mobil",           href: "/" },
    { id: "bredband",  l: "Bredband",        href: "/bredband.html" },
    { id: "tv",        l: "TV",              href: "/tv.html" },
    { id: "streaming", l: "Streaming",       href: "/streaming.html" },
    { id: "telefoner", l: "Telefoner",       href: "/telefoner.html" },
    { id: "paket",     l: "Allt-i-ett",      href: "/paket.html" },
    { id: "radgivare", l: "Kolla ditt pris", href: "/radgivare.html" },
  ];
  return (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center", marginBottom: 24, position: "relative", zIndex: 1 }}>
      {MODES.map(m => {
        const a = active === m.id;
        return (

            textDecoration: "none", fontSize: 13, fontWeight: 700,
            background: a ? `linear-gradient(135deg,${C.mint},${C.cyan})` : C.dark,

// Exponera globalt så mount-skripten kan använda dem

const { Page, ModePills } = window.Byyt;

function PhoneView(){
  const[step,setStep]=useState(-1);const[brand,setBrand]=useState(null);const[budget,setBudget]=useState(null);const[sel,setSel]=useState(null);const[detOp,setDetOp]=useState(null);
  const results=useMemo(()=>{if(step<2)return[];let r=[...PHONES];if(brand)r=r.filter(p=>p.brand===brand);r.sort((a,b)=>Math.min(...a.ops.map(o=>o.p))-Math.min(...b.ops.map(o=>o.p)));if(budget==="low")r=r.filter(p=>Math.min(...p.ops.map(o=>o.p))<400);else if(budget==="mid")r=r.filter(p=>{const m=Math.min(...p.ops.map(o=>o.p));return m>=300&&m<=700;});else if(budget==="high")r=r.filter(p=>Math.min(...p.ops.map(o=>o.p))>500);return r;},[step,brand,budget]);
  const popular=PHONES.sort((a,b)=>Math.min(...a.ops.map(o=>o.p))-Math.min(...b.ops.map(o=>o.p))).slice(0,4);
  const Choice=({label,sub,onClick})=>(<button onClick={onClick} style={{flex:"1 1 140px",padding:"16px 12px",borderRadius:14,border:`1px solid rgba(255,255,255,0.06)`,background:"rgba(255,255,255,0.02)",color:C.muted,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"center",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.cyan;e.currentTarget.style.color=C.text;}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.06)";e.currentTarget.style.color=C.muted;}}>{label}{sub&&<div style={{fontSize:11,fontWeight:400,color:C.subtle,marginTop:4}}>{sub}</div>}</button>);
  return(<div>
    <section style={{textAlign:"center",padding:"36px 20px 20px"}}><h2 style={{fontSize:"clamp(24px,4vw,40px)",fontWeight:800,letterSpacing:"-0.03em",marginBottom:6,color:C.text}}>Jämför <span style={{background:`linear-gradient(135deg,${C.mint},${C.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>telefoner</span></h2><p style={{fontSize:14,color:C.subtle}}>Med abonnemang — se billigaste operatören.</p></section>
    {step===-1&&<div style={{maxWidth:640,margin:"0 auto"}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10,textAlign:"center"}}>Billigaste just nu</div>
      <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:20}}>{popular.map(ph=>{const cheapest=ph.ops[0];return(<div key={ph.id} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{flex:1}}><span style={{fontSize:13,fontWeight:700,color:C.text}}>{ph.name}</span><span style={{fontSize:11,color:C.subtle,marginLeft:8}}>{ph.storage}</span></div>
        <span style={{fontSize:10,color:C.subtle,marginRight:6}}>från</span>
        <span style={{fontSize:20,fontWeight:800,fontFamily:"'DM Mono',monospace",color:C.mint}}>{cheapest.p}</span><span style={{fontSize:10,color:C.subtle,marginLeft:4}}>kr/mån</span>
      </div>);})}</div>
      <button onClick={()=>setStep(0)} style={{display:"block",width:"100%",maxWidth:400,margin:"0 auto",padding:"16px 24px",borderRadius:14,background:`linear-gradient(135deg,${C.mint},${C.cyan})`,color:C.ink,fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit",border:"none"}}>Jämför alla telefoner →</button>
    </div>}
    {step===0&&<div style={{maxWidth:600,margin:"0 auto",textAlign:"center",animation:"fadeIn .2s"}}>
      <div style={{fontSize:11,fontWeight:600,color:C.cyan,textTransform:"uppercase",marginBottom:8}}>Steg 1 av 2</div>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:24}}>Vilket märke?</div>
      <div style={{display:"flex",gap:10,maxWidth:500,margin:"0 auto",flexWrap:"wrap",justifyContent:"center"}}>
        <Choice label="Apple" sub="iPhone" onClick={()=>{setBrand("Apple");setStep(1);}}/>
        <Choice label="Samsung" sub="Galaxy" onClick={()=>{setBrand("Samsung");setStep(1);}}/>
        <Choice label="Google" sub="Pixel" onClick={()=>{setBrand("Google");setStep(1);}}/>
        <Choice label="Alla" sub="Visa alla märken" onClick={()=>{setBrand(null);setStep(1);}}/>
      </div>
    </div>}
    {step===1&&<div style={{maxWidth:600,margin:"0 auto",textAlign:"center",animation:"fadeIn .2s"}}>
      <button onClick={()=>setStep(0)} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:C.cyan,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",padding:0,marginBottom:16}}>← Tillbaka</button>
      <div style={{fontSize:11,fontWeight:600,color:C.cyan,textTransform:"uppercase",marginBottom:8}}>Steg 2 av 2</div>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:24}}>Budget?</div>
      <div style={{display:"flex",gap:10,maxWidth:480,margin:"0 auto"}}>
        <Choice label="Budget" sub="Under 400 kr/mån" onClick={()=>{setBudget("low");setStep(2);}}/>
        <Choice label="Mellan" sub="400–700 kr/mån" onClick={()=>{setBudget("mid");setStep(2);}}/>
        <Choice label="Premium" sub="700+ kr/mån" onClick={()=>{setBudget("high");setStep(2);}}/>
      </div>
    </div>}
    {step===2&&<div style={{maxWidth:640,margin:"0 auto",animation:"fadeIn .2s"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:C.cyan,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",padding:0}}>← Ändra</button>
        <div style={{fontSize:12,color:C.subtle}}>{results.length} telefoner{brand?` · ${brand}`:""}</div>
      </div>
      {results.length===0&&<div style={{textAlign:"center",padding:40,color:C.subtle}}>Inga telefoner matchar. Prova annan budget.</div>}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>{results.map((ph,i)=>{const cheapest=ph.ops[0];const isOpen=sel===ph.id;return(<div key={ph.id} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${isOpen?"rgba(0,180,216,0.15)":"rgba(255,255,255,0.04)"}`,borderRadius:12,padding:"12px 16px",cursor:"pointer",animation:`cardIn .15s ease-out ${i*.02}s both`}} onClick={()=>{setSel(isOpen?null:ph.id);setDetOp(null);}}>
        <div style={{display:"flex",alignItems:"center"}}>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.text}}>{ph.name}</div><div style={{fontSize:11,color:C.subtle}}>{ph.brand} · {ph.storage}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:10,color:C.subtle}}>Från</div><span style={{fontSize:24,fontWeight:800,fontFamily:"'DM Mono',monospace",color:C.mint}}>{cheapest.p}</span><span style={{fontSize:10,color:C.subtle,marginLeft:4}}>kr/mån</span></div>
        </div>
        {isOpen&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.05)",animation:"fadeIn .1s"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:10,fontWeight:600,color:C.subtle,marginBottom:6}}>Alla operatörer — 24 mån avbetalning</div>
          {ph.ops.map((op,j)=>(<a key={op.o} href={getUrl(op.o)} target="_blank" rel="noopener noreferrer sponsored" style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,background:j===0?"rgba(6,214,160,0.04)":"rgba(255,255,255,0.01)",border:j===0?"1px solid rgba(6,214,160,0.15)":"1px solid rgba(255,255,255,0.03)",marginBottom:3,textDecoration:"none"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:opColor(op.o)}}/>
            <span style={{fontSize:12,fontWeight:600,color:opColor(op.o),flex:1}}>{opName(op.o)}</span>
            <span style={{fontSize:16,fontWeight:800,fontFamily:"'DM Mono',monospace",color:j===0?C.mint:C.text}}>{op.p} kr</span>
            <span style={{fontSize:10,color:C.cyan,fontWeight:700}}>Välj →</span>
          </a>))}
          <div style={{fontSize:10,color:C.subtle,marginTop:4}}>Butikspris: {ph.retail.toLocaleString("sv")} kr</div>
        </div>}
      </div>);})}</div>
    </div>}
  </div>);
}


function TelefonerPage() {
  return (
    <Page active="jamfor">
      <div style={{paddingTop:28}}>
        <ModePills active="telefoner"/>
      </div>
      <PhoneView/>
    </Page>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TelefonerPage/>);
</script>
