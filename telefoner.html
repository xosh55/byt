<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billigaste mobiltelefoner med abonnemang 2026 | Byyt.se</title>
<meta name="description" content="Jämför priser på iPhone, Samsung och fler med och utan abonnemang. Hitta bästa dealen.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://byyt.se/telefoner.html">
<meta property="og:title" content="Billigaste mobiltelefoner 2026 | Byyt.se">
<meta property="og:description" content="Jämför priser på iPhone, Samsung och fler med och utan abonnemang.">
<meta property="og:url" content="https://byyt.se/telefoner.html">
<meta property="og:type" content="website">
<meta property="og:locale" content="sv_SE">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2306D6A0'/><stop offset='50%25' stop-color='%2300B4D8'/><stop offset='100%25' stop-color='%238B5CF6'/></linearGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/><g stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'><path d='M8 11L19 11'/><polyline points='16,8 19,11 16,14'/><path d='M24 21L13 21'/><polyline points='16,18 13,21 16,24'/></g></svg>">
<link rel="stylesheet" href="shared.css">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
</head>
<body>
<a href="#main" class="skip-link">Hoppa till innehåll</a>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const CAT_TABS = [
  { id: 'mobil', label: '📱 Mobil', href: 'mobil.html' },
  { id: 'bredband', label: '🌐 Bredband', href: 'bredband.html' },
  { id: 'tv', label: '📺 TV', href: 'tv.html' },
  { id: 'streaming', label: '🎬 Streaming', href: 'streaming.html' },
  { id: 'telefoner', label: '📞 Telefoner', href: 'telefoner.html', active: true },
];

const BRANDS = [
  { id: 'all', label: 'Alla' },
  { id: 'Apple', label: ' Apple' },
  { id: 'Samsung', label: ' Samsung' },
  { id: 'Google', label: ' Google' },
  { id: 'OnePlus', label: ' OnePlus' },
];

const BRAND_COLORS = {
  Apple: '#555', Samsung: '#1428A0', Google: '#4285F4', OnePlus: '#EB0028',
};

function PhoneCard({ phone, index }) {
  const [ex, setEx] = useState(index === 0);
  const color = BRAND_COLORS[phone.brand] || '#94A3B8';
  const cheapestOp = phone.ops[0]; // Already sorted cheapest first in data

  return (
    <div className={`result-card ${ex ? 'expanded' : ''}`} onClick={() => setEx(!ex)} role="button" tabIndex={0}
      aria-expanded={ex} onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setEx(!ex); }}}
      style={{ animation: `cardIn 0.15s ease-out ${index * 0.03}s both` }}>
      <div style={{ display: 'flex', alignItems: 'center' }}>
        <div className="op-logo" style={{ width: 40, height: 40, background: color + '20', color, fontSize: 14, fontWeight: 800 }}>
          {phone.brand.charAt(0)}
        </div>
        <div style={{ flex: 1, marginLeft: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)', marginBottom: 2 }}>{phone.name}</div>
          <div style={{ fontSize: 12, color: 'var(--sub)' }}>{phone.storage} · {phone.brand}</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'flex-end', gap: 3 }}>
            <span style={{ fontSize: 11, color: 'var(--muted)' }}>från</span>
            <span style={{ fontSize: 22, fontWeight: 800, fontFamily: "'DM Mono', monospace" }}>{cheapestOp.p}</span>
            <span style={{ fontSize: 10, color: 'var(--muted)' }}>kr/mån</span>
          </div>
          <div style={{ fontSize: 10, color: 'var(--muted)' }}>Köp: {phone.retail.toLocaleString('sv-SE')} kr</div>
        </div>
      </div>
      {!ex && <div style={{ textAlign: 'center', marginTop: 6, paddingTop: 4, borderTop: '1px solid var(--border)' }}><span style={{ fontSize: 10, fontWeight: 600, color: 'var(--cyan)', opacity: 0.6 }}>Visa alla operatörer</span></div>}
      {ex && (
        <div className="details" onClick={e => e.stopPropagation()} style={{ animation: 'fadeInFast 0.15s' }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--sub)', marginBottom: 8 }}>Pris per operatör (24 mån)</div>
          {phone.ops.map((op, i) => {
            const operator = OPERATORS.find(o => o.id === op.o);
            const opColor = operator ? operator.color : '#94A3B8';
            const opName = operator ? operator.name : op.o;
            const total24 = op.p * 24;
            return (
              <div key={i} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '10px 0',
                borderBottom: i < phone.ops.length - 1 ? '1px solid var(--border)' : 'none'
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: opColor }} />
                  <span style={{ fontSize: 13, fontWeight: 600, color: opColor }}>{opName}</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <span style={{ fontSize: 11, color: 'var(--muted)' }}>{total24.toLocaleString('sv-SE')} kr totalt</span>
                  <span style={{ fontSize: 16, fontWeight: 800, fontFamily: "'DM Mono', monospace", color: i === 0 ? 'var(--mint)' : 'var(--text)' }}>{op.p} kr</span>
                </div>
              </div>
            );
          })}
          <div style={{ marginTop: 10, fontSize: 11, color: 'var(--muted)', textAlign: 'center' }}>
            Priser med 24 mån bindning. Klicka operatören för att gå vidare.
          </div>
        </div>
      )}
    </div>
  );
}

function TelefonerPage() {
  const [brand, setBrand] = useState('all');

  // Phones ordered newest first (order in data.js = newest first already)
  const results = useMemo(() => {
    let f = [...PHONES];
    if (brand !== 'all') f = f.filter(p => p.brand === brand);
    return f;
  }, [brand]);

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', color: 'var(--text)' }}>
      <NavBar />
      <div className="cat-tabs">{CAT_TABS.map(t => <a key={t.id} href={t.href} className={`cat-tab ${t.active ? 'active' : ''}`}>{t.label}</a>)}</div>
      <main id="main" className="container">
        <section className="section fade-in">
          <h1 style={{ fontSize: 22, marginBottom: 4 }}>Jämför telefoner</h1>
          <p style={{ fontSize: 13, color: 'var(--sub)', marginBottom: 16 }}>Hitta bästa priset med och utan abonnemang</p>

          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 16 }}>
            {BRANDS.map(b => <button key={b.id} onClick={() => setBrand(b.id)} className={`chip ${brand === b.id ? 'active' : ''}`} aria-pressed={brand === b.id}>{b.label}</button>)}
          </div>

          <div style={{ fontSize: 12, color: 'var(--sub)', margin: '0 0 12px' }}><strong style={{ color: 'var(--text)' }}>{results.length} telefoner</strong> · Nyast först</div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {results.length === 0 && <div style={{ textAlign: 'center', padding: 40, color: 'var(--sub)' }}><div style={{ fontSize: 32, marginBottom: 10 }}>🔍</div><div style={{ fontSize: 15, fontWeight: 700 }}>Inga resultat</div></div>}
            {results.map((p, i) => <PhoneCard key={p.id} phone={p} index={i} />)}
          </div>

          <div className="trust-bar" style={{ marginTop: 24 }}>
            <div className="trust-item"><span aria-hidden="true">🔒</span> Oberoende</div>
            <div className="trust-item"><span aria-hidden="true">🔄</span> Dagliga priser</div>
            <div className="trust-item"><span aria-hidden="true">💰</span> Alltid gratis</div>
          </div>
        </section>
      </main>
      <Footer />
      <BottomTabs active="compare" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TelefonerPage />);
</script>
</body>
</html>
