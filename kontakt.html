          <a href="mailto:kontakt@byyt.se" style={{
            display: "flex", alignItems: "center", gap: 14, background: C.dark,
            border: `1px solid ${C.surface}`, borderRadius: 16, padding: "18px 22px", textDecoration: "none"

              width: 40, height: 40, borderRadius: 12,
              background: `linear-gradient(135deg,${C.mint},${C.cyan})`,

            border: `1px solid ${C.surface}`, borderRadius: 16, padding: "18px 22px", textDecoration: "none"
          }}>
            <div style={{
