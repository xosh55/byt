<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolla din totala telekomkostnad | Byyt.se</title>
<meta name="description" content="Räkna ut vad du betalar för mobil, bredband, TV och streaming. Se hur mycket du kan spara.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://byyt.se/totalkostnad.html">
<meta property="og:title" content="Kolla din totalkostnad | Byyt.se">
<meta property="og:description" content="Räkna ut vad du betalar och se hur mycket du kan spara.">
<meta property="og:url" content="https://byyt.se/totalkostnad.html">
<meta property="og:type" content="website">
<meta property="og:locale" content="sv_SE">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2306D6A0'/><stop offset='50%25' stop-color='%2300B4D8'/><stop offset='100%25' stop-color='%238B5CF6'/></linearGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/><g stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'><path d='M8 11L19 11'/><polyline points='16,8 19,11 16,14'/><path d='M24 21L13 21'/><polyline points='16,18 13,21 16,24'/></g></svg>">
<link rel="stylesheet" href="shared.css">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<script src="data.js"></script>
<script src="shared.js"></script>
</head>
<body>
<a href="#main" class="skip-link">Hoppa till innehåll</a>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const SERVICES = [
  { id: 'mobil', icon: '📱', label: 'Mobilabonnemang', default: true },
  { id: 'bredband', icon: '🌐', label: 'Bredband', default: false },
  { id: 'tv', icon: '📺', label: 'TV-paket', default: false },
  { id: 'streaming', icon: '🎬', label: 'Streaming', default: false },
];

const PRICE_STEPS = { mobil: [0,99,149,199,249,299,349,399,499,599], bredband: [0,199,249,299,349,399,499], tv: [0,199,249,299,399,499,699,899], streaming: [0,49,69,99,149,199,299,449] };

function PriceSlider({ service, value, onChange }) {
  const steps = PRICE_STEPS[service] || [0,99,199,299,399,499];
  const idx = steps.indexOf(value) >= 0 ? steps.indexOf(value) : 0;
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
        <span style={{ fontSize: 12, color: 'var(--sub)' }}>{SERVICES.find(s => s.id === service)?.label}</span>
        <span style={{ fontSize: 14, fontWeight: 800, fontFamily: "'DM Mono', monospace" }}>{value} kr/mån</span>
      </div>
      <input
        type="range"
        min={0}
        max={steps.length - 1}
        value={idx}
        onChange={e => onChange(steps[parseInt(e.target.value)])}
        style={{ width: '100%', accentColor: 'var(--mint)', height: 6 }}
        aria-label={`Pris för ${service}`}
      />
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: 'var(--muted)' }}>
        <span>{steps[0]} kr</span>
        <span>{steps[steps.length - 1]} kr</span>
      </div>
    </div>
  );
}

function RecommendationCard({ label, plan, color, opName, link }) {
  return (
    <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: 14, marginBottom: 6 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--sub)', marginBottom: 6 }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color }}>{opName}</div>
          <div style={{ fontSize: 12, color: 'var(--sub)' }}>{plan.name || plan.n || ''}</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <span style={{ fontSize: 20, fontWeight: 800, fontFamily: "'DM Mono', monospace" }}>{plan.price || plan.p || 0}</span>
          <span style={{ fontSize: 10, color: 'var(--muted)' }}> kr</span>
        </div>
      </div>
      {link && (
        <a href={link} target="_blank" rel="noopener noreferrer sponsored" className="cta cta-operator cta-full"
          style={{ background: `linear-gradient(135deg, ${color}, ${color}cc)`, marginTop: 10, fontSize: 12, padding: '10px 16px', minHeight: 40 }}>
          Gå till {opName} →
        </a>
      )}
    </div>
  );
}

function TotalkostnadPage() {
  const [step, setStep] = useState(1);
  const [active, setActive] = useState({ mobil: true, bredband: false, tv: false, streaming: false });
  const [prices, setPrices] = useState({ mobil: 299, bredband: 299, tv: 299, streaming: 149 });

  const toggleService = (id) => setActive(prev => ({ ...prev, [id]: !prev[id] }));
  const setPrice = (id, val) => setPrices(prev => ({ ...prev, [id]: val }));

  const totalNow = useMemo(() => {
    return Object.keys(active).reduce((sum, k) => sum + (active[k] ? prices[k] : 0), 0);
  }, [active, prices]);

  // Find cheapest alternatives
  const cheapestMobil = useMemo(() => {
    const p = PLANS.filter(p => p.categories.includes('privat') && p.data >= 5).sort((a, b) => (a.campaignPrice || a.price) - (b.campaignPrice || b.price))[0];
    if (!p) return null;
    const op = OPERATORS.find(o => o.id === p.operator);
    return { plan: { name: p.name, price: p.campaignPrice || p.price }, color: op?.color || '#94A3B8', opName: op?.name || '', link: p.affiliateUrl };
  }, []);

  const cheapestBB = useMemo(() => {
    const p = BROADBAND.filter(b => b.speedDown >= 100).sort((a, b) => (a.campaignPrice || a.price) - (b.campaignPrice || b.price))[0];
    if (!p) return null;
    const op = BB_OPERATORS.find(o => o.id === p.operator);
    return { plan: { name: p.name, price: p.campaignPrice || p.price }, color: op?.color || '#94A3B8', opName: op?.name || '', link: p.affiliateUrl };
  }, []);

  const cheapestTV = useMemo(() => {
    const p = TV_PLANS.filter(t => t.size === 'bas').sort((a, b) => (a.campaignPrice || a.price) - (b.campaignPrice || b.price))[0];
    if (!p) return null;
    const op = TV_OPERATORS.find(o => o.id === p.operator);
    return { plan: { name: p.name, price: p.campaignPrice || p.price }, color: op?.color || '#94A3B8', opName: op?.name || '', link: p.affiliateUrl };
  }, []);

  const cheapestStream = useMemo(() => {
    const s = STREAMING.filter(s => s.tiers[0].p > 0).sort((a, b) => a.tiers[0].p - b.tiers[0].p)[0];
    if (!s) return null;
    const url = (typeof URLS !== 'undefined' && URLS[s.id]) || '#';
    return { plan: { name: s.tiers[0].n, price: s.tiers[0].p }, color: '#06D6A0', opName: s.name, link: url };
  }, []);

  const recommendations = { mobil: cheapestMobil, bredband: cheapestBB, tv: cheapestTV, streaming: cheapestStream };
  const totalCheapest = Object.keys(active).reduce((sum, k) => {
    if (!active[k] || !recommendations[k]) return sum;
    return sum + recommendations[k].plan.price;
  }, 0);
  const savings = totalNow - totalCheapest;

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', color: 'var(--text)' }}>
      <NavBar />
      <main id="main" className="container">
        <section className="section fade-in">
          <div style={{ marginBottom: 4 }}>
            {step > 1 && <button onClick={() => setStep(step - 1)} style={{ background: 'none', border: 'none', color: 'var(--sub)', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', padding: '4px 0' }}>← Tillbaka</button>}
          </div>
          <div className="progress"><div className="progress-fill" style={{ width: step === 1 ? '33%' : step === 2 ? '66%' : '100%' }}></div></div>

          {/* STEP 1: What do you have? */}
          {step === 1 && (
            <div style={{ marginTop: 20, animation: 'fadeIn 0.3s' }}>
              <h1 style={{ fontSize: 22, marginBottom: 4 }}>Vad betalar du för idag?</h1>
              <p style={{ fontSize: 13, color: 'var(--sub)', marginBottom: 20 }}>Välj vilka tjänster du har</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {SERVICES.map(s => (
                  <button key={s.id} onClick={() => toggleService(s.id)}
                    className={`wizard-option ${active[s.id] ? 'selected' : ''}`}
                    style={{ flexDirection: 'row', alignItems: 'center', gap: 12 }} aria-pressed={active[s.id]}>
                    <span style={{ fontSize: 24, flexShrink: 0 }} aria-hidden="true">{s.icon}</span>
                    <span className="wizard-option-title" style={{ flex: 1 }}>{s.label}</span>
                    {active[s.id] && <span style={{ color: 'var(--mint)', fontSize: 18 }} aria-hidden="true">✓</span>}
                  </button>
                ))}
              </div>
              <button onClick={() => setStep(2)} className="cta cta-primary cta-full" style={{ marginTop: 16 }}>
                Nästa →
              </button>
            </div>
          )}

          {/* STEP 2: What do you pay? */}
          {step === 2 && (
            <div style={{ marginTop: 20, animation: 'fadeIn 0.3s' }}>
              <h1 style={{ fontSize: 22, marginBottom: 4 }}>Vad betalar du?</h1>
              <p style={{ fontSize: 13, color: 'var(--sub)', marginBottom: 20 }}>Dra i reglaget — ungefär räcker</p>
              {Object.keys(active).filter(k => active[k]).map(k => (
                <PriceSlider key={k} service={k} value={prices[k]} onChange={v => setPrice(k, v)} />
              ))}
              <div style={{ background: 'var(--card)', borderRadius: 'var(--radius-lg)', border: '1px solid var(--border)', padding: 16, textAlign: 'center', marginBottom: 16 }}>
                <div style={{ fontSize: 12, color: 'var(--sub)', marginBottom: 4 }}>Din totalkostnad idag</div>
                <div style={{ fontSize: 32, fontWeight: 800, fontFamily: "'DM Mono', monospace" }}>
                  {totalNow.toLocaleString('sv-SE')} <span style={{ fontSize: 14, color: 'var(--muted)' }}>kr/mån</span>
                </div>
                <div style={{ fontSize: 12, color: 'var(--muted)' }}>{(totalNow * 12).toLocaleString('sv-SE')} kr/år</div>
              </div>
              <button onClick={() => setStep(3)} className="cta cta-primary cta-full">
                Visa hur mycket jag kan spara →
              </button>
            </div>
          )}

          {/* STEP 3: Results */}
          {step === 3 && (
            <div style={{ marginTop: 20, animation: 'fadeIn 0.3s' }}>
              {/* Savings card */}
              <div style={{
                background: savings > 0 ? 'rgba(6,214,160,0.08)' : 'var(--card)',
                border: `1px solid ${savings > 0 ? 'rgba(6,214,160,0.2)' : 'var(--border)'}`,
                borderRadius: 'var(--radius-xl)', padding: 20, textAlign: 'center', marginBottom: 20
              }}>
                <div style={{ fontSize: 13, color: 'var(--sub)', marginBottom: 4 }}>
                  {savings > 0 ? 'Du kan spara' : 'Du har redan bra priser!'}
                </div>
                {savings > 0 ? (
                  <>
                    <div className="text-gradient" style={{ fontSize: 40, fontWeight: 800, fontFamily: "'DM Mono', monospace" }}>
                      {savings.toLocaleString('sv-SE')} kr/mån
                    </div>
                    <div style={{ fontSize: 14, color: 'var(--mint)', fontWeight: 700, marginTop: 4 }}>
                      = {(savings * 12).toLocaleString('sv-SE')} kr/år
                    </div>
                  </>
                ) : (
                  <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--mint)' }}>👍</div>
                )}
                <div style={{ display: 'flex', justifyContent: 'center', gap: 24, marginTop: 12, fontSize: 12, color: 'var(--sub)' }}>
                  <div>Idag: <strong style={{ color: 'var(--text)' }}>{totalNow} kr</strong></div>
                  <div>Byyt: <strong style={{ color: 'var(--mint)' }}>{totalCheapest} kr</strong></div>
                </div>
              </div>

              {/* Recommendations */}
              <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 10 }}>Billigaste alternativ</div>
              {active.mobil && cheapestMobil && (
                <RecommendationCard label="📱 Mobilabonnemang" {...cheapestMobil} />
              )}
              {active.bredband && cheapestBB && (
                <RecommendationCard label="🌐 Bredband" {...cheapestBB} />
              )}
              {active.tv && cheapestTV && (
                <RecommendationCard label="📺 TV-paket" {...cheapestTV} />
              )}
              {active.streaming && cheapestStream && (
                <RecommendationCard label="🎬 Streaming" {...cheapestStream} />
              )}

              <div className="disclosure" style={{ marginTop: 12 }}>Vi får provision — ditt pris påverkas inte</div>

              {/* CTA to compare more */}
              <div style={{ display: 'flex', gap: 8, marginTop: 20 }}>
                <a href="mobil.html" className="cta cta-secondary" style={{ flex: 1, fontSize: 12, padding: '10px 12px', minHeight: 40 }}>📱 Jämför mobil</a>
                <a href="bredband.html" className="cta cta-secondary" style={{ flex: 1, fontSize: 12, padding: '10px 12px', minHeight: 40 }}>🌐 Jämför bredband</a>
              </div>

              <div className="trust-bar" style={{ marginTop: 24 }}>
                <div className="trust-item"><span aria-hidden="true">🔒</span> Oberoende</div>
                <div className="trust-item"><span aria-hidden="true">🔄</span> Dagliga priser</div>
                <div className="trust-item"><span aria-hidden="true">💰</span> Alltid gratis</div>
              </div>
            </div>
          )}
        </section>
      </main>
      <Footer />
      <BottomTabs active="total" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TotalkostnadPage />);
</script>
</body>
</html>
